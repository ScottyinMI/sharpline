<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHARPLINE Sync</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0e14;color:#c5cdd8;font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .card{background:#111820;border:1px solid #1c2333;border-radius:12px;padding:32px 24px;max-width:340px;width:100%;text-align:center}
  .logo{width:48px;height:48px;border-radius:8px;background:linear-gradient(135deg,#d4a012,#9e7a1a);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#0a0e14;font-family:monospace;margin:0 auto 16px}
  h1{font-size:20px;font-weight:800;color:#e8edf4;margin-bottom:6px}
  p{color:#5a6578;font-size:13px;line-height:1.6;margin-bottom:24px}
  button{width:100%;padding:14px;background:#2ea043;color:#0a0e14;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
  .status{margin-top:16px;font-size:12px;color:#5a6578;font-family:monospace}
  .ok{color:#2ea043}
</style>
</head>
<body>
<div class="card">
  <div class="logo">SL</div>
  <h1>SHARPLINE</h1>
  <p>Tap below to sync your bet tracker to this device.</p>
  <button onclick="doSync()">Sync My Account →</button>
  <div class="status" id="st"></div>
</div>
<script>
function doSync(){
  try{
    localStorage.setItem("sl-user-id","sl-jvjq2jjne");
    if(localStorage.getItem("sl-user-id")==="sl-jvjq2jjne"){
      document.getElementById("st").innerHTML='<span class="ok">✓ Synced! Redirecting...</span>';
      document.querySelector("button").disabled=true;
      setTimeout(function(){window.location.href="/"},1200);
    }else{
      document.getElementById("st").textContent="Something went wrong. Try again.";
    }
  }catch(e){document.getElementById("st").textContent="Error: "+e.message}
}
</script>
</body>
</html>
