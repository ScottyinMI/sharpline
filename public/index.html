// American odds → implied probability
const a2i=a=>a<0?Math.abs(a)/(Math.abs(a)+100):100/(a+100);
// American → decimal
const a2d=a=>a<0?1+100/Math.abs(a):1+a/100;

// Edge: pure implied-probability-point difference, hard-capped at 10%
// This is the honest measure across all odds formats
function calcEdge(yours,sharp){
  const yi=a2i(yours),si=a2i(sharp);
  return Math.min(Math.max(0,(si-yi)*100),10);
}

// CLV: how much value your entry captured vs closing line
const calcCLV=(entry,close)=>{const e=a2i(entry),c=a2i(close);return((c-e)/e)*100;};

// Unit sizing — Walters: max 3% of bankroll, scale with edge, 0.5u increments
// "limit your maximum wager on any single event to three percent"
const suggestUnits=e=>e>=7?3:e>=5.5?2.5:e>=4.5?2:e>=3.5?1.5:e>=3?1:0.5;

// Robust median (resists outlier skew vs mean)
function median(arr){
  if(!arr.length)return 0;
  const s=[...arr].sort((a,b)=>a-b);
  const m=Math.floor(s.length/2);
  return s.length%2?s[m]:(s[m-1]+s[m])/2;
}

// Haversine distance in miles (for travel analysis)
function haversine(lat1,lon1,lat2,lon2){
  const R=3959,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// §6  RESEARCH ENGINE

function analyzeResearch(game,recentScores){
  const factors=[];
  const home=game.home_team,away=game.away_team;
  const gt=new Date(game.commence_time).getTime();
  let restH=null,restA=null,b2bH=false,b2bA=false;

  // ── Rest days ──
  if(recentScores&&recentScores.length){
    let lastH=null,lastA=null;
    for(const s of recentScores){
      const st=new Date(s.commence_time).getTime();
      if(st>=gt)continue;
      if(s.home_team===home||s.away_team===home){if(!lastH||st>lastH)lastH=st;}
      if(s.home_team===away||s.away_team===away){if(!lastA||st>lastA)lastA=st;}
    }
    if(lastH){
      restH=Math.floor((gt-lastH)/864e5);
      if(restH===0){b2bH=true;factors.push({type:"rest",team:home,label:"B2B",detail:`${home} on back-to-back`,impact:-2,color:T.red});}
      else if(restH===1)factors.push({type:"rest",team:home,label:`${restH}d rest`,detail:`${home} — 1 day rest`,impact:-1,color:T.orn});
      else if(restH>=3)factors.push({type:"rest",team:home,label:`${restH}d rest`,detail:`${home} well-rested (${restH} days)`,impact:1,color:T.grn});
    }
    if(lastA){
      restA=Math.floor((gt-lastA)/864e5);
      if(restA===0){b2bA=true;factors.push({type:"rest",team:away,label:"B2B",detail:`${away} on back-to-back`,impact:-2,color:T.red});}
      else if(restA===1)factors.push({type:"rest",team:away,label:`${restA}d rest`,detail:`${away} — 1 day rest`,impact:-1,color:T.orn});
      else if(restA>=3)factors.push({type:"rest",team:away,label:`${restA}d rest`,detail:`${away} well-rested (${restA} days)`,impact:1,color:T.grn});
    }
    // Rest advantage
    if(restH!==null&&restA!==null&&Math.abs(restH-restA)>=2){
      const adv=restH>restA?home:away;
      factors.push({type:"rest_adv",team:adv,label:`+${Math.abs(restH-restA)}d rest edge`,detail:`${adv} has ${Math.abs(restH-restA)}-day rest advantage`,impact:restH>restA?1:-1,color:T.blu});
    }
  }

  // ── Travel distance ──
  let travelMi=null;
  const hc=CITIES[home],ac=CITIES[away];
  if(hc&&ac){
    travelMi=Math.round(haversine(hc.lat,hc.lon,ac.lat,ac.lon));
    if(travelMi>1500)factors.push({type:"travel",team:away,label:`${travelMi}mi`,detail:`${away} coast-to-coast travel (${travelMi}mi)`,impact:-2,color:T.red});
    else if(travelMi>800)factors.push({type:"travel",team:away,label:`${travelMi}mi`,detail:`${away} traveled ${travelMi} miles`,impact:-1,color:T.orn});

    // Timezone shift
    const tz=Math.abs(Math.round((hc.lon-ac.lon)/15));
    if(tz>=2)factors.push({type:"tz",team:away,label:`${tz}hr TZ`,detail:`${away} crossing ${tz} time zones`,impact:-1,color:T.orn});
  }

  // ── Compound: B2B + travel ──
  if(b2bA&&travelMi&&travelMi>500){
    factors.push({type:"compound",team:away,label:"B2B+Travel",detail:`${away} back-to-back AND traveled ${travelMi}mi — extreme fatigue risk`,impact:-3,color:T.red});
  }

  return{factors,restH,restA,b2bH,b2bA,travelMi};
}

// ════════════════════════════════════════════════════════════════
// §7  SHARPLINE SCORING ENGINE
// ════════════════════════════════════════════════════════════════

// Walters principle: "everything begins and ends with value"
// Most games should score LOW. An "A" is rare — maybe 1-2 per day.
// We're looking for genuine market inefficiency, not noise.

function scoreGame(game,research){
  const w={edge:.35,sharpDir:.20,juice:.15,move:.10,research:.10,half:.10};
  const s={edge:0,sharpDir:0,juice:0,move:0,research:0,half:0};

  // Sport-aware edge floor — moneyline-primary sports (hockey, baseball)
  // have naturally wider book-to-book ML variance that isn't real edge.
  // NHL/MLB: a 3% ML "edge" is normal market spread, not an inefficiency.
  // NFL/NBA/NCAA: spreads are the primary market, tighter and more meaningful.
  const isMlSport=game.sportType==="hockey"||game.sportType==="baseball";
  const edgeFloor=isMlSport?3:2; // NHL/MLB need 3%+ to even register; others 2%+

  // For ML-primary sports, dampen the ML edge contribution
  // Use spread/total edge at face value, but discount ML edge by 40%
  const adjMlEdge=isMlSport?(game.bestMlEdge||0)*0.6:(game.bestMlEdge||0);
  const maxE=Math.max(game.bestSpreadEdge||0,game.bestTotalEdge||0,adjMlEdge);

  if(maxE>=edgeFloor+1)s.edge=Math.min((maxE-edgeFloor)*25,100);
  else s.edge=0;

  // Sharp directional agreement (0-100)
  if(game.conSrc==="sharp"&&game.sharpN>=2){
    const allSpOdds=[];
    for(const sl of game.spreadLines||[]){
      for(const e of sl.entries)allSpOdds.push(e.awOd);
    }
    const mktMed=median(allSpOdds);
    const sharpDiff=Math.abs(a2i(game.shSpMed)-a2i(mktMed))*100;
    if(sharpDiff>1.5)s.sharpDir=Math.min(sharpDiff*20,100);
  }

  // Juice signal (0-100)
  if(game.juiceSig&&game.juiceSig.strength>=5)s.juice=Math.min((game.juiceSig.strength-4)*25,100);

  // Line movement (0-100)
  if(game.movement){
    const mv=Math.abs(game.movement.spreadDelta||0);
    if(mv>=0.5)s.move=Math.min(mv*30,100);
  }

  // Research (0-100)
  if(research&&research.factors.length){
    const tot=research.factors.reduce((a,f)=>a+Math.abs(f.impact),0);
    s.research=Math.min(tot*12,100);
  }

  // Half-point value (0-100)
  if(game.halfPtVal)s.half=Math.min(game.halfPtVal*20,100);

  let total=0;
  for(const[k,v]of Object.entries(w))total+=(s[k]||0)*v;

  const grade=total>=60?"A":total>=45?"B":total>=30?"C":total>=15?"D":"F";
  return{total:Math.round(total),parts:s,grade};
}

function genRecs(game,research){
  const recs=[];
  // Sport-aware thresholds:
  // NHL/MLB are moneyline-primary — wider natural variance means higher bar
  // NFL/NBA/NCAA are spread-primary — tighter market, lower bar is real
  const isMlSport=game.sportType==="hockey"||game.sportType==="baseball";
  const spreadMin=3;      // Same across sports — spreads are always tight
  const totalMin=3;       // Same across sports
  const mlMin=isMlSport?4.5:3.5; // NHL/MLB MLs need 4.5% (was 3.5% for all)

  const add=(type,side,line,odds,book,edge,reasons,minEdge)=>{
    if(edge<minEdge)return;
    // Confidence: sport-aware tiers
    const highBar=isMlSport?6:5;
    const medBar=isMlSport?5:4;
    const conf=edge>=highBar?"HIGH":edge>=medBar?"MEDIUM":"LOW";
    recs.push({type,side,line,odds,book,edge:+edge.toFixed(1),units:suggestUnits(edge),conf,reasons});
  };

  // Helper: gather research reasons for a side
  const resFor=(team,opp)=>{
    if(!research)return[];
    const r=[];
    research.factors.filter(f=>f.team===team&&f.impact>0).forEach(f=>r.push(f.detail));
    research.factors.filter(f=>f.team===opp&&f.impact<0).forEach(f=>r.push(f.detail));
    return r;
  };

  // ── Spread recs ──
  if(game.spreadLines){
    for(const sl of game.spreadLines){
      if(sl.bestAwayEdge>spreadMin){
        const r=[`${sl.bestAwayEdge.toFixed(1)}% edge vs ${game.conSrc} consensus`];
        if(sl.bestAwayBook)r.push(`Best number at ${sl.bestAwayBook}`);
        r.push(...resFor(game.away_team,game.home_team));
        add("Spread",game.away_team,sl.awaySpread,sl.bestAwayOdds,sl.bestAwayBook,sl.bestAwayEdge,r,spreadMin);
      }
      if(sl.bestHomeEdge>spreadMin){
        const r=[`${sl.bestHomeEdge.toFixed(1)}% edge vs ${game.conSrc} consensus`];
        if(sl.bestHomeBook)r.push(`Best number at ${sl.bestHomeBook}`);
        r.push(...resFor(game.home_team,game.away_team));
        add("Spread",game.home_team,sl.homeSpread,sl.bestHomeOdds,sl.bestHomeBook,sl.bestHomeEdge,r,spreadMin);
      }
    }
  }

  // ── Total recs ──
  if(game.totalLines){
    for(const tl of game.totalLines){
      if(tl.bestOverEdge>totalMin){
        const r=[`${tl.bestOverEdge.toFixed(1)}% edge on Over ${tl.total}`];
        if(tl.bestOverBook)r.push(`Best number at ${tl.bestOverBook}`);
        if(research){
          const fatigue=research.factors.filter(f=>f.type==="compound"||f.label==="B2B");
          if(fatigue.length)r.push("Fatigue factor may slow pace — caution on Over");
        }
        add("Total","Over",tl.total,tl.bestOverOdds,tl.bestOverBook,tl.bestOverEdge,r,totalMin);
      }
      if(tl.bestUnderEdge>totalMin){
        const r=[`${tl.bestUnderEdge.toFixed(1)}% edge on Under ${tl.total}`];
        if(tl.bestUnderBook)r.push(`Best number at ${tl.bestUnderBook}`);
        add("Total","Under",tl.total,tl.bestUnderOdds,tl.bestUnderBook,tl.bestUnderEdge,r,totalMin);
      }
    }
  }

  // ── Moneyline recs — sport-aware minimum ──
  if(game.mlData){
    const ml=game.mlData;
    if(ml.bestAwayEdge>mlMin)add("ML",game.away_team,"",ml.bestAwayOdds,ml.bestAwayBook,ml.bestAwayEdge,[`${ml.bestAwayEdge.toFixed(1)}% ML edge at ${ml.bestAwayBook}`],mlMin);
    if(ml.bestHomeEdge>mlMin)add("ML",game.home_team,"",ml.bestHomeOdds,ml.bestHomeBook,ml.bestHomeEdge,[`${ml.bestHomeEdge.toFixed(1)}% ML edge at ${ml.bestHomeBook}`],mlMin);
  }

  recs.sort((a,b)=>b.edge-a.edge);
  return recs;
}

// §9  DATA PROCESSING
// ════════════════════════════════════════════════════════════════

function processGames(raw,myBooks){
  return raw.map(g=>{
    const bms=g.bookmakers||[];
    const sharpBms=bms.filter(b=>SHARP_BOOKS.includes(b.key));
    const useSh=sharpBms.length>=MIN_SHARP;
    const conBms=useSh?sharpBms:bms;
    const conSrc=useSh?"sharp":"market";
    const sportType=SPORTS.find(s=>s.key===g.sport_key)?.type||"";

    // Helper: does user have this book?
    const hasBook=title=>!myBooks.length||myBooks.some(mb=>title.toLowerCase().includes(mb.toLowerCase()));

    // ── SPREADS ──
    const spreadMap=new Map();
    const shSpOdds=[];

    for(const bm of bms){
      const mk=bm.markets?.find(m=>m.key==="spreads");
      if(!mk)continue;
      const aw=mk.outcomes?.find(o=>o.name===g.away_team);
      const hm=mk.outcomes?.find(o=>o.name===g.home_team);
      if(!aw||!hm)continue;
      const k=`${aw.point}`;
      if(!spreadMap.has(k))spreadMap.set(k,[]);
      spreadMap.get(k).push({book:bm.title,bk:bm.key,awSp:aw.point,hmSp:hm.point,awOd:aw.price,hmOd:hm.price});
    }
    for(const bm of conBms){
      const mk=bm.markets?.find(m=>m.key==="spreads");
      if(!mk)continue;
      const aw=mk.outcomes?.find(o=>o.name===g.away_team);
      if(aw)shSpOdds.push(aw.price);
    }
    const shSpMed=median(shSpOdds);

    const spreadLines=[];
    for(const[,entries]of spreadMap){
      let bAE=0,bHE=0,bAB="",bHB="",bAO=0,bHO=0;
      for(const e of entries){
        if(!hasBook(e.book))continue;
        const ae=calcEdge(e.awOd,shSpMed),he=calcEdge(e.hmOd,shSpMed);
        if(ae>bAE){bAE=ae;bAB=e.book;bAO=e.awOd;}
        if(he>bHE){bHE=he;bHB=e.book;bHO=e.hmOd;}
      }
      spreadLines.push({...entries[0],entries,bestAwayEdge:bAE,bestHomeEdge:bHE,bestAwayBook:bAB,bestHomeBook:bHB,bestAwayOdds:bAO,bestHomeOdds:bHO,awaySpread:entries[0].awSp,homeSpread:entries[0].hmSp});
    }

    // ── TOTALS ──
    const totalMap=new Map();
    const shToOdds=[];

    for(const bm of bms){
      const mk=bm.markets?.find(m=>m.key==="totals");
      if(!mk)continue;
      const ov=mk.outcomes?.find(o=>o.name==="Over");
      const un=mk.outcomes?.find(o=>o.name==="Under");
      if(!ov||!un)continue;
      const k=`${ov.point}`;
      if(!totalMap.has(k))totalMap.set(k,[]);
      totalMap.get(k).push({book:bm.title,bk:bm.key,total:ov.point,ovOd:ov.price,unOd:un.price});
    }
    for(const bm of conBms){
      const mk=bm.markets?.find(m=>m.key==="totals");
      if(!mk)continue;
      const ov=mk.outcomes?.find(o=>o.name==="Over");
      if(ov)shToOdds.push(ov.price);
    }
    const shToMed=median(shToOdds);

    const totalLines=[];
    for(const[,entries]of totalMap){
      let bOE=0,bUE=0,bOB="",bUB="",bOO=0,bUO=0;
      for(const e of entries){
        if(!hasBook(e.book))continue;
        const oe=calcEdge(e.ovOd,shToMed),ue=calcEdge(e.unOd,shToMed);
        if(oe>bOE){bOE=oe;bOB=e.book;bOO=e.ovOd;}
        if(ue>bUE){bUE=ue;bUB=e.book;bUO=e.unOd;}
      }
      totalLines.push({...entries[0],entries,bestOverEdge:bOE,bestUnderEdge:bUE,bestOverBook:bOB,bestUnderBook:bUB,bestOverOdds:bOO,bestUnderOdds:bUO});
    }

    // ── MONEYLINES ──
    const shMlAw=[],shMlHm=[];
    for(const bm of conBms){
      const mk=bm.markets?.find(m=>m.key==="h2h");
      if(!mk)continue;
      const aw=mk.outcomes?.find(o=>o.name===g.away_team);
      const hm=mk.outcomes?.find(o=>o.name===g.home_team);
      if(aw)shMlAw.push(aw.price);
      if(hm)shMlHm.push(hm.price);
    }
    const shMlAwMed=median(shMlAw),shMlHmMed=median(shMlHm);

    let mlData={entries:[],bestAwayEdge:0,bestHomeEdge:0,bestAwayBook:"",bestHomeBook:"",bestAwayOdds:0,bestHomeOdds:0};
    for(const bm of bms){
      const mk=bm.markets?.find(m=>m.key==="h2h");
      if(!mk)continue;
      const aw=mk.outcomes?.find(o=>o.name===g.away_team);
      const hm=mk.outcomes?.find(o=>o.name===g.home_team);
      if(!aw||!hm)continue;
      mlData.entries.push({book:bm.title,bk:bm.key,awOd:aw.price,hmOd:hm.price});
      if(!hasBook(bm.title))continue;
      const ae=shMlAwMed?calcEdge(aw.price,shMlAwMed):0;
      const he=shMlHmMed?calcEdge(hm.price,shMlHmMed):0;
      if(ae>mlData.bestAwayEdge){mlData.bestAwayEdge=ae;mlData.bestAwayBook=bm.title;mlData.bestAwayOdds=aw.price;}
      if(he>mlData.bestHomeEdge){mlData.bestHomeEdge=he;mlData.bestHomeBook=bm.title;mlData.bestHomeOdds=hm.price;}
    }

    // ── Juice Signal ──
    let juiceSig=null;
    const jAw=[],jHm=[];
    for(const bm of bms){
      const mk=bm.markets?.find(m=>m.key==="spreads");
      if(!mk)continue;
      const aw=mk.outcomes?.find(o=>o.name===g.away_team);
      const hm=mk.outcomes?.find(o=>o.name===g.home_team);
      if(aw)jAw.push(aw.price);
      if(hm)jHm.push(hm.price);
    }
    if(jAw.length>=3){
      const avgA=jAw.reduce((a,b)=>a+b,0)/jAw.length;
      const avgH=jHm.reduce((a,b)=>a+b,0)/jHm.length;
      const diff=Math.abs(avgA-avgH);
      if(diff>5)juiceSig={side:avgA<avgH?g.away_team:g.home_team,strength:Math.min(Math.round(diff),10),detail:`Vig loaded toward ${avgA<avgH?g.away_team:g.home_team} (avg diff: ${diff.toFixed(0)})`};
    }

    // ── Half-point value ──
    let halfPtVal=0;
    const keyNums=sportType==="football"?[3,7,10,6,14,1,4]:sportType==="basketball"?[3,5,7,8]:[1,1.5];
    if(spreadLines.length){
      const spreads=[...new Set(spreadLines.map(s=>Math.abs(s.awaySpread)))];
      for(const sp of spreads){
        if(keyNums.some(k=>Math.abs(sp-k)<=0.5&&sp!==k)){
          halfPtVal=Math.max(halfPtVal,sportType==="football"?4:2);
        }
      }
    }

    const bestSpreadEdge=spreadLines.length?Math.max(...spreadLines.map(s=>Math.max(s.bestAwayEdge,s.bestHomeEdge))):0;
    const bestTotalEdge=totalLines.length?Math.max(...totalLines.map(t=>Math.max(t.bestOverEdge,t.bestUnderEdge))):0;
    const bestMlEdge=Math.max(mlData.bestAwayEdge,mlData.bestHomeEdge);

    return{
      ...g,spreadLines,totalLines,mlData,
      shSpMed,shToMed,shMlAwMed,shMlHmMed,
      conSrc,sharpN:sharpBms.length,sportType,
      juiceSig,halfPtVal,
      bestSpreadEdge,bestTotalEdge,bestMlEdge,
    };
  });
}

function SharpLine(){
  const[tab,setTab]=useState("scanner");
  const[sport,setSport]=useState("basketball_nba");
  const[games,setGames]=useState([]);
  const[loading,setLoading]=useState(false);
  const[credits,setCredits]=useState(null);
  const[expanded,setExpanded]=useState(null);
  const[bets,setBets]=useState([]);
  const[bankroll,setBankroll]=useState(()=>+(localStorage.getItem("sl-bankroll")||0));
  const[myBooks,setMyBooks]=useState(()=>{try{return JSON.parse(localStorage.getItem("sl-books")||"[]")}catch{return[]}});
  const[cache,setCache]=useState({});
  const[firstSeen,setFirstSeen]=useState({});
  const[scores,setScores]=useState({});
  const[clvIn,setClvIn]=useState({});
  const[manBet,setManBet]=useState(null);
  const[gView,setGView]=useState("spread");

  const unitSz=bankroll>0?Math.round(bankroll*0.01):0;

  // Load bets from Supabase
  useEffect(()=>{dbLoad().then(b=>setBets(b))},[]);
  useEffect(()=>{localStorage.setItem("sl-bankroll",bankroll)},[bankroll]);
  useEffect(()=>{localStorage.setItem("sl-books",JSON.stringify(myBooks))},[myBooks]);

  // ── Fetch odds (MANUAL ONLY) ──
  const fetchOdds=useCallback(async()=>{
    setLoading(true);
    try{
      const res=await fetch(`/api/odds?sport=${sport}&markets=spreads,totals,h2h`);
      const data=await res.json();
      const rem=res.headers.get("x-requests-remaining");
      if(rem)setCredits(+rem);

      const proc=processGames(data,myBooks);

      // First-seen for line movement
      setFirstSeen(prev=>{
        const n={...prev};
        for(const g of proc){
          if(!n[g.id])n[g.id]={sp:g.spreadLines[0]?.awaySpread,to:g.totalLines[0]?.total,t:Date.now()};
        }
        return n;
      });

      // Attach movement
      for(const g of proc){
        const fs=firstSeen[g.id];
        if(fs){
          const cSp=g.spreadLines[0]?.awaySpread;
          const cTo=g.totalLines[0]?.total;
          if(cSp!==undefined&&fs.sp!==undefined){
            g.movement={spreadDelta:cSp-fs.sp,totalDelta:(cTo||0)-(fs.to||0),firstSp:fs.sp,firstTo:fs.to};
          }
        }
      }

      setGames(proc);
      setCache(prev=>({...prev,[sport]:{data:proc,time:Date.now()}}));

      // Fetch scores for research
      if(!scores[sport]){
        try{
          const sr=await fetch(`/api/research?sport=${sport}&type=scores`);
          const sd=await sr.json();
          if(Array.isArray(sd))setScores(prev=>({...prev,[sport]:sd}));
        }catch(e){console.warn("Scores:",e);}
      }
    }catch(err){console.error("Fetch:",err);}
    setLoading(false);
  },[sport,myBooks,firstSeen,scores]);

  // Load from cache on sport switch
  useEffect(()=>{
    if(cache[sport])setGames(cache[sport].data);
    else setGames([]);
  },[sport]);

  // Enrich with research + scoring + recs
  const enriched=useMemo(()=>{
    return games.map(g=>{
      const research=analyzeResearch(g,scores[sport]||[]);
      const score=scoreGame(g,research);
      const recs=genRecs(g,research);
      return{...g,research,score,recs};
    }).sort((a,b)=>b.score.total-a.score.total);
  },[games,scores,sport]);

  // ── Bet actions ──
  const trackBet=async bet=>{
    const id=await dbAdd(bet);
    if(id)setBets(prev=>[{...bet,id},...prev]);
  };
  const updateResult=async(id,result)=>{
    await dbUpdate(id,{result});
    setBets(prev=>prev.map(b=>b.id===id?{...b,result}:b));
  };
  const enterCLV=async(id,closingOdds)=>{
    const bet=bets.find(b=>b.id===id);
    if(!bet)return;
    const clv=calcCLV(bet.entryOdds||bet.odds,closingOdds);
    await dbUpdate(id,{closingOdds,clv});
    setBets(prev=>prev.map(b=>b.id===id?{...b,closingOdds,clv}:b));
  };
  const deleteBet=async id=>{
    await dbDel(id);
    setBets(prev=>prev.filter(b=>b.id!==id));
  };

  // ── Stats ──
  const stats=useMemo(()=>{
    const settled=bets.filter(b=>b.result==="W"||b.result==="L");
    const W=settled.filter(b=>b.result==="W").length;
    const L=settled.filter(b=>b.result==="L").length;
    const P=bets.filter(b=>b.result==="P").length;
    const clvB=bets.filter(b=>b.clv!=null);
    const avgClv=clvB.length?clvB.reduce((s,b)=>s+b.clv,0)/clvB.length:0;
    let wagered=0,returned=0;
    for(const b of settled){
      const w=(b.units||1)*(unitSz||100);
      wagered+=w;
      if(b.result==="W")returned+=w*a2d(b.odds);
    }
    const roi=wagered?((returned-wagered)/wagered*100):0;
    const profit=returned-wagered;
    const bySport={},byType={};
    for(const b of bets){
      if(!bySport[b.sport])bySport[b.sport]={n:0,w:0,l:0};
      bySport[b.sport].n++;if(b.result==="W")bySport[b.sport].w++;if(b.result==="L")bySport[b.sport].l++;
      if(!byType[b.type])byType[b.type]={n:0,w:0,l:0};
      byType[b.type].n++;if(b.result==="W")byType[b.type].w++;if(b.result==="L")byType[b.type].l++;
    }
    return{W,L,P,total:bets.length,settled:settled.length,wr:settled.length?(W/settled.length*100):0,avgClv,clvN:clvB.length,roi,profit,wagered,bySport,byType};
  },[bets,unitSz]);

  // ════════════════════════════════════════════════════════════
  // UI COMPONENTS
  // ════════════════════════════════════════════════════════════

  const Badge=({children,bg,color,style:s})=>(
    <span style={{display:"inline-flex",alignItems:"center",padding:"2px 7px",borderRadius:3,fontSize:10,fontWeight:700,fontFamily:F.m,background:bg||T.bdr,color:color||T.tx,letterSpacing:".02em",...s}}>{children}</span>
  );

  const Btn=({children,onClick,pri,sm,dis,style:s})=>(
    <button disabled={dis} onClick={onClick} style={{padding:sm?"4px 10px":"8px 16px",borderRadius:4,border:"none",fontSize:sm?10:12,fontWeight:700,fontFamily:F.m,cursor:dis?"not-allowed":"pointer",opacity:dis?0.4:1,background:pri?T.gold:T.bdr,color:pri?"#0a0e14":T.tx,transition:"all .15s",position:"relative",zIndex:1,...s}}>{children}</button>
  );

  // ════════════════════════════════════════════════════════════
  // GAME CARD
  // ════════════════════════════════════════════════════════════

  const GameCard=({game:g,index:idx})=>{
    const exp=expanded===g.id;
    const bestE=Math.max(g.bestSpreadEdge,g.bestTotalEdge,g.bestMlEdge);
    const isMlSp=g.sportType==="hockey"||g.sportType==="baseball";
    const edgeBadgeMin=isMlSp?4:3;  // NHL/MLB need 4% to show EDGE badge
    const noPlayMax=isMlSp?3:2;     // NHL/MLB: under 3% = NO PLAY
    const time=new Date(g.commence_time).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
    const res=g.research,sc=g.score,recs=g.recs;

    return(
      <div className="fade-up" style={{animationDelay:`${idx*40}ms`,background:T.card,border:`1px solid ${bestE>=5?T.gold+"40":T.bdr}`,borderRadius:8,marginBottom:8,overflow:"hidden"}}>
        {/* Header */}
        <div onClick={()=>setExpanded(exp?null:g.id)} style={{padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:T.txB,marginBottom:3}}>{g.away_team} <span style={{color:T.mut,fontWeight:400}}>@</span> {g.home_team}</div>
            <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:T.mut,fontFamily:F.m}}>{time}</span>
              {sc&&<Badge bg={sc.grade==="A"?T.grnB:sc.grade==="B"?T.bluB:sc.grade==="C"?T.ornB:T.bdr} color={sc.grade==="A"?T.grn:sc.grade==="B"?T.blu:sc.grade==="C"?T.orn:T.mut}>{sc.grade}·{sc.total}</Badge>}
              {bestE>=edgeBadgeMin&&<Badge bg={bestE>5?T.gold+"20":T.grnB} color={bestE>5?T.gold:T.grn}>EDGE {bestE.toFixed(1)}%</Badge>}
              {recs.length>0&&<Badge bg={T.gold+"15"} color={T.gold}>⚡{recs.length}</Badge>}
              {res&&res.factors.length>0&&<Badge bg={T.purB} color={T.pur}>📋{res.factors.length}</Badge>}
              {g.movement&&Math.abs(g.movement.spreadDelta)>0&&<Badge bg={T.bluB} color={T.blu}>{g.movement.spreadDelta>0?"↑":"↓"}{Math.abs(g.movement.spreadDelta).toFixed(1)}</Badge>}
              {bestE<noPlayMax&&recs.length===0&&<Badge bg={T.bdr} color={T.mut}>NO PLAY</Badge>}
            </div>
          </div>
          <span style={{color:T.mut,fontSize:16,transform:exp?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
        </div>

        {/* Expanded Detail */}
        {exp&&(
          <div style={{padding:"0 14px 14px",borderTop:`1px solid ${T.bdr}`}}>

            {/* Research Factors */}
            {res&&res.factors.length>0&&(
              <div style={{marginTop:12,marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:700,color:T.pur,fontFamily:F.m,marginBottom:6,textTransform:"uppercase",letterSpacing:".05em"}}>📋 Research Factors</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {res.factors.map((f,i)=>(
                    <div key={i} style={{padding:"5px 9px",background:f.color+"15",border:`1px solid ${f.color}30`,borderRadius:4,fontSize:10,fontFamily:F.m}}>
                      <span style={{color:f.color,fontWeight:700}}>{f.label}</span>
                      <span style={{color:T.mut,marginLeft:6}}>{f.detail}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Sharp Calls */}
            {recs.length>0&&(
              <div style={{marginTop:8,marginBottom:12}}>
                <div style={{fontSize:10,fontWeight:700,color:T.gold,fontFamily:F.m,marginBottom:6,textTransform:"uppercase",letterSpacing:".05em"}}>⚡ Sharp Calls</div>
                {recs.map((r,i)=>(
                  <div key={i} style={{padding:"10px 12px",background:T.gold+"08",border:`1px solid ${T.gold}25`,borderRadius:6,marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div>
                        <span style={{fontSize:13,fontWeight:800,color:T.txB}}>{r.type==="Total"?`${r.side} ${r.line}`:`${r.side} ${r.line}`}</span>
                        <span style={{fontSize:11,color:T.gold,fontFamily:F.m,marginLeft:8}}>{r.odds>0?"+":""}{r.odds}</span>
                        <span style={{fontSize:10,color:T.mut,fontFamily:F.m,marginLeft:8}}>@ {r.book}</span>
                      </div>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <Badge bg={r.conf==="HIGH"?T.grnB:r.conf==="MEDIUM"?T.ornB:T.bdr} color={r.conf==="HIGH"?T.grn:r.conf==="MEDIUM"?T.orn:T.mut}>{r.conf}</Badge>
                        <Badge bg={T.gold+"20"} color={T.gold}>{r.edge}% · {r.units}u</Badge>
                      </div>
                    </div>
                    <div style={{fontSize:10,color:T.mut,fontFamily:F.m,lineHeight:1.6}}>
                      {r.reasons.map((reason,ri)=><div key={ri}>· {reason}</div>)}
                    </div>
                    <Btn sm pri style={{marginTop:8}} onClick={(e)=>{e.stopPropagation();trackBet({
                      sport:SPORTS.find(s=>s.key===sport)?.label||sport,
                      game:`${g.away_team} @ ${g.home_team}`,
                      type:r.type,line:String(r.line||""),odds:r.odds,
                      book:r.book,edge:r.edge,units:r.units,entryOdds:r.odds,
                    })}}>+ Track This Bet</Btn>
                  </div>
                ))}
              </div>
            )}

            {/* Market View Tabs */}
            <div style={{display:"flex",gap:4,marginTop:8,marginBottom:8}}>
              {["spread","total","ml"].map(v=>(
                <span key={v} onClick={()=>setGView(v)} style={{padding:"4px 12px",borderRadius:3,fontSize:10,fontWeight:600,fontFamily:F.m,cursor:"pointer",background:gView===v?T.gold+"20":T.bdr,color:gView===v?T.gold:T.mut,textTransform:"uppercase"}}>{v==="ml"?"Moneyline":v}</span>
              ))}
            </div>

            {/* ── SPREAD TABLE ── */}
            {gView==="spread"&&g.spreadLines.map((sl,si)=>(
              <div key={si} style={{marginBottom:8}}>
                <div style={{fontSize:10,color:T.mut,fontFamily:F.m,marginBottom:4}}>
                  Spread: {g.away_team} {sl.awaySpread>0?"+":""}{sl.awaySpread}
                  {g.movement&&g.movement.spreadDelta!==0&&<span style={{color:T.blu,marginLeft:6}}>(was {g.movement.firstSp>0?"+":""}{g.movement.firstSp} → {g.movement.spreadDelta>0?"↑":"↓"}{Math.abs(g.movement.spreadDelta).toFixed(1)})</span>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto auto",gap:1,fontSize:10,fontFamily:F.m}}>
                  <div style={{padding:"4px 6px",color:T.mut,fontWeight:700}}>Book</div>
                  <div style={{padding:"4px 6px",color:T.mut,fontWeight:700,textAlign:"center"}}>Away</div>
                  <div style={{padding:"4px 6px",color:T.mut,fontWeight:700,textAlign:"center"}}>Home</div>
                  <div style={{padding:"4px 6px",color:T.mut,fontWeight:700,textAlign:"center"}}>Edge</div>
                  <div style={{padding:"4px 6px"}}></div>
                  {sl.entries.sort((a,b)=>b.awOd-a.awOd).map((e,ei)=>{
                    const isSh=SHARP_BOOKS.includes(e.bk);
                    const ae=calcEdge(e.awOd,g.shSpMed),he=calcEdge(e.hmOd,g.shSpMed);
                    const best=ae>he?"away":"home";
                    const thisE=Math.max(ae,he);
                    return(
                      <React.Fragment key={ei}>
                        <div style={{padding:"5px 6px",color:isSh?T.grn:T.tx,background:ei%2?T.card2:"transparent",borderRadius:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.book}{isSh?" ★":""}</div>
                        <div style={{padding:"5px 6px",textAlign:"center",background:ei%2?T.card2:"transparent",color:ae>3?T.grn:T.tx,fontWeight:ae>3?700:400}}>{e.awOd>0?"+":""}{e.awOd}</div>
                        <div style={{padding:"5px 6px",textAlign:"center",background:ei%2?T.card2:"transparent",color:he>3?T.grn:T.tx,fontWeight:he>3?700:400}}>{e.hmOd>0?"+":""}{e.hmOd}</div>
                        <div style={{padding:"5px 6px",textAlign:"center",background:ei%2?T.card2:"transparent",color:thisE>5?T.gold:thisE>3?T.grn:thisE>1?T.mut+"99":T.mut}}>{thisE>.5?thisE.toFixed(1)+"%":"—"}</div>
                        <div style={{padding:"3px 4px",background:ei%2?T.card2:"transparent"}}>
                          {thisE>3&&<Btn sm pri onClick={(e)=>{e.stopPropagation();trackBet({
                            sport:SPORTS.find(s=>s.key===sport)?.label||sport,
                            game:`${g.away_team} @ ${g.home_team}`,
                            type:"Spread",line:`${best==="away"?e.awSp:e.hmSp}`,
                            odds:best==="away"?e.awOd:e.hmOd,book:e.book,
                            edge:+thisE.toFixed(1),units:suggestUnits(thisE),
                            entryOdds:best==="away"?e.awOd:e.hmOd,
                          })}}>+</Btn>}
                        </div>
                      </React.Fragment>
                    );
                  })}
                </div>
              </div>
            ))}

            {/* ── TOTAL TABLE ── */}
            {gView==="total"&&g.totalLines.map((tl,ti)=>(
              <div key={ti} style={{marginBottom:8}}>
                <div style={{fontSize:10,color:T.mut,fontFamily:F.m,marginBottom:4}}>
                  Total: {tl.total}
                  {g.movement&&g.movement.totalDelta!==0&&<span style={{color:T.blu,marginLeft:6}}>(was {g.movement.firstTo} → {g.movement.totalDelta>0?"↑":"↓"}{Math.abs(g.movement.totalDelta).toFixed(1)})</span>}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto auto",gap:1,fontSize:10,fontFamily:F.m}}>
                  <div style={{padding:"4px 6px",color:T.mut,fontWeight:700}}>Book</div>
                  <div style={{padding:"4px 6px",color:T.mut,fontWeight:700,textAlign:"center"}}>Over</div>
                  <div style={{padding:"4px 6px",color:T.mut,fontWeight:700,textAlign:"center"}}>Under</div>
                  <div style={{padding:"4px 6px",color:T.mut,fontWeight:700,textAlign:"center"}}>Edge</div>
                  <div style={{padding:"4px 6px"}}></div>
                  {tl.entries.sort((a,b)=>b.ovOd-a.ovOd).map((e,ei)=>{
                    const isSh=SHARP_BOOKS.includes(e.bk);
                    const oe=calcEdge(e.ovOd,g.shToMed),ue=calcEdge(e.unOd,g.shToMed);
                    const best=oe>ue?"over":"under";
                    const thisE=Math.max(oe,ue);
                    return(
                      <React.Fragment key={ei}>
                        <div style={{padding:"5px 6px",color:isSh?T.grn:T.tx,background:ei%2?T.card2:"transparent"}}>{e.book}{isSh?" ★":""}</div>
                        <div style={{padding:"5px 6px",textAlign:"center",background:ei%2?T.card2:"transparent",color:oe>3?T.grn:T.tx,fontWeight:oe>3?700:400}}>{e.ovOd>0?"+":""}{e.ovOd}</div>
                        <div style={{padding:"5px 6px",textAlign:"center",background:ei%2?T.card2:"transparent",color:ue>3?T.grn:T.tx,fontWeight:ue>3?700:400}}>{e.unOd>0?"+":""}{e.unOd}</div>
                        <div style={{padding:"5px 6px",textAlign:"center",background:ei%2?T.card2:"transparent",color:thisE>5?T.gold:thisE>3?T.grn:thisE>1?T.mut+"99":T.mut}}>{thisE>.5?thisE.toFixed(1)+"%":"—"}</div>
                        <div style={{padding:"3px 4px",background:ei%2?T.card2:"transparent"}}>
                          {thisE>3&&<Btn sm pri onClick={(e)=>{e.stopPropagation();trackBet({
                            sport:SPORTS.find(s=>s.key===sport)?.label||sport,
                            game:`${g.away_team} @ ${g.home_team}`,
                            type:"Total",line:`${best==="over"?"O":"U"} ${tl.total}`,
                            odds:best==="over"?e.ovOd:e.unOd,book:e.book,
                            edge:+thisE.toFixed(1),units:suggestUnits(thisE),
                            entryOdds:best==="over"?e.ovOd:e.unOd,
                          })}}>+</Btn>}
                        </div>
                      </React.Fragment>
                    );
                  })}
                </div>
              </div>
            ))}

            {/* ── MONEYLINE TABLE ── */}
            {gView==="ml"&&g.mlData.entries.length>0&&(
              <div style={{marginBottom:8}}>
                <div style={{fontSize:10,color:T.mut,fontFamily:F.m,marginBottom:4}}>Moneyline</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:1,fontSize:10,fontFamily:F.m}}>
                  <div style={{padding:"4px 6px",color:T.mut,fontWeight:700}}>Book</div>
                  <div style={{padding:"4px 6px",color:T.mut,fontWeight:700,textAlign:"center"}}>{g.away_team.split(" ").pop()}</div>
                  <div style={{padding:"4px 6px",color:T.mut,fontWeight:700,textAlign:"center"}}>{g.home_team.split(" ").pop()}</div>
                  <div style={{padding:"4px 6px",color:T.mut,fontWeight:700,textAlign:"center"}}>Edge</div>
                  {g.mlData.entries.sort((a,b)=>b.awOd-a.awOd).map((e,ei)=>{
                    const isSh=SHARP_BOOKS.includes(e.bk);
                    const ae=g.shMlAwMed?calcEdge(e.awOd,g.shMlAwMed):0;
                    const he=g.shMlHmMed?calcEdge(e.hmOd,g.shMlHmMed):0;
                    const thisE=Math.max(ae,he);
                    return(
                      <React.Fragment key={ei}>
                        <div style={{padding:"5px 6px",color:isSh?T.grn:T.tx,background:ei%2?T.card2:"transparent"}}>{e.book}{isSh?" ★":""}</div>
                        <div style={{padding:"5px 6px",textAlign:"center",background:ei%2?T.card2:"transparent",color:ae>2?T.grn:T.tx}}>{e.awOd>0?"+":""}{e.awOd}</div>
                        <div style={{padding:"5px 6px",textAlign:"center",background:ei%2?T.card2:"transparent",color:he>2?T.grn:T.tx}}>{e.hmOd>0?"+":""}{e.hmOd}</div>
                        <div style={{padding:"5px 6px",textAlign:"center",background:ei%2?T.card2:"transparent",color:thisE>3?T.gold:thisE>2?T.grn:T.mut}}>{thisE>.5?thisE.toFixed(1)+"%":"—"}</div>
                      </React.Fragment>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Consensus Footer */}
            <div style={{marginTop:8,padding:"6px 10px",background:T.card2,borderRadius:4,fontSize:9,fontFamily:F.m,color:T.mut}}>
              Benchmark: {g.conSrc==="sharp"?`${g.sharpN} sharp books (Pinnacle/Circa/Bookmaker)`:"Full market median"} · Spread: {g.shSpMed>0?"+":""}{g.shSpMed} · Total: {g.shToMed>0?"+":""}{g.shToMed}
              {g.juiceSig&&<span style={{color:T.orn}}> · Juice: {g.juiceSig.detail}</span>}
            </div>
          </div>
        )}
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════
  // TRACKER VIEW
  // ════════════════════════════════════════════════════════════

  const Tracker=()=>{
    const pending=bets.filter(b=>!b.result);
    const needClv=bets.filter(b=>b.result&&!b.closingOdds);
    const settled=bets.filter(b=>b.result);

    return(
      <div>
        <Btn pri onClick={()=>setManBet(manBet?null:{sport:"",game:"",type:"Spread",line:"",odds:"",book:"",edge:0,units:1})} style={{marginBottom:12,width:"100%"}}>
          {manBet?"✕ Cancel":"+ Log Bet Manually"}
        </Btn>

        {manBet&&(
          <div style={{padding:14,background:T.card,border:`1px solid ${T.bdr}`,borderRadius:8,marginBottom:12}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              {[{l:"Sport",k:"sport",p:"NBA"},{l:"Game",k:"game",p:"Away @ Home"},{l:"Type",k:"type",p:"Spread"},{l:"Line",k:"line",p:"-3.5"},{l:"Odds",k:"odds",p:"-110"},{l:"Book",k:"book",p:"DraftKings"},{l:"Edge %",k:"edge",p:"2.5"},{l:"Units",k:"units",p:"2"}].map(f=>(
                <div key={f.k}>
                  <div style={{fontSize:9,color:T.mut,fontFamily:F.m,marginBottom:2}}>{f.l}</div>
                  <input value={manBet[f.k]} onChange={e=>setManBet(p=>({...p,[f.k]:e.target.value}))} placeholder={f.p} style={{width:"100%",padding:"6px 8px",background:T.card2,border:`1px solid ${T.bdr}`,borderRadius:4,color:T.tx,fontSize:12,fontFamily:F.m,outline:"none"}}/>
                </div>
              ))}
            </div>
            <Btn pri onClick={()=>{trackBet({...manBet,odds:+manBet.odds,edge:+manBet.edge,units:+manBet.units,entryOdds:+manBet.odds});setManBet(null);}}>Save Bet</Btn>
          </div>
        )}

        {pending.length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:700,color:T.gold,fontFamily:F.m,marginBottom:6,textTransform:"uppercase"}}>Pending ({pending.length})</div>
            {pending.map(b=>(
              <div key={b.id} style={{padding:"10px 12px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:6,marginBottom:6}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <span style={{fontSize:12,fontWeight:700,color:T.txB}}>{b.game}</span>
                    <div style={{fontSize:10,color:T.mut,fontFamily:F.m,marginTop:2}}>{b.type} {b.line} · {b.odds>0?"+":""}{b.odds} · {b.book} · {b.units}u</div>
                  </div>
                  <div style={{display:"flex",gap:4}}>
                    <Btn sm style={{background:T.grnB,color:T.grn}} onClick={()=>updateResult(b.id,"W")}>W</Btn>
                    <Btn sm style={{background:T.redB,color:T.red}} onClick={()=>updateResult(b.id,"L")}>L</Btn>
                    <Btn sm onClick={()=>updateResult(b.id,"P")}>P</Btn>
                    <Btn sm style={{background:T.redB,color:T.red}} onClick={()=>deleteBet(b.id)}>✕</Btn>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {needClv.length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:700,color:T.blu,fontFamily:F.m,marginBottom:6,textTransform:"uppercase"}}>Enter Closing Lines ({needClv.length})</div>
            {needClv.map(b=>(
              <div key={b.id} style={{padding:"10px 12px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:6,marginBottom:6}}>
                <div style={{fontSize:11,fontWeight:600,color:T.txB,marginBottom:4}}>{b.game} — {b.type} {b.line}</div>
                <div style={{fontSize:10,color:T.mut,fontFamily:F.m,marginBottom:6}}>Entry: {b.odds>0?"+":""}{b.odds} · Result: <span style={{color:b.result==="W"?T.grn:T.red}}>{b.result}</span></div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input type="number" placeholder="Closing odds (e.g. -115)" value={clvIn[b.id]||""} onChange={e=>setClvIn(p=>({...p,[b.id]:e.target.value}))} style={{flex:1,padding:"6px 8px",background:T.card2,border:`1px solid ${T.bdr}`,borderRadius:4,color:T.tx,fontSize:11,fontFamily:F.m,outline:"none"}}/>
                  {clvIn[b.id]&&(
                    <span style={{fontSize:10,fontFamily:F.m,color:calcCLV(b.entryOdds||b.odds,+clvIn[b.id])>0?T.grn:T.red}}>
                      CLV: {calcCLV(b.entryOdds||b.odds,+clvIn[b.id]).toFixed(1)}%
                    </span>
                  )}
                  <Btn sm pri dis={!clvIn[b.id]} onClick={()=>{enterCLV(b.id,+clvIn[b.id]);setClvIn(p=>{const n={...p};delete n[b.id];return n;});}}>Save</Btn>
                </div>
              </div>
            ))}
          </div>
        )}

        {settled.length>0&&(
          <div>
            <div style={{fontSize:10,fontWeight:700,color:T.mut,fontFamily:F.m,marginBottom:6,textTransform:"uppercase"}}>History ({settled.length})</div>
            {settled.map(b=>(
              <div key={b.id} style={{padding:"8px 12px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:6,marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{flex:1}}>
                  <span style={{fontSize:11,color:T.txB,fontWeight:600}}>{b.game}</span>
                  <div style={{fontSize:9,color:T.mut,fontFamily:F.m,marginTop:2}}>
                    {b.type} {b.line} · {b.odds>0?"+":""}{b.odds} · {b.book}
                    {b.clv!=null&&<span style={{color:b.clv>0?T.grn:T.red,marginLeft:6}}>CLV: {b.clv>0?"+":""}{b.clv.toFixed(1)}%</span>}
                  </div>
                </div>
                <Badge bg={b.result==="W"?T.grnB:b.result==="L"?T.redB:T.bdr} color={b.result==="W"?T.grn:b.result==="L"?T.red:T.mut}>{b.result}</Badge>
              </div>
            ))}
          </div>
        )}

        {!bets.length&&<div style={{textAlign:"center",padding:40,color:T.mut,fontSize:12,fontFamily:F.m}}>No bets tracked yet. Use the scanner to find edges.</div>}
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════
  // DASHBOARD VIEW
  // ════════════════════════════════════════════════════════════

  const Dashboard=()=>{
    const Stat=({label,value,sub,color})=>(
      <div style={{padding:"14px 12px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:8,textAlign:"center"}}>
        <div style={{fontSize:22,fontWeight:800,color:color||T.txB,fontFamily:F.m}}>{value}</div>
        <div style={{fontSize:9,color:T.mut,fontFamily:F.m,marginTop:2,textTransform:"uppercase",letterSpacing:".05em"}}>{label}</div>
        {sub&&<div style={{fontSize:9,color:T.mut,fontFamily:F.m,marginTop:2}}>{sub}</div>}
      </div>
    );

    return(
      <div>
        <div style={{padding:"12px 14px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:8,marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:10,color:T.mut,fontFamily:F.m,whiteSpace:"nowrap"}}>Bankroll $</div>
          <input type="number" value={bankroll||""} onChange={e=>setBankroll(+e.target.value)} placeholder="5000" style={{flex:1,padding:"6px 8px",background:T.card2,border:`1px solid ${T.bdr}`,borderRadius:4,color:T.gold,fontSize:14,fontWeight:700,fontFamily:F.m,outline:"none"}}/>
          <div style={{fontSize:10,color:T.mut,fontFamily:F.m}}>1u = ${unitSz.toLocaleString()}</div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
          <Stat label="Record" value={`${stats.W}-${stats.L}`} sub={stats.P?`${stats.P} pushes`:null}/>
          <Stat label="Win Rate" value={stats.wr?stats.wr.toFixed(1)+"%":"—"} color={stats.wr>55?T.grn:stats.wr>50?T.tx:T.red}/>
          <Stat label="ROI" value={stats.roi?(stats.roi>0?"+":"")+stats.roi.toFixed(1)+"%":"—"} color={stats.roi>0?T.grn:T.red}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
          <Stat label="Avg CLV" value={stats.avgClv?(stats.avgClv>0?"+":"")+stats.avgClv.toFixed(1)+"%":"—"} sub={`${stats.clvN} measured`} color={stats.avgClv>0?T.grn:T.red}/>
          <Stat label="Profit" value={stats.profit?(stats.profit>0?"+$":"-$")+Math.abs(Math.round(stats.profit)).toLocaleString():"—"} color={stats.profit>0?T.grn:T.red}/>
          <Stat label="Total Bets" value={stats.total} sub={`${stats.settled} settled`}/>
        </div>

        {Object.keys(stats.bySport).length>0&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,color:T.gold,fontFamily:F.m,marginBottom:6,textTransform:"uppercase"}}>By Sport</div>
            {Object.entries(stats.bySport).map(([sp,d])=>(
              <div key={sp} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:4,marginBottom:4,fontSize:11,fontFamily:F.m}}>
                <span style={{color:T.txB,fontWeight:600}}>{sp}</span>
                <span style={{color:T.mut}}>{d.w}-{d.l} ({d.n} bets) · {d.w+d.l>0?(d.w/(d.w+d.l)*100).toFixed(0):0}%</span>
              </div>
            ))}
          </div>
        )}

        {Object.keys(stats.byType).length>0&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,color:T.blu,fontFamily:F.m,marginBottom:6,textTransform:"uppercase"}}>By Type</div>
            {Object.entries(stats.byType).map(([tp,d])=>(
              <div key={tp} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:4,marginBottom:4,fontSize:11,fontFamily:F.m}}>
                <span style={{color:T.txB,fontWeight:600}}>{tp}</span>
                <span style={{color:T.mut}}>{d.w}-{d.l} ({d.n} bets) · {d.w+d.l>0?(d.w/(d.w+d.l)*100).toFixed(0):0}%</span>
              </div>
            ))}
          </div>
        )}

        <div style={{padding:"12px 14px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:8}}>
          <div style={{fontSize:10,fontWeight:700,color:T.gold,fontFamily:F.m,marginBottom:8,textTransform:"uppercase"}}>Unit Sizing Guide</div>
          <div style={{fontSize:10,color:T.mut,fontFamily:F.m,marginBottom:8,lineHeight:1.5}}>Walters: "limit your maximum wager to 3% of bankroll." Scale with edge, 0.5u increments.</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
            {[{r:"3–3.5%",u:"0.5 unit",n:0.5},{r:"3.5–4.5%",u:"1 unit",n:1},{r:"4.5–5.5%",u:"1.5 units",n:1.5},{r:"5.5–7%",u:"2 units",n:2},{r:"7%+",u:"2.5–3u MAX",n:3}].map(x=>(
              <div key={x.r} style={{padding:"8px 10px",background:T.card2,borderRadius:4,border:`1px solid ${T.bdr}`}}>
                <div style={{color:T.grn,fontSize:10,fontWeight:700,fontFamily:F.m}}>{x.r} edge</div>
                <div style={{color:T.txB,fontSize:12,fontWeight:700,fontFamily:F.m,marginTop:2}}>{x.u}</div>
                <div style={{color:T.gold,fontSize:10,fontFamily:F.m,marginTop:1}}>{bankroll>0?`$${(x.n*unitSz).toLocaleString()}`:"—"}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════
  // SETTINGS VIEW
  // ════════════════════════════════════════════════════════════

  const Settings=()=>(
    <div>
      <div style={{fontSize:10,fontWeight:700,color:T.gold,fontFamily:F.m,marginBottom:8,textTransform:"uppercase"}}>My Sportsbooks</div>
      <div style={{fontSize:10,color:T.mut,fontFamily:F.m,marginBottom:10,lineHeight:1.5}}>Select books you have accounts with. Edge calculations prioritize lines available to you. Leave empty to show all.</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
        {ALL_BOOKS.map(bk=>{
          const on=myBooks.includes(bk);
          return(<span key={bk} onClick={()=>setMyBooks(p=>on?p.filter(b=>b!==bk):[...p,bk])} style={{padding:"6px 12px",borderRadius:4,fontSize:11,fontWeight:600,fontFamily:F.m,cursor:"pointer",background:on?T.gold+"20":T.card2,color:on?T.gold:T.mut,border:`1px solid ${on?T.gold+"40":T.bdr}`}}>{bk}</span>);
        })}
      </div>
      <div style={{fontSize:10,fontWeight:700,color:T.blu,fontFamily:F.m,marginBottom:8,textTransform:"uppercase"}}>Account</div>
      <div style={{padding:"10px 12px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:6,fontSize:10,fontFamily:F.m,color:T.mut,lineHeight:1.8}}>
        Device ID: {UID}<br/>
        API Credits: {credits!==null?credits.toLocaleString():"—"}<br/>
        Database: Supabase (connected)<br/>
        Bets: {bets.length}
      </div>
    </div>
  );

  // ════════════════════════════════════════════════════════════
  // MAIN RENDER
  // ════════════════════════════════════════════════════════════

  const tabs=[
    {k:"scanner",l:"Scanner",i:"◎"},
    {k:"tracker",l:"Tracker",i:"▣",badge:bets.filter(b=>!b.result).length||null},
    {k:"dashboard",l:"Dashboard",i:"◧"},
    {k:"settings",l:"Settings",i:"⚙"},
  ];

  return(
    <div style={{maxWidth:520,margin:"0 auto",minHeight:"100vh",background:T.bg}}>
      {/* Header */}
      <div style={{padding:"16px 16px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:30,height:30,borderRadius:6,background:`linear-gradient(135deg,${T.gold},${T.goldD})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:T.bg,fontFamily:F.m}}>SL</div>
          <div style={{fontSize:15,fontWeight:800,color:T.txB,letterSpacing:".04em",fontFamily:F.m}}>SHARPLINE</div>
        </div>
        {credits!==null&&<div style={{fontSize:9,color:T.mut,fontFamily:F.m}}>{credits.toLocaleString()} credits</div>}
      </div>

      {/* Nav */}
      <div style={{display:"flex",gap:2,padding:"12px 16px 0",borderBottom:`1px solid ${T.bdr}`}}>
        {tabs.map(t=>(
          <div key={t.k} onClick={()=>setTab(t.k)} style={{padding:"8px 14px",cursor:"pointer",borderBottom:`2px solid ${tab===t.k?T.gold:"transparent"}`,display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:12,color:tab===t.k?T.gold:T.mut}}>{t.i}</span>
            <span style={{fontSize:11,fontWeight:600,color:tab===t.k?T.txB:T.mut,fontFamily:F.m}}>{t.l}</span>
            {t.badge&&<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:16,height:16,borderRadius:8,background:T.gold,color:T.bg,fontSize:9,fontWeight:800,fontFamily:F.m}}>{t.badge}</span>}
          </div>
        ))}
      </div>

      {/* Content */}
      <div style={{padding:16}}>
        {tab==="scanner"&&(
          <>
            <div style={{display:"flex",gap:4,marginBottom:10,overflowX:"auto",paddingBottom:4}}>
              {SPORTS.map(s=>(
                <div key={s.key} onClick={()=>setSport(s.key)} style={{padding:"6px 12px",borderRadius:4,cursor:"pointer",whiteSpace:"nowrap",background:sport===s.key?T.gold+"15":T.card,border:`1px solid ${sport===s.key?T.gold+"40":T.bdr}`,display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:12}}>{s.icon}</span>
                  <span style={{fontSize:11,fontWeight:600,color:sport===s.key?T.gold:T.mut,fontFamily:F.m}}>{s.label}</span>
                  {cache[s.key]&&<span style={{width:5,height:5,borderRadius:3,background:T.grn,display:"inline-block"}}></span>}
                </div>
              ))}
            </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <Btn pri onClick={fetchOdds} dis={loading}>{loading?"Loading...":"↻ Refresh Odds"}</Btn>
              <span style={{fontSize:9,color:T.mut,fontFamily:F.m}}>
                {cache[sport]?`Loaded ${Math.round((Date.now()-cache[sport].time)/6e4)}m ago`:"Not loaded"}
                {games.length>0&&` · ${games.length} games`}
              </span>
            </div>

            {enriched.length>0?(
              enriched.map((g,i)=><GameCard key={g.id} game={g} index={i}/>)
            ):(
              <div style={{textAlign:"center",padding:60,color:T.mut}}>
                <div style={{fontSize:32,marginBottom:12}}>◎</div>
                <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Hit Refresh to scan for edges</div>
                <div style={{fontSize:11,fontFamily:F.m}}>Manual refresh only — you control credit usage</div>
              </div>
            )}
          </>
        )}

        {tab==="tracker"&&<Tracker/>}
        {tab==="dashboard"&&<Dashboard/>}
        {tab==="settings"&&<Settings/>}

        <div style={{marginTop:24,paddingTop:12,borderTop:`1px solid ${T.bdr}`,textAlign:"center",color:T.mut,fontSize:8,fontFamily:F.m,lineHeight:1.8,letterSpacing:".05em"}}>
          LIVE ODDS · {myBooks.length||"ALL"} SPORTSBOOKS · CLOUD SYNC · SHARPLINE
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SharpLine/>);
</script>
</body>
</html>
