const BOOK_SHORT = {DraftKings:"DK",FanDuel:"FD",BetMGM:"MGM",Caesars:"CZR",PointsBet:"PB",Bet365:"365",BetRivers:"BRiv","Hard Rock Bet":"HRB",Fanatics:"FAN","ESPN BET":"ESPN",Betway:"BW",WynnBET:"WYNN",SuperBook:"SUP",Circa:"CRC",Pinnacle:"PIN",BetOnline:"BOL",Bovada:"BOV",Heritage:"HER",Bookmaker:"BKM","5Dimes":"5D"};

// ─── MATH ───
const a2i = (a) => a < 0 ? Math.abs(a)/(Math.abs(a)+100) : 100/(a+100);

// Edge calculation: implied probability difference
// This is the most honest measure of edge regardless of odds format
// For -110 vs -105: ~2.3% edge (correct, meaningful)
// For +220 vs +179: ~4.5% edge (correct, reflects actual EV difference)
// For +500 vs +400: ~3.3% edge (correct, not inflated)
// The old formula ((si-yi)/yi)*100 inflated plus-money edges because
// dividing by a small implied probability amplifies the result
function calcEdge(yours, sharp) {
  const yi = a2i(yours), si = a2i(sharp);
  
  // Method: use the raw implied probability point difference
  // This is what actually matters for your bankroll
  // If the sharp line implies 35% and your book implies 31%, that's a 4pp edge
  // We express this as a percentage relative to a standard -110 baseline
  // so edges feel comparable across different odds ranges
  const probDiffPoints = (si - yi) * 100; // e.g., 4.5 points
  
  // For standard juice markets (both sides near 50%), the old formula works fine
  // and produces similar results to probDiff
  // For plus-money markets, probDiff is the honest answer
  if (yi < 0.45 || si < 0.45) {
    // Plus-money territory: use probability point difference directly
    return Math.max(0, probDiffPoints);
  }
  
  // Standard market: use traditional formula (works correctly here)
  const traditional = ((si - yi) / yi) * 100;
  return Math.max(0, traditional);
}

const calcCLV = (entry, close) => { const e=a2i(entry),c=a2i(close); return ((c-e)/e)*100; };
const suggestUnits = (e) => e>=8?5:e>=6?4:e>=4?3:e>=3?2:1;

// Median helper for more robust consensus
function median(arr) {
  if (arr.length === 0) return 0;
  const sorted = [...arr].sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
}

function getDayLabel(date) {
  const d = new Date(date);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const gameDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = Math.round((gameDay - today) / (1000*60*60*24));
  if (diff === 0) return "Today";
  if (diff === 1) return "Tomorrow";
  if (diff < 0) return "Earlier";
  return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

function getDayKey(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

// ─── API FETCH ───
async function fetchOdds(sportApiKey) {
  // Fetch spreads and totals in one call using markets parameter
  const url = `${API_BASE}/odds?sport=${sportApiKey}&markets=spreads,totals`;
  try {
    const res = await fetch(url);
    if (!res.ok) {
      const remaining = res.headers.get("x-requests-remaining");
      console.warn(`API error ${res.status} for ${sportApiKey}. Credits remaining: ${remaining}`);
      return { games: [], remaining: remaining ? parseInt(remaining) : null, error: res.status === 401 ? "Invalid API key" : res.status === 429 ? "Rate limited" : `Error ${res.status}` };
    }
    const data = await res.json();
    const remaining = res.headers.get("x-requests-remaining");
    const used = res.headers.get("x-requests-used");
    return { games: data, remaining: remaining ? parseInt(remaining) : null, used: used ? parseInt(used) : null, error: null };
  } catch (err) {
    console.error(`Fetch error for ${sportApiKey}:`, err);
    return { games: [], remaining: null, error: "Network error" };
  }
}

function parseApiGames(apiGames, sportKey) {
  return apiGames.map(g => {
    const time = new Date(g.commence_time);
    const dayLabel = getDayLabel(time);
    const dayKey = getDayKey(time);

    // Extract book lines from API data
    const bookLines = [];
    const bookMap = {}; // bookName -> {spread, spreadOdds, total, totalOdds}

    (g.bookmakers || []).forEach(bm => {
      const bookName = BOOK_MAP[bm.key] || bm.title;
      if (!bookMap[bookName]) bookMap[bookName] = { book: bookName, spread: null, spreadOdds: null, total: null, totalOdds: null };

      (bm.markets || []).forEach(market => {
        if (market.key === "spreads") {
          // Get the home team spread (convention)
          const homeOutcome = market.outcomes.find(o => o.name === g.home_team);
          const awayOutcome = market.outcomes.find(o => o.name === g.away_team);
          if (homeOutcome) {
            bookMap[bookName].spread = homeOutcome.point;
            bookMap[bookName].spreadOdds = homeOutcome.price;
            bookMap[bookName].awaySpread = awayOutcome ? awayOutcome.point : -(homeOutcome.point);
            bookMap[bookName].awaySpreadOdds = awayOutcome ? awayOutcome.price : null;
          }
        }
        if (market.key === "totals") {
          const overOutcome = market.outcomes.find(o => o.name === "Over");
          if (overOutcome) {
            bookMap[bookName].total = overOutcome.point;
            bookMap[bookName].totalOdds = overOutcome.price;
          }
          const underOutcome = market.outcomes.find(o => o.name === "Under");
          if (underOutcome) {
            bookMap[bookName].underOdds = underOutcome.price;
          }
        }
      });
    });

    Object.values(bookMap).forEach(bl => {
      if (bl.spreadOdds !== null || bl.totalOdds !== null) bookLines.push(bl);
    });

    // Calculate sharp consensus line
    // Require 2+ sharp books for a reliable sharp consensus
    // Otherwise fall back to full market median (more robust than average)
    const sharpLines = bookLines.filter(bl => SHARP_BOOKS.includes(bl.book));
    const useSharp = sharpLines.length >= 2;
    const consensusLines = useSharp ? sharpLines : bookLines;
    
    const spreadOddsArr = consensusLines.filter(bl => bl.spreadOdds).map(bl => bl.spreadOdds);
    const totalOddsArr = consensusLines.filter(bl => bl.totalOdds).map(bl => bl.totalOdds);
    const sharpSpreadOdds = spreadOddsArr.length > 0 ? Math.round(median(spreadOddsArr)) : -110;
    const sharpTotalOdds = totalOddsArr.length > 0 ? Math.round(median(totalOddsArr)) : -110;
    const consensusSource = useSharp ? "sharp" : "market";

    // Calculate per-book edges vs sharp consensus
    const edges = bookLines.map(bl => ({
      book: bl.book,
      spreadEdge: bl.spreadOdds ? Math.max(0, calcEdge(bl.spreadOdds, sharpSpreadOdds)) : 0,
      totalEdge: bl.totalOdds ? Math.max(0, calcEdge(bl.totalOdds, sharpTotalOdds)) : 0,
    }));
    const maxSpreadEdge = edges.length > 0 ? Math.max(...edges.map(e => e.spreadEdge)) : 0;
    const maxTotalEdge = edges.length > 0 ? Math.max(...edges.map(e => e.totalEdge)) : 0;

    return {
      id: g.id,
      away: g.away_team,
      home: g.home_team,
      time,
      dayKey,
      dayLabel,
      bookLines,
      edges,
      maxSpreadEdge,
      maxTotalEdge,
      sharpSpreadOdds,
      sharpTotalOdds,
      consensusSource,
      live: time <= new Date(),
    };
  });
}

function getBookEdges(game, bf) {
  if (bf === "ALL") return { spreadEdge: game.maxSpreadEdge, totalEdge: game.maxTotalEdge };
  const e = game.edges.find(x => x.book === bf);
  return e || { spreadEdge: 0, totalEdge: 0 };
}

function EdgeBadge({edge,T}){
  const s=edge>=5,v=edge>=3;
  if(s) return <span style={{padding:"3px 8px",borderRadius:4,fontSize:11,fontWeight:800,fontFamily:F.mono,background:"rgba(63,185,80,0.25)",color:"#2ee06e",border:"1px solid rgba(63,185,80,0.5)",letterSpacing:0.3}}>▲ {edge.toFixed(1)}%</span>;
  if(v) return <span style={{padding:"3px 8px",borderRadius:4,fontSize:11,fontWeight:800,fontFamily:F.mono,background:"rgba(230,170,20,0.2)",color:"#f0b820",border:"1px solid rgba(230,170,20,0.45)",letterSpacing:0.3}}>● {edge.toFixed(1)}%</span>;
  return <span style={{padding:"3px 8px",borderRadius:4,fontSize:11,fontWeight:600,fontFamily:F.mono,background:T.bg,color:T.muted,border:`1px solid ${T.border}`,letterSpacing:0.3}}>{edge.toFixed(1)}%</span>;
}

          <div style={{display:"grid",gridTemplateColumns:"1fr repeat(4,auto)",gap:"5px 14px",fontSize:10,fontFamily:F.mono}}>

            <div style={{color:T.muted,fontWeight:600,textAlign:"right"}}>ODDS</div>

// ─── EXPOSURE WARNING ───
function ExposureWarning({bets,bankroll,unitSize,T}){
  if(bankroll<=0) return null;
  const pending=bets.filter(b=>!b.result);
  if(pending.length===0) return null;
  const totalAction=pending.reduce((s,b)=>s+b.units*unitSize,0);
  const pct=(totalAction/bankroll*100);
  const bySport={};
  pending.forEach(b=>{bySport[b.sport]=(bySport[b.sport]||0)+b.units*unitSize;});
  const worstSport=Object.entries(bySport).sort((a,b)=>b[1]-a[1])[0];
  const worstSportPct=worstSport?(worstSport[1]/bankroll*100):0;
  const todayBets=pending.filter(b=>{const d=new Date(b.timestamp);const t=new Date();return d.toDateString()===t.toDateString();});
  const todayPct=(todayBets.reduce((s,b)=>s+b.units*unitSize,0)/bankroll*100);
  const warnings=[];
  if(pct>=25) warnings.push(`${pct.toFixed(0)}% of bankroll in action (${pending.length} pending · $${totalAction.toLocaleString()})`);
  if(worstSportPct>=15) warnings.push(`${worstSportPct.toFixed(0)}% exposed to ${worstSport[0]}`);
  if(todayPct>=15) warnings.push(`${todayPct.toFixed(0)}% of bankroll bet today`);
  if(warnings.length===0) return null;
  return (
    <div style={{marginBottom:10,padding:"8px 12px",background:T.redBg,border:`1px solid ${T.red}22`,borderRadius:4}}>
      <div style={{color:T.red,fontSize:10,fontWeight:700,fontFamily:F.mono,marginBottom:2}}>⚠ EXPOSURE WARNING</div>

// ─── BET TRACKER ───
function BetTracker({bets,setBets,bankroll,unitSize,T}){
  const [showBreakdown,setShowBreakdown]=useState(false);
  const stats=useMemo(()=>{
    const s=bets.filter(b=>b.result),w=s.filter(b=>b.result==="W"),l=s.filter(b=>b.result==="L"),p=s.filter(b=>b.result==="P");
    const uw=w.reduce((s,b)=>s+b.units*(100/Math.abs(b.odds)),0),ul=l.reduce((s,b)=>s+b.units,0),net=uw-ul;
    const roi=s.length>0?(net/s.reduce((s,b)=>s+b.units,0))*100:0;
    const ae=bets.length>0?bets.reduce((s,b)=>s+b.edge,0)/bets.length:0;
    const wr=s.length>0?(w.length/Math.max(s.length-p.length,1))*100:0;
    return {wins:w.length,losses:l.length,pushes:p.length,netUnits:net,roi,avgEdge:ae,winRate:wr,pending:bets.length-s.length};
  },[bets]);
  const sportBreakdowns=useMemo(()=>{
    const map={};
    bets.forEach(b=>{if(!map[b.sport])map[b.sport]={bets:0,settled:0,wins:0,losses:0,pushes:0,unitsWon:0,unitsLost:0,totalUnits:0,edgeSum:0};const m=map[b.sport];m.bets++;m.edgeSum+=b.edge;if(b.result){m.settled++;if(b.result==="W"){m.wins++;m.unitsWon+=b.units*(100/Math.abs(b.odds));}if(b.result==="L"){m.losses++;m.unitsLost+=b.units;}if(b.result==="P")m.pushes++;m.totalUnits+=b.units;}});
    return Object.entries(map).map(([sport,d])=>({sport,...d,net:d.unitsWon-d.unitsLost,roi:d.settled>0?((d.unitsWon-d.unitsLost)/Math.max(d.totalUnits,1))*100:0,winRate:d.settled>0?(d.wins/Math.max(d.settled-d.pushes,1))*100:0,avgEdge:d.bets>0?d.edgeSum/d.bets:0})).sort((a,b)=>b.net-a.net);
  },[bets]);
  const nd=bankroll>0?stats.netUnits*unitSize:0;
  return (
    <div>
      <ExposureWarning bets={bets} bankroll={bankroll} unitSize={unitSize} T={T}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:14}}>
        {[{l:"NET UNITS",v:(stats.netUnits>=0?"+":"")+stats.netUnits.toFixed(2),s:bankroll>0?`${nd>=0?"+":""}$${nd.toFixed(0)}`:null,c:stats.netUnits>=0?T.green:T.red},{l:"ROI",v:`${stats.roi>=0?"+":""}${stats.roi.toFixed(1)}%`,c:stats.roi>=0?T.green:T.red},{l:"WIN RATE",v:`${stats.winRate.toFixed(1)}%`,s:`${stats.wins}W-${stats.losses}L-${stats.pushes}P`,c:T.text},{l:"AVG EDGE",v:`${stats.avgEdge.toFixed(1)}%`,s:`${stats.pending} pending`,c:T.gold}].map(s=>
          <div key={s.l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:"10px 12px"}}>
            <div style={{color:T.muted,fontSize:8,fontFamily:F.mono,letterSpacing:1,marginBottom:4}}>{s.l}</div>
            <div style={{color:s.c,fontSize:18,fontWeight:700,fontFamily:F.mono}}>{s.v}</div>
            {s.s&&<div style={{color:T.muted,fontSize:9,fontFamily:F.mono,marginTop:2}}>{s.s}</div>}
          </div>)}
      </div>
      {bets.length>0&&<><button onClick={()=>setShowBreakdown(!showBreakdown)} style={{width:"100%",padding:"8px",background:T.card,border:`1px solid ${T.border}`,borderRadius:4,color:showBreakdown?T.text:T.dim,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:F.mono,marginBottom:10,textAlign:"center"}}>{showBreakdown?"▾ HIDE":"▸ SHOW"} SPORT BREAKDOWN</button>
        {showBreakdown&&<div style={{marginBottom:14}}>
          <div style={{display:"grid",gridTemplateColumns:"auto repeat(5,1fr)",gap:"4px 12px",fontSize:10,fontFamily:F.mono,padding:"6px 10px",background:T.card,borderRadius:4,border:`1px solid ${T.border}`}}>
            <div style={{color:T.muted,fontWeight:600}}>SPORT</div><div style={{color:T.muted,fontWeight:600,textAlign:"right"}}>RECORD</div><div style={{color:T.muted,fontWeight:600,textAlign:"right"}}>NET U</div><div style={{color:T.muted,fontWeight:600,textAlign:"right"}}>ROI</div><div style={{color:T.muted,fontWeight:600,textAlign:"right"}}>WIN%</div><div style={{color:T.muted,fontWeight:600,textAlign:"right"}}>AVG EDGE</div>
            {sportBreakdowns.map(s=><React.Fragment key={s.sport}><div style={{color:T.text,fontWeight:600}}>{s.sport}</div><div style={{textAlign:"right",color:T.dim}}>{s.wins}-{s.losses}-{s.pushes}</div><div style={{textAlign:"right",color:s.net>=0?T.green:T.red}}>{s.net>=0?"+":""}{s.net.toFixed(2)}</div><div style={{textAlign:"right",color:s.roi>=0?T.green:T.red}}>{s.roi>=0?"+":""}{s.roi.toFixed(1)}%</div><div style={{textAlign:"right",color:T.dim}}>{s.winRate.toFixed(1)}%</div><div style={{textAlign:"right",color:T.gold}}>{s.avgEdge.toFixed(1)}%</div></React.Fragment>)}

                {bet.type} {bet.line} ({bet.odds}) · {bet.book} · {bet.units}u{bankroll>0&&<> · <span style={{color:T.gold}}>${(bet.units*unitSize).toFixed(0)}</span></>} · edge {bet.edge.toFixed(1)}%
                {bet.clv!==null&&<> · CLV <span style={{color:bet.clv>=0?T.green:T.red}}>{bet.clv>=0?"+":""}{bet.clv.toFixed(2)}%</span></>}
              </div>
            </div>
            <div style={{display:"flex",gap:3,alignItems:"center"}}>
              {bet.result?<span style={{padding:"2px 10px",borderRadius:3,fontSize:11,fontWeight:800,fontFamily:F.mono,color:bet.result==="W"?T.green:bet.result==="L"?T.red:T.muted,background:bet.result==="W"?T.greenBg:bet.result==="L"?T.redBg:`${T.muted}15`}}>{bet.result==="W"?"WIN":bet.result==="L"?"LOSS":"PUSH"}</span>:
                ["W","L","P"].map(r=><button key={r} onClick={()=>{const u=[...bets];u[i]={...u[i],result:r};setBets(u);}} style={{width:26,height:26,borderRadius:3,border:`1px solid ${T.border}`,background:"transparent",color:r==="W"?T.green:r==="L"?T.red:T.muted,fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:F.mono}}>{r}</button>)}
              <button onClick={()=>setBets(bets.filter((_,j)=>j!==i))} style={{width:26,height:26,borderRadius:3,border:`1px solid ${T.border}`,background:"transparent",color:T.muted,fontSize:12,cursor:"pointer"}}>×</button>
            </div>
          </div>)}
    </div>
  );
}

function SharpLine(){
  const [activeSport,setActiveSport]=useState("NBA");
  const [activeTab,setActiveTab]=useState("scanner");
  const [bets,setBets]=useState([]);
  const [games,setGames]=useState({});
  const [showManualBet,setShowManualBet]=useState(false);
  const [bookFilter,setBookFilter]=useState("ALL");
  const [bankroll,setBankroll]=useState(0);
  const [loaded,setLoaded]=useState(false);
  const [dark,setDark]=useState(true);
  const [myBooks,setMyBooks]=useState(DEFAULT_MY_BOOKS);
  const [showBookSettings,setShowBookSettings]=useState(false);
  const [loading,setLoading]=useState({});
  const [apiCredits,setApiCredits]=useState(null);
  const [errors,setErrors]=useState({});
  const [lastFetch,setLastFetch]=useState({});

  const T=dark?themes.dark:themes.light;
  const unitSize=Math.round(bankroll*0.01);

  // Load persisted data
  useEffect(()=>{const sb=ld(SK.bets,[]),sba=ld(SK.bankroll,0),st=ld(SK.theme,true),smb=ld(SK.myBooks,DEFAULT_MY_BOOKS);setBets(sb);setBankroll(sba);setDark(st);setMyBooks(smb);setLoaded(true);},[]);
  useEffect(()=>{if(loaded)sv(SK.bets,bets);},[bets,loaded]);
  useEffect(()=>{if(loaded)sv(SK.bankroll,bankroll);},[bankroll,loaded]);
  useEffect(()=>{if(loaded)sv(SK.theme,dark);},[dark,loaded]);
  useEffect(()=>{if(loaded)sv(SK.myBooks,myBooks);},[myBooks,loaded]);

  // Fetch live odds for a sport
  const fetchSport = useCallback(async (sportKey) => {
    const sport = SPORTS.find(s => s.key === sportKey);
    if (!sport) return;
    setLoading(prev => ({ ...prev, [sportKey]: true }));
    setErrors(prev => ({ ...prev, [sportKey]: null }));
    const result = await fetchOdds(sport.api);
    if (result.remaining !== null) setApiCredits(result.remaining);
    if (result.error) {
      setErrors(prev => ({ ...prev, [sportKey]: result.error }));
      setLoading(prev => ({ ...prev, [sportKey]: false }));
      return;
    }
    const parsed = parseApiGames(result.games, sportKey);
    setGames(prev => ({ ...prev, [sportKey]: parsed }));
    setLastFetch(prev => ({ ...prev, [sportKey]: new Date() }));
    setLoading(prev => ({ ...prev, [sportKey]: false }));
  }, []);

  // Auto-fetch when switching sports (with 5min cache)
  useEffect(() => {
    const last = lastFetch[activeSport];
    const stale = !last || (new Date() - last) > 5 * 60 * 1000;
    if (stale && !loading[activeSport]) {
      fetchSport(activeSport);
    }
  }, [activeSport, fetchSport]);

  const currentGames = useMemo(() => {
    const all = games[activeSport] || [];
    return all.sort((a, b) => a.time - b.time);
  }, [games, activeSport]);

  // Group by day for display
  const dayGroups = useMemo(() => {
    const groups = {};
    currentGames.forEach(g => {
      if (!groups[g.dayKey]) groups[g.dayKey] = { label: g.dayLabel, games: [] };
      groups[g.dayKey].games.push(g);
    });
    return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
  }, [currentGames]);

  // Alerts across all loaded sports
  const alerts = useMemo(() => {
    const all = [];
    Object.entries(games).forEach(([sk, gs]) => {
      gs.forEach(g => {
        g.edges.filter(e => myBooks.includes(e.book)).forEach(e => {
          if (e.spreadEdge >= 5) all.push({ away: g.away, home: g.home, type: "Spread", edge: e.spreadEdge, book: e.book, sport: sk });
          if (e.totalEdge >= 5) all.push({ away: g.away, home: g.home, type: "Total", edge: e.totalEdge, book: e.book, sport: sk });
        });
      });
    });
    return all.sort((a, b) => b.edge - a.edge).slice(0, 20);
  }, [games, myBooks]);

  const addBet = bet => { setBets(prev => [...prev, { ...bet, timestamp: new Date().toISOString(), entryOdds: bet.odds, closingOdds: null, clv: null }]); setActiveTab("tracker"); };

  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:F.body,transition:"background 0.2s, color 0.2s"}}>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
      <style>{`*{box-sizing:border-box;margin:0;padding:0} select option{background:${T.card};color:${T.text}} ::-webkit-scrollbar{height:3px} ::-webkit-scrollbar-thumb{background:${T.border};border-radius:2px}`}</style>

      <AlertBanner alerts={alerts} T={T}/>

      {/* Header */}
      <div style={{borderBottom:`1px solid ${T.border}`,padding:"10px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",background:T.card}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:28,height:28,borderRadius:4,background:`linear-gradient(135deg,${T.gold},${T.goldDim})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:dark?"#0d1117":"#fff",fontFamily:F.mono,letterSpacing:-1}}>SL</div>
          <div>
            <div style={{fontSize:14,fontWeight:800,letterSpacing:"-0.3px"}}>SHARPLINE</div>
            <div style={{fontSize:8,fontFamily:F.mono,color:T.muted,letterSpacing:2}}>STOP GAMBLING. START INVESTING.</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {apiCredits!==null&&<span style={{fontSize:9,fontFamily:F.mono,color:apiCredits<50?T.red:apiCredits<200?T.gold:T.muted,padding:"4px 8px",borderRadius:3,border:`1px solid ${T.border}`,background:T.card}}>{apiCredits} credits</span>}
          <button onClick={()=>setShowBookSettings(!showBookSettings)} style={{background:showBookSettings?T.goldBg:"transparent",border:`1px solid ${showBookSettings?`${T.gold}40`:T.border}`,color:showBookSettings?T.gold:T.toggle,padding:"6px 10px",borderRadius:4,fontSize:12,cursor:"pointer"}}>⚙️</button>
          <button onClick={()=>setDark(!dark)} style={{background:"transparent",border:`1px solid ${T.border}`,color:T.toggle,padding:"6px 10px",borderRadius:4,fontSize:12,cursor:"pointer"}}>{dark?"☀️":"🌙"}</button>
        </div>
      </div>

      {/* Book Settings */}
      {showBookSettings&&<div style={{borderBottom:`1px solid ${T.border}`,padding:"12px 18px",background:T.card}}>
        <div style={{maxWidth:900,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{color:T.text,fontSize:12,fontWeight:700}}>My Sportsbooks ({myBooks.length})</div>
            <div style={{display:"flex",gap:4}}><button onClick={()=>setMyBooks([...ALL_BOOKS])} style={{padding:"3px 8px",borderRadius:3,border:`1px solid ${T.border}`,background:"transparent",color:T.dim,fontSize:9,fontFamily:F.mono,cursor:"pointer"}}>All</button><button onClick={()=>setMyBooks(DEFAULT_MY_BOOKS)} style={{padding:"3px 8px",borderRadius:3,border:`1px solid ${T.border}`,background:"transparent",color:T.dim,fontSize:9,fontFamily:F.mono,cursor:"pointer"}}>Reset</button></div>
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {ALL_BOOKS.map(b=>{const active=myBooks.includes(b);return <button key={b} onClick={()=>{if(active&&myBooks.length>1)setMyBooks(myBooks.filter(x=>x!==b));else if(!active)setMyBooks([...myBooks,b]);}} style={{padding:"5px 10px",borderRadius:4,border:`1px solid ${active?`${T.green}40`:T.border}`,background:active?T.greenBg:"transparent",color:active?T.green:T.muted,fontSize:10,fontWeight:600,cursor:"pointer",transition:"all 0.15s"}}>{active&&"✓ "}{b}</button>;})}
          </div>
        </div>
      </div>}

      <div style={{maxWidth:900,margin:"0 auto",padding:"14px 14px"}}>
        {/* Tabs */}
        <div style={{display:"flex",marginBottom:12,background:T.card,borderRadius:4,padding:2,border:`1px solid ${T.border}`}}>
          {[{k:"scanner",l:"Scanner"},{k:"tracker",l:`Tracker (${bets.length})`},{k:"clv",l:"CLV"},{k:"bankroll",l:"Bankroll"}].map(t=>
            <button key={t.k} onClick={()=>setActiveTab(t.k)} style={{flex:1,padding:"8px 12px",borderRadius:3,border:"none",background:activeTab===t.k?`${T.text}10`:"transparent",color:activeTab===t.k?T.text:T.muted,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:F.body}}>{t.l}</button>)}
        </div>

        {/* SCANNER */}
        {activeTab==="scanner"&&<>
          {/* Sport selector */}
          <div style={{display:"flex",gap:3,marginBottom:8,overflowX:"auto",paddingBottom:2}}>
            {SPORTS.map(s=><button key={s.key} onClick={()=>setActiveSport(s.key)} style={{padding:"5px 12px",borderRadius:3,border:`1px solid ${activeSport===s.key?T.borderHi:T.border}`,background:activeSport===s.key?`${T.text}08`:"transparent",color:activeSport===s.key?T.text:T.muted,fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",position:"relative"}}>
              {s.icon} {s.label}
              {loading[s.key]&&<span style={{position:"absolute",top:-2,right:-2,width:6,height:6,borderRadius:"50%",background:T.gold,animation:"pulse 1s infinite"}}/>}
            </button>)}
          </div>

          {/* Filter row */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:4}}>
            <div style={{display:"flex",gap:3,alignItems:"center"}}>
              <select value={bookFilter} onChange={e=>setBookFilter(e.target.value)} style={{padding:"3px 20px 3px 7px",borderRadius:3,border:`1px solid ${bookFilter!=="ALL"?`${T.gold}40`:T.border}`,background:bookFilter!=="ALL"?T.goldBg:"transparent",color:bookFilter!=="ALL"?T.gold:T.muted,fontSize:10,fontWeight:600,fontFamily:F.mono,appearance:"none",cursor:"pointer",backgroundImage:`url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%23${dark?"484f58":"8b949e"}' stroke-width='1.5'/%3E%3C/svg%3E")`,backgroundRepeat:"no-repeat",backgroundPosition:"right 5px center"}}>
                <option value="ALL">All My Books ({myBooks.length})</option>{myBooks.map(b=><option key={b} value={b}>{b}</option>)}
              </select>
              <button onClick={()=>fetchSport(activeSport)} disabled={loading[activeSport]} style={{padding:"3px 8px",borderRadius:3,border:`1px solid ${T.border}`,background:"transparent",color:loading[activeSport]?T.muted:T.dim,fontSize:9,fontWeight:600,cursor:loading[activeSport]?"wait":"pointer",fontFamily:F.mono}}>
                {loading[activeSport]?"Loading...":"↻ Refresh"}
              </button>
            </div>
            <span style={{color:T.muted,fontSize:9,fontFamily:F.mono}}>
              {currentGames.length} games · LIVE DATA
              {lastFetch[activeSport]&&<> · updated {new Date(lastFetch[activeSport]).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</>}
            </span>
          </div>

          {/* Error state */}
          {errors[activeSport]&&<div style={{marginBottom:8,padding:"8px 12px",background:T.redBg,border:`1px solid ${T.red}22`,borderRadius:4}}>
            <span style={{color:T.red,fontSize:10,fontFamily:F.mono}}>⚠ {errors[activeSport]} — check API key or try again</span>
          </div>}

          {/* Loading state */}
          {loading[activeSport]&&currentGames.length===0&&<div style={{textAlign:"center",padding:40,color:T.muted}}>
            <div style={{fontSize:20,marginBottom:8}}>⏳</div>
            <div style={{fontSize:12}}>Fetching live odds for {SPORTS.find(s=>s.key===activeSport)?.label}...</div>
          </div>}

          {/* Games grouped by day */}
          {dayGroups.map(([dayKey, group]) => (
            <div key={dayKey}>
              <div style={{padding:"6px 0",marginTop:8,marginBottom:4,borderBottom:`1px solid ${T.border}`}}>
                <span style={{color:T.dim,fontSize:10,fontWeight:700,fontFamily:F.mono,letterSpacing:1}}>{group.label.toUpperCase()}</span>
                <span style={{color:T.muted,fontSize:9,fontFamily:F.mono,marginLeft:8}}>{group.games.length} games</span>
              </div>
              {group.games.map(g => <GameCard key={g.id} game={g} bookFilter={bookFilter} onAddBet={addBet} bankroll={bankroll} unitSize={unitSize} T={T} myBooks={myBooks}/>)}
            </div>
          ))}

          {!loading[activeSport]&&currentGames.length===0&&!errors[activeSport]&&<div style={{textAlign:"center",padding:36,color:T.muted}}>
            <div style={{fontSize:20,marginBottom:6,opacity:0.4}}>🔍</div>
            <div style={{fontSize:12}}>No upcoming games for {SPORTS.find(s=>s.key===activeSport)?.label}. Check back later or try another sport.</div>
          </div>}
        </>}

        {/* TRACKER */}
        {activeTab==="tracker"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:13,fontWeight:700}}>Betting Ledger</span>
            <button onClick={()=>setShowManualBet(!showManualBet)} style={{background:T.green,color:dark?T.bg:"#fff",border:"none",padding:"6px 12px",borderRadius:3,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:F.mono}}>+ LOG BET</button>
          </div>
          {showManualBet&&<ManualBetForm onAddBet={addBet} onClose={()=>setShowManualBet(false)} T={T}/>}
          <BetTracker bets={bets} setBets={setBets} bankroll={bankroll} unitSize={unitSize} T={T}/>
        </>}

        {/* CLV */}
        {activeTab==="clv"&&<><div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Closing Line Value</div><CLVTab bets={bets} T={T}/></>}

        {/* BANKROLL */}
        {activeTab==="bankroll"&&<>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Bankroll Management</div>
          <BankrollPanel bankroll={bankroll} setBankroll={setBankroll} unitSize={unitSize} T={T}/>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:14}}>
            <div style={{color:T.gold,fontSize:11,fontWeight:700,marginBottom:8}}>Unit Sizing</div>
            <div style={{color:T.dim,fontSize:11,lineHeight:1.7,marginBottom:10}}>1 unit = 1% of bankroll. Size scales with edge. Max 5 units (5%).</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
              {[{r:"3-4% edge",u:"2 units",a:bankroll>0?`$${(2*unitSize).toLocaleString()}`:"—"},{r:"4-6% edge",u:"3 units",a:bankroll>0?`$${(3*unitSize).toLocaleString()}`:"—"},{r:"6-8% edge",u:"4 units",a:bankroll>0?`$${(4*unitSize).toLocaleString()}`:"—"},{r:"8%+ edge",u:"5 units MAX",a:bankroll>0?`$${(5*unitSize).toLocaleString()}`:"—"}].map(r=>
                <div key={r.r} style={{padding:"8px 10px",background:`${T.muted}08`,borderRadius:3,border:`1px solid ${T.border}`}}>
                  <div style={{color:T.green,fontSize:10,fontWeight:700,fontFamily:F.mono}}>{r.r}</div>
                  <div style={{color:T.text,fontSize:12,fontWeight:600,fontFamily:F.mono,marginTop:3}}>{r.u}</div>
                  <div style={{color:T.gold,fontSize:11,fontFamily:F.mono,marginTop:1}}>{r.a}</div>
                </div>)}
            </div>
          </div>
        </>}

        <div style={{marginTop:24,paddingTop:12,borderTop:`1px solid ${T.border}`,textAlign:"center",color:T.muted,fontSize:9,fontFamily:F.mono,lineHeight:1.8}}>
          LIVE ODDS · {myBooks.length} SPORTSBOOKS · sharpline.com
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<SharpLine />);
</script>
</body>
</html>
