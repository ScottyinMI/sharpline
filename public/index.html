      ok(`T10: score ${score} → ${verdict}`, r.verdict === verdict);
      ok(`T10: score ${score} → ${units}u`,  r.units === units);
    });
  }

  // ── Output shape validation ───────────────────────────────────────────────
  {
    const r = assignVerdictAndUnits(sr(72), spreadEdge(), consensus(), movement());
    const required = ['verdict','verdictLabel','units','score','unitsCapped',

    required.forEach(f => ok(`Shape: has '${f}'`, f in r));

  }

  // ── Notes content validation ──────────────────────────────────────────────
  {
    const r = assignVerdictAndUnits(
      sr(72, null, ['KEY_NUMBER_VALUE', 'SHARP_DIVERGENCE']),

    ok('Notes: contains verdict',           r.notes.includes('BET'));
  }

  // ── Report ─────────────────────────────────────────────────────────────────
  const passed = checks.filter(c => c.pass).length;
  const failed = checks.filter(c => !c.pass);

  console.log('\n=== SHARPLINE — Component 7 Verification ===');
  console.log(passed + ' / ' + checks.length + ' checks passed');

    failed.forEach(c => console.warn('  FAIL: ' + c.label));

// =============================================================================
// SHARPLINE ENGINE — COMPONENT 8: RECOMMENDATION CARD ORCHESTRATOR
// =============================================================================
// Top-level engine function. Takes raw Odds API game data, runs it through
// every engine component in sequence, and returns a single serializable card
// object that the scanner UI renders without any further calculation.
//
// This function is the only entry point to the full Phase 1 engine pipeline.
// The UI calls buildRecommendationCard() for each game/market/side and renders
// the result. It never touches Components 2-7 directly.
//
// Pipeline: C3 (consensus) → C4 (edge) → C5 (movement) → C6 (score) → C7 (verdict)
//
// Dependencies: All Components 1-7
// Version 1.0 | Phase 1
// =============================================================================

// ── extractBooksForMarket(bookmakers, homeTeam, awayTeam, marketKey) ─────────
// Extracts a normalised book array from raw Odds API bookmakers data.
// Returns array of { key, oddsA (away/over/away ML), oddsB (home/under/home ML) }
// oddsA is always the side being evaluated as "A" in the consensus.

function extractBooksForMarket(bookmakers, homeTeam, awayTeam, marketKey) {
  const books = [];
  for (const bm of (bookmakers || [])) {
    const market = (bm.markets || []).find(m => m.key === marketKey);
    if (!market) continue;

    if (marketKey === 'totals') {
      const over  = market.outcomes?.find(o => o.name === 'Over');
      const under = market.outcomes?.find(o => o.name === 'Under');
      if (over && under) {
        books.push({
          key:         bm.key,
          title:       bm.title,
          oddsA:       over.price,
          oddsB:       under.price,
          totalNumber: over.point,
        });
      }
    } else {
      // spreads, h2h, puck_line, run_line
      const away = market.outcomes?.find(o => o.name === awayTeam);
      const home = market.outcomes?.find(o => o.name === homeTeam);
      if (away && home) {
        books.push({
          key:        bm.key,
          title:      bm.title,
          oddsA:      away.price,   // away = side A
          oddsB:      home.price,
          spreadNum:  away.point,   // spread number for away side (null for h2h)
        });
      }
    }
  }
  return books;
}

// ── getConsensusTotalNum(books) ───────────────────────────────────────────────
// Median total number across all books in the market (for totals gate in C4).

function getConsensusTotalNum(books) {
  const nums = books
    .map(b => b.totalNumber)
    .filter(n => n != null && !isNaN(n));
  if (!nums.length) return null;
  return _slMedian(nums);
}

// ── getConsensusSpreadNum(consensusResult, books) ────────────────────────────
// Median spread number across sharp/consensus source books (for key number check in C4).

function getConsensusSpreadNum(consensusResult, books) {
  const sharpBooks = books.filter(b =>
    consensusResult.sharpBooksUsed.includes(b.key)
  );
  const nums = sharpBooks
    .map(b => b.spreadNum)
    .filter(n => n != null && !isNaN(n));
  if (!nums.length) {
    // Fall back to all books
    const allNums = books.map(b => b.spreadNum).filter(n => n != null && !isNaN(n));
    return allNums.length ? _slMedian(allNums) : null;
  }
  return _slMedian(nums);
}

// ── findBestAvailableBook(books, betSide, consensusResult) ───────────────────
// Finds the book with the most favourable available odds for the betSide
// relative to the consensus. Returns the book object with highest availableVigRemoved.

function findBestAvailableBook(books, betSide, consensusSpreadNum) {
  // For spread markets: only compare books offering the same spread number
  // as the consensus. A book at -3.5 and a book at -4.5 are different markets —
  // comparing their vig-removed probs against a single consensus is invalid.
  // For h2h/totals: no spread number filtering needed.
  let best = null;
  let bestProb = -Infinity;

  for (const book of books) {
    // Spread number filter: skip books on a different number than consensus
    if (consensusSpreadNum != null && book.spreadNum != null) {
      if (Math.abs(book.spreadNum - consensusSpreadNum) >= 0.5) continue;
    }
    try {
      const vr = vigRemoveSide(book.oddsA, book.oddsB, betSide);
      if (vr.vigRemovedProb > bestProb) {
        bestProb = vr.vigRemovedProb;
        best = { ...book, vigRemovedProb: vr.vigRemovedProb };
      }
    } catch (e) {
      // Skip books with invalid odds
    }
  }

  // Fallback: if no book matched the consensus number, use all books
  // (protects against a case where no book matches — better than returning null)
  if (!best) {
    for (const book of books) {
      try {
        const vr = vigRemoveSide(book.oddsA, book.oddsB, betSide);
        if (vr.vigRemovedProb > bestProb) {
          bestProb = vr.vigRemovedProb;
          best = { ...book, vigRemovedProb: vr.vigRemovedProb };
        }
      } catch (e) {}
    }
  }
  return best;
}

// ── buildRecommendationCard(game, sport, betSide, marketKey, options) ─────────
//
// Main orchestrator. Runs the full Phase 1 engine pipeline for one
// game/market/side combination and returns a complete card object.
//
// @param game      Raw game object from Odds API
// @param sport     Odds API sport_key string (e.g. 'basketball_nba')
// @param betSide   'A' (away/over) | 'B' (home/under)
// @param marketKey 'spreads' | 'totals' | 'h2h' | 'puck_line' | 'run_line'
// @param options   { availableBookKey? } — optionally pin to a specific book
//
// Returns: full card object (JSON-serializable, no functions)

async function buildRecommendationCard(game, sport, betSide, marketKey, options = {}) {
  const evaluatedAt = new Date().toISOString();

  // ── Extract books for this market ─────────────────────────────────────────
  const books = extractBooksForMarket(
    game.bookmakers,
    game.home_team,
    game.away_team,
    marketKey
  );

  // ── C3: Sharp Consensus ────────────────────────────────────────────────────
  const consensusResult = buildSharpConsensus(books, betSide, marketKey, sport);

  // If no consensus data, return a minimal NO_PLAY card immediately
  if (consensusResult.consensusTier === 'NO_DATA') {
    return {
      gameId:          game.id,
      sport,
      homeTeam:        game.home_team,
      awayTeam:        game.away_team,
      commenceTime:    game.commence_time,
      marketType:      marketKey,
      betSide,
      evaluatedAt,
      // Consensus
      consensusProb:       null,
      consensusTier:       'NO_DATA',
      consensusConfidence: 0,
      sharpBooksUsed:      [],
      // Edge
      availableBook:       null,
      availableOdds:       null,
      availableVigRemoved: null,
      rawEdge:             null,
      dampenedEdge:        null,
      dampeningFactor:     null,
      minThreshold:        null,
      totalNumber:         null,
      // Movement
      movementLabel:       'STABLE',
      movementMultiplier:  1.00,
      openingConsensus:    null,
      movementMagnitude:   0,
      isFirstPull:         true,
      // Score
      score:               0,
      scoreTrace:          {},
      // Verdict
      verdict:             'NO_PLAY',
      verdictLabel:        'NO PLAY',
      units:               0,
      unitsCapped:         false,
      unitCapReason:       null,
      // Flags & notes
      flags:               [],
      notes:               'Insufficient market data — fewer than 3 books.',
      numberDiscrepancy:   false,
      keyNumberFlag:       false,
      keyNumberBonus:      0,
    };
  }

  // ── Find best available book ───────────────────────────────────────────────
  // Determine spread/total numbers BEFORE selecting best available book —
  // findBestAvailableBook needs consensusSpreadNum to filter same-number books only.
  const consensusTotalNum  = marketKey === 'totals'
    ? getConsensusTotalNum(books) : null;
  const consensusSpreadNum = ['spreads', 'puck_line', 'run_line'].includes(marketKey)
    ? getConsensusSpreadNum(consensusResult, books) : null;

  const availableBook = options.availableBookKey
    ? books.find(b => b.key === options.availableBookKey) || findBestAvailableBook(books, betSide, consensusSpreadNum)
    : findBestAvailableBook(books, betSide, consensusSpreadNum);

  if (!availableBook) {
    return buildNoPlayCard(game, sport, betSide, marketKey, evaluatedAt, consensusResult, 'No valid available book odds.');
  }
  const spreadNumber = availableBook.spreadNum != null ? availableBook.spreadNum : null;

  // ── C4: Edge Calculation ───────────────────────────────────────────────────
  const edgeResult = calculateEdge(
    availableBook,
    betSide,
    marketKey,
    sport,
    spreadNumber,
    consensusResult,
    consensusTotalNum,
    consensusSpreadNum
  );

  // ── C5: Line Movement ──────────────────────────────────────────────────────
  const movementResult = await trackLineMovement(
    game.id,
    marketKey,
    betSide,
    consensusResult.consensusProb,
    consensusResult.consensusTier,
    sport,
    game.commence_time
  );

  // ── C6: Scoring Engine ─────────────────────────────────────────────────────
  const scoreResult = scoreEngine(
    edgeResult,
    consensusResult,
    movementResult,
    marketKey,
    sport
  );

  // ── C7: Verdict & Units ────────────────────────────────────────────────────
  const verdictResult = assignVerdictAndUnits(
    scoreResult,
    edgeResult,
    consensusResult,
    movementResult
  );

  // ── Assemble full card object ──────────────────────────────────────────────
  // Determine American odds for the bet side from availableBook
  const availableOdds = betSide === 'A' ? availableBook.oddsA : availableBook.oddsB;

  return {
    // Identity
    gameId:          game.id,
    sport,
    homeTeam:        game.home_team,
    awayTeam:        game.away_team,
    commenceTime:    game.commence_time,
    marketType:      marketKey,
    betSide,
    evaluatedAt,

    // Available odds
    availableBook:       availableBook.key,
    availableBookTitle:  availableBook.title || availableBook.key,
    availableOdds:       availableOdds,
    availableVigRemoved: edgeResult.availableVigRemoved,
    totalNumber:         availableBook.totalNumber || null,

    // Consensus
    consensusProb:       consensusResult.consensusProb,
    consensusTier:       consensusResult.consensusTier,
    consensusConfidence: consensusResult.consensusConfidence,
    sharpBooksUsed:      consensusResult.sharpBooksUsed,
    sharpBookProbs:      consensusResult.sharpBookProbs,

    // Edge
    rawEdge:             edgeResult.rawEdge,
    dampenedEdge:        edgeResult.dampenedEdge,
    dampeningFactor:     edgeResult.dampeningFactor,
    minThreshold:        edgeResult.minThreshold,

    // Movement
    movementLabel:       movementResult.movementLabel,
    movementMultiplier:  movementResult.movementMultiplier,
    openingConsensus:    movementResult.openingConsensus,
    currentConsensus:    movementResult.currentConsensus,
    movementDelta:       movementResult.movementDelta,
    movementMagnitude:   movementResult.movementMagnitude,
    isFirstPull:         movementResult.isFirstPull,
    snapshotConfidence:  movementResult.snapshotConfidence,

    // Score
    score:               verdictResult.score,
    scoreTrace:          scoreResult.scoreTrace || {},

    // Verdict & units
    verdict:             verdictResult.verdict,
    verdictLabel:        verdictResult.verdictLabel,
    units:               verdictResult.units,
    unitsCapped:         verdictResult.unitsCapped,
    unitCapReason:       verdictResult.unitCapReason,

    // Flags & notes
    flags:               verdictResult.flags || [],
    notes:               verdictResult.notes || '',
    numberDiscrepancy:   edgeResult.numberDiscrepancy || false,
    keyNumberFlag:       edgeResult.keyNumberFlag || false,
    keyNumberBonus:      edgeResult.keyNumberBonus || 0,
  };
}

// ── buildNoPlayCard (helper) ──────────────────────────────────────────────────
function buildNoPlayCard(game, sport, betSide, marketKey, evaluatedAt, consensusResult, reason) {
  return {
    gameId:          game.id,
    sport,
    homeTeam:        game.home_team,
    awayTeam:        game.away_team,
    commenceTime:    game.commence_time,
    marketType:      marketKey,
    betSide,
    evaluatedAt,
    consensusProb:       consensusResult ? consensusResult.consensusProb : null,
    consensusTier:       consensusResult ? consensusResult.consensusTier : 'NO_DATA',
    consensusConfidence: consensusResult ? consensusResult.consensusConfidence : 0,
    sharpBooksUsed:      consensusResult ? consensusResult.sharpBooksUsed : [],
    sharpBookProbs:      consensusResult ? consensusResult.sharpBookProbs : [],
    availableBook:       null,
    availableBookTitle:  null,
    availableOdds:       null,
    availableVigRemoved: null,
    totalNumber:         null,
    rawEdge:             null,
    dampenedEdge:        null,
    dampeningFactor:     null,
    minThreshold:        null,
    movementLabel:       'STABLE',
    movementMultiplier:  1.00,
    openingConsensus:    null,
    currentConsensus:    null,
    movementDelta:       0,
    movementMagnitude:   0,
    isFirstPull:         true,
    snapshotConfidence:  null,
    score:               0,
    scoreTrace:          {},
    verdict:             'NO_PLAY',
    verdictLabel:        'NO PLAY',
    units:               0,
    unitsCapped:         false,
    unitCapReason:       null,
    flags:               [],
    notes:               reason || 'No actionable edge found.',
    numberDiscrepancy:   false,
    keyNumberFlag:       false,
    keyNumberBonus:      0,
  };
}

// ── scanGames(gamesArray, sport, markets) ─────────────────────────────────────
// Runs buildRecommendationCard for each game × market × side combination.
// Returns an array of card objects, filtering out NO_PLAY results.
// This is what the scanner calls after fetching odds from the API.

async function scanGames(gamesArray, sport, markets) {
  const cards = [];
  const marketsToScan = markets || ['spreads', 'totals', 'h2h'];

  // Run all evaluations in parallel — critical for performance
  // Sequential await was causing 14+ second scans (156 serial DB queries)
  const tasks = [];
  for (const game of (gamesArray || [])) {
    for (const market of marketsToScan) {
      for (const side of ['A', 'B']) {
        tasks.push(
          buildRecommendationCard(game, sport, side, market)
            .catch(err => {
              console.warn('[scanGames] Error:', game.id, market, side, err.message);
              return null;
            })
        );
      }
    }
  }
  const results = await Promise.all(tasks);
  for (const card of results) {
    if (card && card.verdict !== 'NO_PLAY') {
      cards.push(card);
    }
  }

  // Sort: STRONG_BET first, then BET, LEAN, WATCH — within tier sort by score desc
  const verdictOrder = { 'STRONG_BET': 0, 'BET': 1, 'LEAN': 2, 'WATCH': 3 };
  cards.sort((a, b) => {
    const aOrder = verdictOrder[a.verdict] != null ? verdictOrder[a.verdict] : 4;
    const bOrder = verdictOrder[b.verdict] != null ? verdictOrder[b.verdict] : 4;
    if (aOrder !== bOrder) return aOrder - bOrder;
    return b.score - a.score;
  });

  return cards;
}

      const aO = verdictOrder[a.verdict] != null ? verdictOrder[a.verdict] : 4;
      const bO = verdictOrder[b.verdict] != null ? verdictOrder[b.verdict] : 4;
      if (aO !== bO) return aO - bO;
      return b.score - a.score;
    });
    ok('T7: STRONG_BET first',  mockCards[0].verdict === 'STRONG_BET');
    ok('T7: BET second',        mockCards[1].verdict === 'BET');
    ok('T7: LEAN third',        mockCards[2].verdict === 'LEAN');
    ok('T7: WATCH last',        mockCards[3].verdict === 'WATCH');
  }

  // ── Report ─────────────────────────────────────────────────────────────────
  const passed = checks.filter(c => c.pass).length;
  const failed = checks.filter(c => !c.pass);

  console.log('\n=== SHARPLINE — Component 8 Verification ===');
  console.log(passed + ' / ' + checks.length + ' checks passed');
  if (failed.length > 0) {
    console.warn('\n FAILED:');
    failed.forEach(c => console.warn('  FAIL: ' + c.label));
  } else {
    console.log('\n All structural checks passed. Component 8 verified.');
    console.log('  Live pipeline test: call buildRecommendationCard(game, sport, side, market) in browser.');
  }
})();

const a2i=a=>a<0?Math.abs(a)/(Math.abs(a)+100):100/(a+100);
const a2d=a=>a<0?1+100/Math.abs(a):1+a/100;

function calcEdge(yours,sharp,damp=1){
  const yi=a2i(yours),si=a2i(sharp);
  return Math.min(Math.max(0,(si-yi)*100)*damp,10);
}

const calcCLV=(entry,close)=>{const e=a2i(entry),c=a2i(close);return((c-e)/e)*100;};

const suggestUnits=e=>e>=7?3:e>=5.5?2.5:e>=4.5?2:e>=3.5?1.5:e>=3?1:0.5;

function median(arr){
  if(!arr.length)return 0;
  const s=[...arr].sort((a,b)=>a-b);
  const m=Math.floor(s.length/2);
  return s.length%2?s[m]:(s[m-1]+s[m])/2;
}

function haversine(lat1,lon1,lat2,lon2){
  const R=3959,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// §6  RESEARCH ENGINE
// ════════════════════════════════════════════════════════════════

function analyzeResearch(game,recentScores){
  const factors=[];
  const home=game.home_team,away=game.away_team;
  const gt=new Date(game.commence_time).getTime();
  let restH=null,restA=null,b2bH=false,b2bA=false;

  if(recentScores&&recentScores.length){
    let lastH=null,lastA=null;
    for(const s of recentScores){
      const st=new Date(s.commence_time).getTime();
      if(st>=gt)continue;
      if(s.home_team===home||s.away_team===home){if(!lastH||st>lastH)lastH=st;}
      if(s.home_team===away||s.away_team===away){if(!lastA||st>lastA)lastA=st;}
    }
    if(lastH){
      restH=Math.floor((gt-lastH)/864e5);
      if(restH===0){b2bH=true;factors.push({type:"rest",team:home,label:"B2B",detail:`${home} on back-to-back`,impact:-2,color:T.red});}
      else if(restH===1)factors.push({type:"rest",team:home,label:`${restH}d rest`,detail:`${home} — 1 day rest`,impact:-1,color:T.orn});
      else if(restH>=3)factors.push({type:"rest",team:home,label:`${restH}d rest`,detail:`${home} well-rested (${restH} days)`,impact:1,color:T.grn});
    }
    if(lastA){
      restA=Math.floor((gt-lastA)/864e5);
      if(restA===0){b2bA=true;factors.push({type:"rest",team:away,label:"B2B",detail:`${away} on back-to-back`,impact:-2,color:T.red});}
      else if(restA===1)factors.push({type:"rest",team:away,label:`${restA}d rest`,detail:`${away} — 1 day rest`,impact:-1,color:T.orn});
      else if(restA>=3)factors.push({type:"rest",team:away,label:`${restA}d rest`,detail:`${away} well-rested (${restA} days)`,impact:1,color:T.grn});
    }
    if(restH!==null&&restA!==null&&Math.abs(restH-restA)>=2){
      const adv=restH>restA?home:away;
      factors.push({type:"rest_adv",team:adv,label:`+${Math.abs(restH-restA)}d rest edge`,detail:`${adv} has ${Math.abs(restH-restA)}-day rest advantage`,impact:restH>restA?1:-1,color:T.blu});
    }
  }

  let travelMi=null;
  const hc=CITIES[home],ac=CITIES[away];
  if(hc&&ac){
    travelMi=Math.round(haversine(hc.lat,hc.lon,ac.lat,ac.lon));
    if(travelMi>1500)factors.push({type:"travel",team:away,label:`${travelMi}mi`,detail:`${away} coast-to-coast travel (${travelMi}mi)`,impact:-2,color:T.red});
    else if(travelMi>800)factors.push({type:"travel",team:away,label:`${travelMi}mi`,detail:`${away} traveled ${travelMi} miles`,impact:-1,color:T.orn});
    const tz=Math.abs(Math.round((hc.lon-ac.lon)/15));
    if(tz>=2)factors.push({type:"tz",team:away,label:`${tz}hr TZ`,detail:`${away} crossing ${tz} time zones`,impact:-1,color:T.orn});
  }

  if(b2bA&&travelMi&&travelMi>500){
    factors.push({type:"compound",team:away,label:"B2B+Travel",detail:`${away} back-to-back AND traveled ${travelMi}mi — extreme fatigue risk`,impact:-3,color:T.red});
  }

  return{factors,restH,restA,b2bH,b2bA,travelMi};
}

// §7  SHARPLINE SCORING ENGINE
// ════════════════════════════════════════════════════════════════

function scoreGame(game,research){
  const w={edge:.35,sharpDir:.20,juice:.15,move:.10,research:.10,half:.10};
  const s={edge:0,sharpDir:0,juice:0,move:0,research:0,half:0};

  const isMlSport=game.sportType==="hockey"||game.sportType==="baseball";
  const edgeFloor=isMlSport?2:2;

  const maxE=Math.max(game.bestSpreadEdge||0,game.bestTotalEdge||0,game.bestMlEdge||0);

  if(maxE>=edgeFloor+1)s.edge=Math.min((maxE-edgeFloor)*25,100);
  else s.edge=0;

  if(game.conSrc==="sharp"&&game.sharpN>=2){
    const allSpOdds=[];
    for(const sl of game.spreadLines||[]){
      for(const e of sl.entries)allSpOdds.push(e.awOd);
    }
    const mktMed=median(allSpOdds);
    const sharpDiff=Math.abs(a2i(game.shSpMed)-a2i(mktMed))*100;
    if(sharpDiff>1.5)s.sharpDir=Math.min(sharpDiff*20,100);
  }

  if(game.juiceSig&&game.juiceSig.strength>=5)s.juice=Math.min((game.juiceSig.strength-4)*25,100);

  if(game.movement){
    const mv=Math.abs(game.movement.spreadDelta||0);
    if(mv>=0.5)s.move=Math.min(mv*30,100);
  }

  if(research&&research.factors.length){
    const tot=research.factors.reduce((a,f)=>a+Math.abs(f.impact),0);
    s.research=Math.min(tot*12,100);
  }

  if(game.halfPtVal)s.half=Math.min(game.halfPtVal*20,100);

  let total=0;
  for(const[k,v]of Object.entries(w))total+=(s[k]||0)*v;

  const grade=total>=60?"A":total>=45?"B":total>=30?"C":total>=15?"D":"F";
  return{total:Math.round(total),parts:s,grade};
}

// §8  BET RECOMMENDATION ENGINE
// ════════════════════════════════════════════════════════════════

function genRecs(game,research){
  const recs=[];
  const isMlSport=game.sportType==="hockey"||game.sportType==="baseball";
  const spreadMin=3;
  const totalMin=3;
  const mlMin=isMlSport?4.5:3.5;

  const add=(type,side,line,odds,book,edge,reasons,minEdge)=>{
    if(edge<minEdge)return;
    const highBar=isMlSport?6:5;
    const medBar=isMlSport?5:4;
    const conf=edge>=highBar?"HIGH":edge>=medBar?"MEDIUM":"LOW";
    recs.push({type,side,line,odds,book,edge:+edge.toFixed(1),units:suggestUnits(edge),conf,reasons});
  };

  const resFor=(team,opp)=>{
    if(!research)return[];
    const r=[];
    research.factors.filter(f=>f.team===team&&f.impact>0).forEach(f=>r.push(f.detail));
    research.factors.filter(f=>f.team===opp&&f.impact<0).forEach(f=>r.push(f.detail));
    return r;
  };

  if(game.spreadLines){
    for(const sl of game.spreadLines){
      if(sl.bestAwayEdge>spreadMin){
        const r=[`${sl.bestAwayEdge.toFixed(1)}% edge vs ${game.conSrc} consensus`];
        if(sl.bestAwayBook)r.push(`Best number at ${sl.bestAwayBook}`);
        r.push(...resFor(game.away_team,game.home_team));
        add("Spread",game.away_team,sl.awaySpread,sl.bestAwayOdds,sl.bestAwayBook,sl.bestAwayEdge,r,spreadMin);
      }
      if(sl.bestHomeEdge>spreadMin){
        const r=[`${sl.bestHomeEdge.toFixed(1)}% edge vs ${game.conSrc} consensus`];
        if(sl.bestHomeBook)r.push(`Best number at ${sl.bestHomeBook}`);
        r.push(...resFor(game.home_team,game.away_team));
        add("Spread",game.home_team,sl.homeSpread,sl.bestHomeOdds,sl.bestHomeBook,sl.bestHomeEdge,r,spreadMin);
      }
    }
  }

  if(game.totalLines){
    for(const tl of game.totalLines){
      if(tl.bestOverEdge>totalMin){
        const r=[`${tl.bestOverEdge.toFixed(1)}% edge on Over ${tl.total}`];
        if(tl.bestOverBook)r.push(`Best number at ${tl.bestOverBook}`);
        if(research){
          const fatigue=research.factors.filter(f=>f.type==="compound"||f.label==="B2B");
          if(fatigue.length)r.push("Fatigue factor may slow pace — caution on Over");
        }
        add("Total","Over",tl.total,tl.bestOverOdds,tl.bestOverBook,tl.bestOverEdge,r,totalMin);
      }
      if(tl.bestUnderEdge>totalMin){
        const r=[`${tl.bestUnderEdge.toFixed(1)}% edge on Under ${tl.total}`];
        if(tl.bestUnderBook)r.push(`Best number at ${tl.bestUnderBook}`);
        add("Total","Under",tl.total,tl.bestUnderOdds,tl.bestUnderBook,tl.bestUnderEdge,r,totalMin);
      }
    }
  }

  if(game.mlData){
    const ml=game.mlData;
    if(ml.bestAwayEdge>mlMin)add("ML",game.away_team,"",ml.bestAwayOdds,ml.bestAwayBook,ml.bestAwayEdge,[`${ml.bestAwayEdge.toFixed(1)}% ML edge at ${ml.bestAwayBook}`],mlMin);
    if(ml.bestHomeEdge>mlMin)add("ML",game.home_team,"",ml.bestHomeOdds,ml.bestHomeBook,ml.bestHomeEdge,[`${ml.bestHomeEdge.toFixed(1)}% ML edge at ${ml.bestHomeBook}`],mlMin);
  }

  recs.sort((a,b)=>b.edge-a.edge);
  return recs;
}

// §9  DATA PROCESSING
// ════════════════════════════════════════════════════════════════

function processGames(raw,myBooks,sportKey){
  return raw.map(g=>{
    const bms=g.bookmakers||[];
    const sharpBms=bms.filter(b=>SHARP_BOOKS.includes(b.key));
    const useSh=sharpBms.length>=MIN_SHARP;
    const conBms=useSh?sharpBms:bms;
    const conSrc=useSh?"sharp":"market";
    const sportType=SPORTS.find(s=>s.key===(sportKey||g.sport_key))?.type||"";

    const spDamp=sportType==="hockey"||sportType==="baseball"?0.35:1;
    const toDamp=sportType==="hockey"||sportType==="baseball"?0.5:1;

    const hasBook=title=>!myBooks.length||myBooks.some(mb=>title.toLowerCase().includes(mb.toLowerCase()));

    const spreadMap=new Map();
    const shSpOdds=[];

    for(const bm of bms){
      const mk=bm.markets?.find(m=>m.key==="spreads");
      if(!mk)continue;
      const aw=mk.outcomes?.find(o=>o.name===g.away_team);
      const hm=mk.outcomes?.find(o=>o.name===g.home_team);
      if(!aw||!hm)continue;
      const k=`${aw.point}`;
      if(!spreadMap.has(k))spreadMap.set(k,[]);
      spreadMap.get(k).push({book:bm.title,bk:bm.key,awSp:aw.point,hmSp:hm.point,awOd:aw.price,hmOd:hm.price});
    }
    for(const bm of conBms){
      const mk=bm.markets?.find(m=>m.key==="spreads");
      if(!mk)continue;
      const aw=mk.outcomes?.find(o=>o.name===g.away_team);
      if(aw)shSpOdds.push(aw.price);
    }
    const shSpMed=median(shSpOdds);

    const spreadLines=[];
    for(const[,entries]of spreadMap){
      let bAE=0,bHE=0,bAB="",bHB="",bAO=0,bHO=0;
      for(const e of entries){
        if(!hasBook(e.book))continue;
        const ae=calcEdge(e.awOd,shSpMed,spDamp),he=calcEdge(e.hmOd,shSpMed,spDamp);
        if(ae>bAE){bAE=ae;bAB=e.book;bAO=e.awOd;}
        if(he>bHE){bHE=he;bHB=e.book;bHO=e.hmOd;}
      }
      spreadLines.push({...entries[0],entries,bestAwayEdge:bAE,bestHomeEdge:bHE,bestAwayBook:bAB,bestHomeBook:bHB,bestAwayOdds:bAO,bestHomeOdds:bHO,awaySpread:entries[0].awSp,homeSpread:entries[0].hmSp});
    }

    const totalMap=new Map();
    const shToOdds=[];

    for(const bm of bms){
      const mk=bm.markets?.find(m=>m.key==="totals");
      if(!mk)continue;
      const ov=mk.outcomes?.find(o=>o.name==="Over");
      const un=mk.outcomes?.find(o=>o.name==="Under");
      if(!ov||!un)continue;
      const k=`${ov.point}`;
      if(!totalMap.has(k))totalMap.set(k,[]);
      totalMap.get(k).push({book:bm.title,bk:bm.key,total:ov.point,ovOd:ov.price,unOd:un.price});
    }
    for(const bm of conBms){
      const mk=bm.markets?.find(m=>m.key==="totals");
      if(!mk)continue;
      const ov=mk.outcomes?.find(o=>o.name==="Over");
      if(ov)shToOdds.push(ov.price);
    }
    const shToMed=median(shToOdds);

    const totalLines=[];
    for(const[,entries]of totalMap){
      let bOE=0,bUE=0,bOB="",bUB="",bOO=0,bUO=0;
      for(const e of entries){
        if(!hasBook(e.book))continue;
        const oe=calcEdge(e.ovOd,shToMed,toDamp),ue=calcEdge(e.unOd,shToMed,toDamp);
        if(oe>bOE){bOE=oe;bOB=e.book;bOO=e.ovOd;}
        if(ue>bUE){bUE=ue;bUB=e.book;bUO=e.unOd;}
      }
      totalLines.push({...entries[0],entries,bestOverEdge:bOE,bestUnderEdge:bUE,bestOverBook:bOB,bestUnderBook:bUB,bestOverOdds:bOO,bestUnderOdds:bUO});
    }

    const shMlAw=[],shMlHm=[];
    for(const bm of conBms){
      const mk=bm.markets?.find(m=>m.key==="h2h");
      if(!mk)continue;
      const aw=mk.outcomes?.find(o=>o.name===g.away_team);
      const hm=mk.outcomes?.find(o=>o.name===g.home_team);
      if(aw)shMlAw.push(aw.price);
      if(hm)shMlHm.push(hm.price);
    }
    const shMlAwMed=median(shMlAw),shMlHmMed=median(shMlHm);

    let mlData={entries:[],bestAwayEdge:0,bestHomeEdge:0,bestAwayBook:"",bestHomeBook:"",bestAwayOdds:0,bestHomeOdds:0};
    for(const bm of bms){
      const mk=bm.markets?.find(m=>m.key==="h2h");
      if(!mk)continue;
      const aw=mk.outcomes?.find(o=>o.name===g.away_team);
      const hm=mk.outcomes?.find(o=>o.name===g.home_team);
      if(!aw||!hm)continue;
      mlData.entries.push({book:bm.title,bk:bm.key,awOd:aw.price,hmOd:hm.price});
      if(!hasBook(bm.title))continue;
      const ae=shMlAwMed?calcEdge(aw.price,shMlAwMed,spDamp):0;
      const he=shMlHmMed?calcEdge(hm.price,shMlHmMed,spDamp):0;
      if(ae>mlData.bestAwayEdge){mlData.bestAwayEdge=ae;mlData.bestAwayBook=bm.title;mlData.bestAwayOdds=aw.price;}
      if(he>mlData.bestHomeEdge){mlData.bestHomeEdge=he;mlData.bestHomeBook=bm.title;mlData.bestHomeOdds=hm.price;}
    }

    let juiceSig=null;
    const jAw=[],jHm=[];
    for(const bm of bms){
      const mk=bm.markets?.find(m=>m.key==="spreads");
      if(!mk)continue;
      const aw=mk.outcomes?.find(o=>o.name===g.away_team);
      const hm=mk.outcomes?.find(o=>o.name===g.home_team);
      if(aw)jAw.push(aw.price);
      if(hm)jHm.push(hm.price);
    }
    if(jAw.length>=3){
      const avgA=jAw.reduce((a,b)=>a+b,0)/jAw.length;
      const avgH=jHm.reduce((a,b)=>a+b,0)/jHm.length;
      const diff=Math.abs(avgA-avgH);
      if(diff>5)juiceSig={side:avgA<avgH?g.away_team:g.home_team,strength:Math.min(Math.round(diff),10),detail:`Vig loaded toward ${avgA<avgH?g.away_team:g.home_team} (avg diff: ${diff.toFixed(0)})`};
    }

    let halfPtVal=0;
    const keyNums=sportType==="football"?[3,7,10,6,14,1,4]:sportType==="basketball"?[3,5,7,8]:[1,1.5];
    if(spreadLines.length){
      const spreads=[...new Set(spreadLines.map(s=>Math.abs(s.awaySpread)))];
      for(const sp of spreads){
        if(keyNums.some(k=>Math.abs(sp-k)<=0.5&&sp!==k)){
          halfPtVal=Math.max(halfPtVal,sportType==="football"?4:2);
        }
      }
    }

    const bestSpreadEdge=spreadLines.length?Math.max(...spreadLines.map(s=>Math.max(s.bestAwayEdge,s.bestHomeEdge))):0;
    const bestTotalEdge=totalLines.length?Math.max(...totalLines.map(t=>Math.max(t.bestOverEdge,t.bestUnderEdge))):0;
    const bestMlEdge=Math.max(mlData.bestAwayEdge,mlData.bestHomeEdge);

    return{
      ...g,spreadLines,totalLines,mlData,
      shSpMed,shToMed,shMlAwMed,shMlHmMed,
      conSrc,sharpN:sharpBms.length,sportType,
      juiceSig,halfPtVal,
      bestSpreadEdge,bestTotalEdge,bestMlEdge,
    };
  });
}

function SharpLine(){
  const[tab,setTab]=useState("scanner");
  const[sport,setSport]=useState("basketball_nba");
  const[games,setGames]=useState([]);
  const[loading,setLoading]=useState(false);
  const[credits,setCredits]=useState(null);
  const[expanded,setExpanded]=useState(null);
  const[bets,setBets]=useState([]);
  const[bankroll,setBankroll]=useState(()=>+(localStorage.getItem("sl-bankroll")||0));
  const[myBooks,setMyBooks]=useState(()=>{try{return JSON.parse(localStorage.getItem("sl-books")||"[]")}catch{return[]}});
  const[cache,setCache]=useState({});
  const[firstSeen,setFirstSeen]=useState({});
  const[scores,setScores]=useState({});
  const[clvIn,setClvIn]=useState({});
  const[manBet,setManBet]=useState(null);
  const[gView,setGView]=useState("spread");
  const[tracked,setTracked]=useState(null);

  const unitSz=bankroll>0?Math.round(bankroll*0.01):0;

  useEffect(()=>{dbLoad().then(b=>setBets(b))},[]);
  useEffect(()=>{localStorage.setItem("sl-bankroll",bankroll)},[bankroll]);
  useEffect(()=>{localStorage.setItem("sl-books",JSON.stringify(myBooks))},[myBooks]);

  const fetchOdds=useCallback(async()=>{
    setLoading(true);
    try{
      const res=await fetch(`/api/odds?sport=${sport}&markets=spreads,totals,h2h`);
      const data=await res.json();
      const rem=res.headers.get("x-requests-remaining");
      if(rem)setCredits(+rem);

      // ── Phase 1 Engine: run full pipeline via C8 scanGames() ──
      // scanGames filters NO_PLAY, runs C3→C4→C5→C6→C7 per game/market/side
      // Returns sorted card objects ready for render — no enrichment needed
      const cards=await scanGames(data,sport,['spreads','totals','h2h']);
      setGames(cards);
      setCache(prev=>({...prev,[sport]:{data:cards,time:Date.now()}}));
    }catch(err){console.error("Fetch:",err);}
    setLoading(false);
  },[sport]);

  useEffect(()=>{
    if(cache[sport])setGames(cache[sport].data);
    else setGames([]);
  },[sport]);

  // Phase 1: games state now holds pre-scored card objects from scanGames()
  // enriched is a direct alias — no further computation needed
  const enriched=games;

  const[trackErr,setTrackErr]=useState(null);
  const trackBet=async(bet,btnKey)=>{
    setTracked(btnKey||"saving");
    setTrackErr(null);
    try{
      const id=await dbAdd(bet);
      if(id){
        setBets(prev=>[{...bet,id},...prev]);
        setTracked(btnKey||"done");
        setTimeout(()=>setTracked(null),3000);
      }else{
        setTracked("error");
        setTrackErr("dbAdd returned null — no ID");
      }
    }catch(err){
      console.error("trackBet full error:",err);
      setTracked("error");
      const msg=err.message||"";
      const det=err.details||"";
      const hint=err.hint||"";
      const code=err.code||"";
      setTrackErr(`${msg}${det?" | "+det:""}${hint?" | "+hint:""}${code?" ["+code+"]":""}`||JSON.stringify(err));
    }
  };
  const updateResult=async(id,result)=>{
    await dbUpdate(id,{result});
    setBets(prev=>prev.map(b=>b.id===id?{...b,result}:b));
  };
  const enterCLV=async(id,closingOdds)=>{
    const bet=bets.find(b=>b.id===id);
    if(!bet)return;
    const clv=calcCLV(bet.entryOdds||bet.odds,closingOdds);
    await dbUpdate(id,{closingOdds,clv});
    setBets(prev=>prev.map(b=>b.id===id?{...b,closingOdds,clv}:b));
  };

  const[clvFetching,setClvFetching]=useState(null);
  const[clvFetchErr,setClvFetchErr]=useState(null);
  const fetchCLV=async(bet)=>{
    setClvFetching(bet.id);
    setClvFetchErr(null);
    try{
      const sportObj=SPORTS.find(s=>s.label===bet.sport);
      if(!sportObj){setClvFetchErr("Unknown sport: "+bet.sport);setClvFetching(null);return;}
      const marketKey=bet.type==="ML"?"h2h":bet.type==="Total"?"totals":"spreads";
      const res=await fetch(`/api/odds?sport=${sportObj.key}&markets=${marketKey}`);
      const data=await res.json();
      const rem=res.headers.get("x-requests-remaining");
      if(rem)setCredits(+rem);
      if(!Array.isArray(data)||!data.length){setClvFetchErr("No odds data returned");setClvFetching(null);return;}
      const parts=bet.game.split(" @ ");
      const awayName=parts[0]?.trim();
      const homeName=parts[1]?.trim();
      const game=data.find(g=>{
        const hm=g.home_team?.toLowerCase();
        const aw=g.away_team?.toLowerCase();
        return(hm?.includes(homeName?.toLowerCase())||homeName?.toLowerCase()?.includes(hm))&&
              (aw?.includes(awayName?.toLowerCase())||awayName?.toLowerCase()?.includes(aw));
      });
      if(!game){setClvFetchErr("Game not found — may have already completed (>24hr)");setClvFetching(null);return;}
      const bms=game.bookmakers||[];
      const sharpBms=bms.filter(b=>SHARP_BOOKS.includes(b.key));
      const conBms=sharpBms.length>=MIN_SHARP?sharpBms:bms;
      let closingOdds=null;
      if(bet.type==="Spread"){
        const odds=[];
        const betLine=parseFloat(bet.line);
        for(const bm of conBms){
          const mk=bm.markets?.find(m=>m.key==="spreads");
          if(!mk)continue;
          const aw=mk.outcomes?.find(o=>o.name===game.away_team);
          const hm=mk.outcomes?.find(o=>o.name===game.home_team);
          if(aw&&Math.abs(aw.point-betLine)<0.5)odds.push(aw.price);
          else if(hm&&Math.abs(hm.point-betLine)<0.5)odds.push(hm.price);
          else if(aw)odds.push(aw.price);
        }
        if(odds.length)closingOdds=Math.round(median(odds));
      }else if(bet.type==="Total"){
        const odds=[];
        const isOver=bet.line?.startsWith("O");
        for(const bm of conBms){
          const mk=bm.markets?.find(m=>m.key==="totals");
          if(!mk)continue;
          const side=mk.outcomes?.find(o=>o.name===(isOver?"Over":"Under"));
          if(side)odds.push(side.price);
        }
        if(odds.length)closingOdds=Math.round(median(odds));
      }else if(bet.type==="ML"){
        const odds=[];
        const betTeam=bet.line||awayName;
        for(const bm of conBms){
          const mk=bm.markets?.find(m=>m.key==="h2h");
          if(!mk)continue;
          const match=mk.outcomes?.find(o=>o.name?.toLowerCase()?.includes(betTeam?.toLowerCase()?.split(" ").pop()));
          if(match)odds.push(match.price);
          else{
            for(const o of mk.outcomes||[]){
              if(Math.abs(o.price-bet.odds)<50)odds.push(o.price);
            }
          }
        }
        if(odds.length)closingOdds=Math.round(median(odds));
      }
      if(closingOdds===null){setClvFetchErr("Could not find matching odds in API response");setClvFetching(null);return;}
      const clv=calcCLV(bet.entryOdds||bet.odds,closingOdds);
      await dbUpdate(bet.id,{closingOdds,clv});
      setBets(prev=>prev.map(b=>b.id===bet.id?{...b,closingOdds,clv}:b));
      setClvFetching(null);
    }catch(err){
      console.error("fetchCLV error:",err);
      setClvFetchErr(err.message||"Fetch failed");
      setClvFetching(null);
    }
  };

  const deleteBet=async id=>{
    await dbDel(id);
    setBets(prev=>prev.filter(b=>b.id!==id));
  };

  const stats=useMemo(()=>{
    const settled=bets.filter(b=>b.result==="W"||b.result==="L");
    const W=settled.filter(b=>b.result==="W").length;
    const L=settled.filter(b=>b.result==="L").length;
    const P=bets.filter(b=>b.result==="P").length;
    const clvB=bets.filter(b=>b.clv!=null);
    const avgClv=clvB.length?clvB.reduce((s,b)=>s+b.clv,0)/clvB.length:0;
    let wagered=0,returned=0;
    for(const b of settled){
      const w=(b.units||1)*(unitSz||100);
      wagered+=w;
      if(b.result==="W")returned+=w*a2d(b.odds);
    }
    const roi=wagered?((returned-wagered)/wagered*100):0;
    const profit=returned-wagered;
    const bySport={},byType={};
    for(const b of bets){
      if(!bySport[b.sport])bySport[b.sport]={n:0,w:0,l:0};
      bySport[b.sport].n++;if(b.result==="W")bySport[b.sport].w++;if(b.result==="L")bySport[b.sport].l++;
      if(!byType[b.type])byType[b.type]={n:0,w:0,l:0};
      byType[b.type].n++;if(b.result==="W")byType[b.type].w++;if(b.result==="L")byType[b.type].l++;
    }
    return{W,L,P,total:bets.length,settled:settled.length,wr:settled.length?(W/settled.length*100):0,avgClv,clvN:clvB.length,roi,profit,wagered,bySport,byType};
  },[bets,unitSz]);

  const Badge=({children,bg,color,style:s})=>(
    <span style={{display:"inline-flex",alignItems:"center",padding:"2px 7px",borderRadius:3,fontSize:10,fontWeight:700,fontFamily:F.m,background:bg||T.bdr,color:color||T.tx,letterSpacing:".02em",...s}}>{children}</span>
  );

  const Btn=({children,onClick,pri,sm,dis,style:s})=>(
    <button disabled={dis} onClick={onClick} style={{padding:sm?"4px 10px":"8px 16px",borderRadius:4,border:"none",fontSize:sm?10:12,fontWeight:700,fontFamily:F.m,cursor:dis?"not-allowed":"pointer",opacity:dis?0.4:1,background:pri?T.gold:T.bdr,color:pri?"#0a0e14":T.tx,transition:"all .15s",position:"relative",zIndex:1,...s}}>{children}</button>
  );

  // ══════════════════════════════════════════════════════════════
  // ENGINE-DRIVEN GAME CARD (Component 10 — Phase 1 Rebuild)
  // Renders a pre-computed recommendation card object from scanGames().
  // ZERO inline math. All values come from the card object.
  // ══════════════════════════════════════════════════════════════

  const GameCard=({game:card,index:idx})=>{
    const cardKey=card.gameId+card.marketType+card.betSide;
    const exp=expanded===cardKey;
    const time=new Date(card.commenceTime).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
    const day=new Date(card.commenceTime).toLocaleDateString([],{weekday:"short"});

    // Verdict colours — driven by card.verdict, not inline calculation
    const verdictColour={
      STRONG_BET:{badge:T.grn,bg:T.grnB,border:T.grn+"40"},
      BET:        {badge:"#0d9488",bg:"#042f2e",border:"#0d948840"},
      LEAN:       {badge:T.blu,bg:T.bluB,border:T.blu+"40"},
      WATCH:      {badge:T.orn,bg:T.ornB,border:T.orn+"40"},
      NO_PLAY:    {badge:T.mut,bg:T.bdr,border:T.bdr},
    }[card.verdict]||{badge:T.mut,bg:T.bdr,border:T.bdr};

    const showTrack=['LEAN','BET','STRONG_BET'].includes(card.verdict);
    const showUnits=['LEAN','BET','STRONG_BET'].includes(card.verdict);

    // Market label for display
    const mktLabel={spreads:"Spread",totals:"Total",h2h:"ML",puck_line:"Puck Line",run_line:"Run Line"}[card.marketType]||card.marketType;
    const sideLabel=card.betSide==='A'
      ?`${card.awayTeam?.split(' ').pop()} ${mktLabel}`
      :`${card.homeTeam?.split(' ').pop()} ${mktLabel}`;

    const bk=`card-${card.gameId}-${card.marketType}-${card.betSide}`;

    return(
      <div className="fade-up" style={{
        animationDelay:`${idx*40}ms`,
        background:T.card,
        border:`1px solid ${bestEdge(card)>=5?T.gold+"40":verdictColour.border}`,
        borderLeft:`3px solid ${verdictColour.badge}`,
        borderRadius:8,marginBottom:8,overflow:"hidden"
      }}>
        {/* ── HEADER — always visible ── */}
        <div onClick={()=>setExpanded(exp?null:cardKey)}
          style={{padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{flex:1}}>
            {/* Verdict + units badge */}
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
              <span style={{
                padding:"2px 8px",borderRadius:3,fontSize:10,fontWeight:800,
                fontFamily:F.m,background:verdictColour.bg,color:verdictColour.badge,
                letterSpacing:".04em"
              }}>{card.verdictLabel}</span>
              {showUnits&&<span style={{
                padding:"2px 7px",borderRadius:3,fontSize:10,fontWeight:700,
                fontFamily:F.m,background:T.gold+"20",color:T.gold
              }}>{card.units}u</span>}
              {/* Flags */}
              {card.flags?.includes('KEY_NUMBER_VALUE')&&<span style={{padding:"2px 6px",borderRadius:3,fontSize:9,fontWeight:700,fontFamily:F.m,background:T.gold+"15",color:T.gold}}>KEY #</span>}
              {card.flags?.includes('SHARP_DIVERGENCE')&&<span style={{padding:"2px 6px",borderRadius:3,fontSize:9,fontWeight:700,fontFamily:F.m,background:T.orn+"15",color:T.orn}}>DIVERGENCE</span>}
              {card.flags?.includes('HIGH_VARIANCE_ML')&&<span style={{padding:"2px 6px",borderRadius:3,fontSize:9,fontWeight:700,fontFamily:F.m,background:T.mut+"20",color:T.mut}}>HIGH VAR</span>}
            </div>
            {/* Matchup */}
            <div style={{fontSize:13,fontWeight:700,color:T.txB,marginBottom:2}}>
              {card.awayTeam} <span style={{color:T.mut,fontWeight:400}}>@</span> {card.homeTeam}
            </div>
            {/* Meta */}
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:T.mut,fontFamily:F.m}}>{day} {time}</span>
              <span style={{fontSize:10,color:T.mut,fontFamily:F.m}}>·</span>
              <span style={{fontSize:10,color:T.tx,fontFamily:F.m}}>{sideLabel}</span>
              {card.availableOdds&&<>
                <span style={{fontSize:10,color:T.mut,fontFamily:F.m}}>·</span>
                <span style={{fontSize:10,color:T.gold,fontFamily:F.m,fontWeight:700}}>
                  {card.availableOdds>0?"+":""}{card.availableOdds}
                </span>
                <span style={{fontSize:10,color:T.mut,fontFamily:F.m}}>@ {card.availableBookTitle||card.availableBook}</span>
              </>}
            </div>
          </div>
          {/* Edge + movement summary */}
          <div style={{textAlign:"right",marginLeft:8}}>
            {card.dampenedEdge!=null&&<div style={{fontSize:11,fontWeight:700,fontFamily:F.m,color:T.grn}}>
              {(card.dampenedEdge*100).toFixed(1)}%
            </div>}
            <div style={{fontSize:9,color:T.mut,fontFamily:F.m,marginTop:1}}>
              {card.movementLabel!=='STABLE'?card.movementLabel:''}
            </div>
            <span style={{color:T.mut,fontSize:12,display:"block",marginTop:2,
              transform:exp?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
          </div>
        </div>

        {/* ── BODY — visible for LEAN+ ── */}
        {!exp&&showTrack&&(
          <div style={{padding:"0 14px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontSize:10,color:T.mut,fontFamily:F.m}}>
              {card.consensusTier?.replace(/_/g,' ')} · {card.movementLabel}
            </div>
            {(()=>{
              return(
                <Btn sm pri
                  dis={tracked===bk}
                  style={{background:tracked===bk?T.grn:verdictColour.badge,color:"#fff"}}
                  onClick={(ev)=>{
                    ev.stopPropagation();
                    trackBet({
                      sport:SPORTS.find(s=>s.key===sport)?.label||sport,
                      game:`${card.awayTeam} @ ${card.homeTeam}`,
                      type:mktLabel,
                      line:card.betSide==='A'
                        ?(card.totalNumber?`${card.betSide==='A'?'O':'U'} ${card.totalNumber}`:card.availableOdds?.toString()||'')
                        :(card.availableOdds?.toString()||''),
                      odds:card.availableOdds||0,
                      book:card.availableBookTitle||card.availableBook||'',
                      edge:card.dampenedEdge?+(card.dampenedEdge*100).toFixed(1):0,
                      units:card.units,
                      entryOdds:card.availableOdds||0,
                      consensus_prob_at_track:card.consensusProb,
                      score_at_track:card.score,
                      verdict_at_track:card.verdict,
                    },bk);
                  }}
                >
                  {tracked===bk?"✓ Tracked":"+ Track This Bet"}
                </Btn>
              );
            })()}
          </div>
        )}

        {/* ── EXPANDED SECTION ── */}
        {exp&&(
          <div style={{padding:"0 14px 14px",borderTop:`1px solid ${T.bdr}`}}>
            {/* Notes */}
            {card.notes&&<div style={{
              marginTop:10,padding:"8px 10px",background:T.card2,borderRadius:4,
              fontSize:10,color:T.mut,fontFamily:F.m,lineHeight:1.6
            }}>{card.notes}</div>}

            {/* Score trace */}
            <div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap"}}>
              <div style={{padding:"6px 10px",background:T.card2,borderRadius:4,fontSize:9,fontFamily:F.m}}>
                <span style={{color:T.mut}}>Score </span>
                <span style={{color:T.txB,fontWeight:700}}>{card.score}/100</span>
              </div>
              {card.dampenedEdge!=null&&<div style={{padding:"6px 10px",background:T.card2,borderRadius:4,fontSize:9,fontFamily:F.m}}>
                <span style={{color:T.mut}}>Edge </span>
                <span style={{color:T.grn,fontWeight:700}}>{(card.dampenedEdge*100).toFixed(1)}%</span>
                {card.dampeningFactor&&card.dampeningFactor!==1&&
                  <span style={{color:T.mut}}> ({card.dampeningFactor}x damp)</span>}
              </div>}
              <div style={{padding:"6px 10px",background:T.card2,borderRadius:4,fontSize:9,fontFamily:F.m}}>
                <span style={{color:T.mut}}>Consensus </span>
                <span style={{color:T.txB,fontWeight:700}}>{card.consensusTier?.replace(/_/g,' ')}</span>
              </div>
              <div style={{padding:"6px 10px",background:T.card2,borderRadius:4,fontSize:9,fontFamily:F.m}}>
                <span style={{color:T.mut}}>Movement </span>
                <span style={{color:card.movementLabel==='STEAM'?T.gold:card.movementLabel==='FADING'?T.red:T.tx,fontWeight:700}}>
                  {card.movementLabel}
                </span>
                {card.isFirstPull&&<span style={{color:T.mut}}> (1st scan)</span>}
              </div>
              {card.unitsCapped&&<div style={{padding:"6px 10px",background:T.ornB,borderRadius:4,fontSize:9,fontFamily:F.m,color:T.orn}}>
                {card.unitCapReason}
              </div>}
            </div>

            {/* Sharp books */}
            {card.sharpBooksUsed?.length>0&&<div style={{marginTop:8,fontSize:9,color:T.mut,fontFamily:F.m}}>
              Sharp anchor{card.sharpBooksUsed.length>1?'s':''}: {card.sharpBooksUsed.join(', ')} ·{' '}
              Consensus prob: {card.consensusProb?(card.consensusProb*100).toFixed(1)+'%':'—'}
            </div>}

            {/* Track button in expanded section */}
            {showTrack&&(
              <div style={{marginTop:12}}>
                {(()=>{
                  return(
                    <Btn pri
                      dis={tracked===bk}
                      style={{
                        width:"100%",
                        background:tracked===bk?T.grn:tracked==="error"?T.red:verdictColour.badge,
                        color:"#fff"
                      }}
                      onClick={(ev)=>{
                        ev.stopPropagation();
                        trackBet({
                          sport:SPORTS.find(s=>s.key===sport)?.label||sport,
                          game:`${card.awayTeam} @ ${card.homeTeam}`,
                          type:mktLabel,
                          line:card.totalNumber?`${card.betSide==='A'?'O':'U'} ${card.totalNumber}`:(card.availableOdds?.toString()||''),
                          odds:card.availableOdds||0,
                          book:card.availableBookTitle||card.availableBook||'',
                          edge:card.dampenedEdge?+(card.dampenedEdge*100).toFixed(1):0,
                          units:card.units,
                          entryOdds:card.availableOdds||0,
                          consensus_prob_at_track:card.consensusProb,
                          score_at_track:card.score,
                          verdict_at_track:card.verdict,
                        },bk);
                      }}
                    >
                      {tracked===bk?"✓ Tracked":"+ Track This Bet"}
                    </Btn>
                  );
                })()}
              </div>
            )}
          </div>
        )}
      </div>
    );
  };

  // Helper: best edge from card for border highlight
  function bestEdge(card){
    return card.dampenedEdge?card.dampenedEdge*100:0;
  }


  const Tracker=()=>{
    const pending=bets.filter(b=>!b.result);
    const needClv=bets.filter(b=>b.result&&!b.closingOdds);
    const settled=bets.filter(b=>b.result);

    return(
      <div>
        <Btn pri onClick={()=>setManBet(manBet?null:{sport:"",game:"",type:"Spread",line:"",odds:"",book:"",edge:0,units:1})} style={{marginBottom:12,width:"100%"}}>
          {manBet?"✕ Cancel":"+ Log Bet Manually"}
        </Btn>

        {manBet&&(
          <div style={{padding:14,background:T.card,border:`1px solid ${T.bdr}`,borderRadius:8,marginBottom:12}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              {[{l:"Sport",k:"sport",p:"NBA"},{l:"Game",k:"game",p:"Away @ Home"},{l:"Type",k:"type",p:"Spread"},{l:"Line",k:"line",p:"-3.5"},{l:"Odds",k:"odds",p:"-110"},{l:"Book",k:"book",p:"DraftKings"},{l:"Edge %",k:"edge",p:"2.5"},{l:"Units",k:"units",p:"2"}].map(f=>(
                <div key={f.k}>
                  <div style={{fontSize:9,color:T.mut,fontFamily:F.m,marginBottom:2}}>{f.l}</div>
                  <input value={manBet[f.k]} onChange={e=>setManBet(p=>({...p,[f.k]:e.target.value}))} placeholder={f.p} style={{width:"100%",padding:"6px 8px",background:T.card2,border:`1px solid ${T.bdr}`,borderRadius:4,color:T.tx,fontSize:12,fontFamily:F.m,outline:"none"}}/>
                </div>
              ))}
            </div>
            <Btn pri onClick={()=>{trackBet({...manBet,odds:+manBet.odds,edge:+manBet.edge,units:+manBet.units,entryOdds:+manBet.odds});setManBet(null);}}>Save Bet</Btn>
          </div>
        )}

        {pending.length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:700,color:T.gold,fontFamily:F.m,marginBottom:6,textTransform:"uppercase"}}>Pending ({pending.length})</div>
            {pending.map(b=>(
              <div key={b.id} style={{padding:"10px 12px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:6,marginBottom:6}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <span style={{fontSize:12,fontWeight:700,color:T.txB}}>{b.game}</span>
                    <div style={{fontSize:10,color:T.mut,fontFamily:F.m,marginTop:2}}>{b.type} {b.line} · {b.odds>0?"+":""}{b.odds} · {b.book} · {b.units}u</div>
                  </div>
                  <div style={{display:"flex",gap:4}}>
                    <Btn sm style={{background:T.grnB,color:T.grn}} onClick={()=>updateResult(b.id,"W")}>W</Btn>
                    <Btn sm style={{background:T.redB,color:T.red}} onClick={()=>updateResult(b.id,"L")}>L</Btn>
                    <Btn sm onClick={()=>updateResult(b.id,"P")}>P</Btn>
                    <Btn sm style={{background:T.redB,color:T.red}} onClick={()=>deleteBet(b.id)}>✕</Btn>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {needClv.length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:700,color:T.blu,fontFamily:F.m,marginBottom:6,textTransform:"uppercase"}}>Enter Closing Lines ({needClv.length})</div>
            {clvFetchErr&&<div onClick={()=>setClvFetchErr(null)} style={{padding:"8px 10px",background:T.redB,border:`1px solid ${T.red}40`,borderRadius:4,marginBottom:8,fontSize:10,fontFamily:F.m,color:T.red,cursor:"pointer"}}>{clvFetchErr} <span style={{color:T.mut}}>(tap to dismiss)</span></div>}
            {needClv.map(b=>(
              <div key={b.id} style={{padding:"10px 12px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:6,marginBottom:6}}>
                <div style={{fontSize:11,fontWeight:600,color:T.txB,marginBottom:4}}>{b.game} — {b.type} {b.line}</div>
                <div style={{fontSize:10,color:T.mut,fontFamily:F.m,marginBottom:6}}>Entry: {b.odds>0?"+":""}{b.odds} · Result: <span style={{color:b.result==="W"?T.grn:T.red}}>{b.result}</span></div>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                  <Btn sm style={{background:T.bluB,color:T.blu}} dis={clvFetching===b.id} onClick={()=>fetchCLV(b)}>
                    {clvFetching===b.id?"Fetching...":"⟳ Fetch CLV"}
                  </Btn>
                  <span style={{fontSize:9,color:T.mut,fontFamily:F.m}}>1 API credit · works within 24hr of game end</span>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input type="number" placeholder="Or enter manually (e.g. -115)" value={clvIn[b.id]||""} onChange={e=>setClvIn(p=>({...p,[b.id]:e.target.value}))} style={{flex:1,padding:"6px 8px",background:T.card2,border:`1px solid ${T.bdr}`,borderRadius:4,color:T.tx,fontSize:11,fontFamily:F.m,outline:"none"}}/>
                  {clvIn[b.id]&&(
                    <span style={{fontSize:10,fontFamily:F.m,color:calcCLV(b.entryOdds||b.odds,+clvIn[b.id])>0?T.grn:T.red}}>
                      CLV: {calcCLV(b.entryOdds||b.odds,+clvIn[b.id]).toFixed(1)}%
                    </span>
                  )}
                  <Btn sm pri dis={!clvIn[b.id]} onClick={()=>{enterCLV(b.id,+clvIn[b.id]);setClvIn(p=>{const n={...p};delete n[b.id];return n;});}}>Save</Btn>
                </div>
              </div>
            ))}
          </div>
        )}

        {settled.length>0&&(
          <div>
            <div style={{fontSize:10,fontWeight:700,color:T.mut,fontFamily:F.m,marginBottom:6,textTransform:"uppercase"}}>History ({settled.length})</div>
            {settled.map(b=>(
              <div key={b.id} style={{padding:"8px 12px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:6,marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{flex:1}}>
                  <span style={{fontSize:11,color:T.txB,fontWeight:600}}>{b.game}</span>
                  <div style={{fontSize:9,color:T.mut,fontFamily:F.m,marginTop:2}}>
                    {b.type} {b.line} · {b.odds>0?"+":""}{b.odds} · {b.book}
                    {b.clv!=null&&<span style={{color:b.clv>0?T.grn:T.red,marginLeft:6}}>CLV: {b.clv>0?"+":""}{b.clv.toFixed(1)}%</span>}
                  </div>
                </div>
                <Badge bg={b.result==="W"?T.grnB:b.result==="L"?T.redB:T.bdr} color={b.result==="W"?T.grn:b.result==="L"?T.red:T.mut}>{b.result}</Badge>
              </div>
            ))}
          </div>
        )}

        {!bets.length&&<div style={{textAlign:"center",padding:40,color:T.mut,fontSize:12,fontFamily:F.m}}>No bets tracked yet. Use the scanner to find edges.</div>}
      </div>
    );
  };

  const Dashboard=()=>{
    const Stat=({label,value,sub,color})=>(
      <div style={{padding:"14px 12px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:8,textAlign:"center"}}>
        <div style={{fontSize:22,fontWeight:800,color:color||T.txB,fontFamily:F.m}}>{value}</div>
        <div style={{fontSize:9,color:T.mut,fontFamily:F.m,marginTop:2,textTransform:"uppercase",letterSpacing:".05em"}}>{label}</div>
        {sub&&<div style={{fontSize:9,color:T.mut,fontFamily:F.m,marginTop:2}}>{sub}</div>}
      </div>
    );

    return(
      <div>
        <div style={{padding:"12px 14px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:8,marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:10,color:T.mut,fontFamily:F.m,whiteSpace:"nowrap"}}>Bankroll $</div>
          <input type="number" value={bankroll||""} onChange={e=>setBankroll(+e.target.value)} placeholder="5000" style={{flex:1,padding:"6px 8px",background:T.card2,border:`1px solid ${T.bdr}`,borderRadius:4,color:T.gold,fontSize:14,fontWeight:700,fontFamily:F.m,outline:"none"}}/>
          <div style={{fontSize:10,color:T.mut,fontFamily:F.m}}>1u = ${unitSz.toLocaleString()}</div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
          <Stat label="Record" value={`${stats.W}-${stats.L}`} sub={stats.P?`${stats.P} pushes`:null}/>
          <Stat label="Win Rate" value={stats.wr?stats.wr.toFixed(1)+"%":"—"} color={stats.wr>55?T.grn:stats.wr>50?T.tx:T.red}/>
          <Stat label="ROI" value={stats.roi?(stats.roi>0?"+":"")+stats.roi.toFixed(1)+"%":"—"} color={stats.roi>0?T.grn:T.red}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
          <Stat label="Avg CLV" value={stats.avgClv?(stats.avgClv>0?"+":"")+stats.avgClv.toFixed(1)+"%":"—"} sub={`${stats.clvN} measured`} color={stats.avgClv>0?T.grn:T.red}/>
          <Stat label="Profit" value={stats.profit?(stats.profit>0?"+$":"-$")+Math.abs(Math.round(stats.profit)).toLocaleString():"—"} color={stats.profit>0?T.grn:T.red}/>
          <Stat label="Total Bets" value={stats.total} sub={`${stats.settled} settled`}/>
        </div>

        {Object.keys(stats.bySport).length>0&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,color:T.gold,fontFamily:F.m,marginBottom:6,textTransform:"uppercase"}}>By Sport</div>
            {Object.entries(stats.bySport).map(([sp,d])=>(
              <div key={sp} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:4,marginBottom:4,fontSize:11,fontFamily:F.m}}>
                <span style={{color:T.txB,fontWeight:600}}>{sp}</span>
                <span style={{color:T.mut}}>{d.w}-{d.l} ({d.n} bets) · {d.w+d.l>0?(d.w/(d.w+d.l)*100).toFixed(0):0}%</span>
              </div>
            ))}
          </div>
        )}

        {Object.keys(stats.byType).length>0&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:700,color:T.blu,fontFamily:F.m,marginBottom:6,textTransform:"uppercase"}}>By Type</div>
            {Object.entries(stats.byType).map(([tp,d])=>(
              <div key={tp} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:4,marginBottom:4,fontSize:11,fontFamily:F.m}}>
                <span style={{color:T.txB,fontWeight:600}}>{tp}</span>
                <span style={{color:T.mut}}>{d.w}-{d.l} ({d.n} bets) · {d.w+d.l>0?(d.w/(d.w+d.l)*100).toFixed(0):0}%</span>
              </div>
            ))}
          </div>
        )}

        <div style={{padding:"12px 14px",background:T.card,border:`1px solid ${T.bdr}`,borderRadius:8}}>
          <div style={{fontSize:10,fontWeight:700,color:T.gold,fontFamily:F.m,marginBottom:8,textTransform:"uppercase"}}>Unit Sizing Guide</div>
          <div style={{fontSize:10,color:T.mut,fontFamily:F.m,marginBottom:8,lineHeight:1.5}}>Walters: "limit your maximum wager to 3% of bankroll." Scale with edge, 0.5u increments.</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
            {[{r:"3–3.5%",u:"0.5 unit",n:0.5},{r:"3.5–4.5%",u:"1 unit",n:1},{r:"4.5–5.5%",u:"1.5 units",n:1.5},{r:"5.5–7%",u:"2 units",n:2},{r:"7%+",u:"2.5–3u MAX",n:3}].map(x=>(
              <div key={x.r} style={{padding:"8px 10px",background:T.card2,borderRadius:4,border:`1px solid ${T.bdr}`}}>
                <div style={{color:T.grn,fontSize:10,fontWeight:700,fontFamily:F.m}}>{x.r} edge</div>
                <div style={{color:T.txB,fontSize:12,fontWeight:700,fontFamily:F.m,marginTop:2}}>{x.u}</div>
                <div style={{color:T.gold,fontSize:10,fontFamily:F.m,marginTop:1}}>{bankroll>0?`$${(x.n*unitSz).toLocaleString()}`:"—"}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  };

    <div>
      <div style={{fontSize:10,fontWeight:700,color:T.gold,fontFamily:F.m,marginBottom:8,textTransform:"uppercase"}}>My Sportsbooks</div>
      <div style={{fontSize:10,color:T.mut,fontFamily:F.m,marginBottom:10,lineHeight:1.5}}>Select books you have accounts with. Edge calculations prioritize lines available to you. Leave empty to show all.</div>

    {k:"scanner",l:"Scanner",i:"◎"},
    {k:"tracker",l:"Tracker",i:"▣",badge:bets.filter(b=>!b.result).length||null},

  return(
    <div style={{maxWidth:520,margin:"0 auto",minHeight:"100vh",background:T.bg}}>
      <div style={{padding:"16px 16px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:30,height:30,borderRadius:6,background:`linear-gradient(135deg,${T.gold},${T.goldD})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:T.bg,fontFamily:F.m}}>SL</div>
          <div style={{fontSize:15,fontWeight:800,color:T.txB,letterSpacing:".04em",fontFamily:F.m}}>SHARPLINE</div>
        </div>
        {credits!==null&&<div style={{fontSize:9,color:T.mut,fontFamily:F.m}}>{credits.toLocaleString()} credits</div>}
      </div>

      <div style={{display:"flex",gap:2,padding:"12px 16px 0",borderBottom:`1px solid ${T.bdr}`}}>
        {tabs.map(t=>(
          <div key={t.k} onClick={()=>setTab(t.k)} style={{padding:"8px 14px",cursor:"pointer",borderBottom:`2px solid ${tab===t.k?T.gold:"transparent"}`,display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:12,color:tab===t.k?T.gold:T.mut}}>{t.i}</span>
            <span style={{fontSize:11,fontWeight:600,color:tab===t.k?T.txB:T.mut,fontFamily:F.m}}>{t.l}</span>
            {t.badge&&<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:16,height:16,borderRadius:8,background:T.gold,color:T.bg,fontSize:9,fontWeight:800,fontFamily:F.m}}>{t.badge}</span>}
          </div>
        ))}
      </div>

      <div style={{padding:16}}>
        {trackErr&&<div onClick={()=>setTrackErr(null)} style={{padding:"10px 12px",background:T.redB,border:`1px solid ${T.red}40`,borderRadius:6,marginBottom:10,fontSize:11,fontFamily:F.m,color:T.red,cursor:"pointer",lineHeight:1.5}}>⚠ Track failed: {trackErr}<br/><span style={{fontSize:9,color:T.mut}}>Tap to dismiss</span></div>}
        {tab==="scanner"&&(
          <>
            <div style={{display:"flex",gap:4,marginBottom:10,overflowX:"auto",paddingBottom:4}}>
              {SPORTS.map(s=>(
                <div key={s.key} onClick={()=>setSport(s.key)} style={{padding:"6px 12px",borderRadius:4,cursor:"pointer",whiteSpace:"nowrap",background:sport===s.key?T.gold+"15":T.card,border:`1px solid ${sport===s.key?T.gold+"40":T.bdr}`,display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:12}}>{s.icon}</span>
                  <span style={{fontSize:11,fontWeight:600,color:sport===s.key?T.gold:T.mut,fontFamily:F.m}}>{s.label}</span>
                  {cache[s.key]&&<span style={{width:5,height:5,borderRadius:3,background:T.grn,display:"inline-block"}}></span>}
                </div>
              ))}
            </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <Btn pri onClick={fetchOdds} dis={loading}>{loading?"Loading...":"↻ Refresh Odds"}</Btn>
              <span style={{fontSize:9,color:T.mut,fontFamily:F.m}}>
                {cache[sport]?`Loaded ${Math.round((Date.now()-cache[sport].time)/6e4)}m ago`:"Not loaded"}
                {games.length>0&&` · ${games.length} cards`}
              </span>
            </div>

            {enriched.length>0?(
              enriched.map((g,i)=><GameCard key={g.gameId+g.marketType+g.betSide} game={g} index={i}/>)
            ):(
              <div style={{textAlign:"center",padding:60,color:T.mut}}>
                <div style={{fontSize:32,marginBottom:12}}>◎</div>
                <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Hit Refresh to scan for edges</div>
                <div style={{fontSize:11,fontFamily:F.m}}>Manual refresh only — you control credit usage</div>
              </div>
            )}
          </>
        )}

        {tab==="tracker"&&<Tracker/>}
        {tab==="dashboard"&&<Dashboard/>}
        {tab==="settings"&&<Settings/>}

        <div style={{marginTop:24,paddingTop:12,borderTop:`1px solid ${T.bdr}`,textAlign:"center",color:T.mut,fontSize:8,fontFamily:F.m,lineHeight:1.8,letterSpacing:".05em"}}>
          LIVE ODDS · {myBooks.length||"ALL"} SPORTSBOOKS · CLOUD SYNC · SHARPLINE
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<SharpLine/>);
</script>
</body>
</html>
