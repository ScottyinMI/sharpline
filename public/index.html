// =============================================================================
// SHARPLINE ENGINE — COMPONENT 2: VIG REMOVAL UTILITIES
// =============================================================================
// Four pure utility functions. No state. No API calls. No side effects.
// Input: American odds. Output: vig-removed implied probabilities.
// Method: Additive vig removal (both sides divide by total overround).
// Vig-removed probabilities always sum to exactly 1.00.
// Version 1.0 | Phase 1
// =============================================================================

// ── americanToDecimal(odds) ──────────────────────────────────────────────────
// Converts American odds to decimal odds.
// Positive odds (underdog): decimal = (odds / 100) + 1
// Negative odds (favorite): decimal = (100 / |odds|) + 1
// Throws if odds is 0 or not a finite number.

function americanToDecimal(odds) {
  if (!Number.isFinite(odds) || odds === 0) {
    throw new Error('americanToDecimal: odds must be a non-zero finite number, got ' + odds);
  }
  return odds > 0
    ? (odds / 100) + 1
    : (100 / Math.abs(odds)) + 1;
}

// ── decimalToRawProb(decimal) ────────────────────────────────────────────────
// Converts decimal odds to raw (pre-vig) implied probability.
// Raw probs from a two-sided market sum to MORE than 1.00 — the excess is vig.
// Throws if decimal is <= 1 (not a valid odds representation).

function decimalToRawProb(decimal) {
  if (!Number.isFinite(decimal) || decimal <= 1) {
    throw new Error('decimalToRawProb: decimal must be > 1, got ' + decimal);
  }
  return 1 / decimal;
}

// ── removeVig(probA, probB) ──────────────────────────────────────────────────
// Removes the bookmaker's margin from a two-sided market (additive method).
// Both sides divide by the total overround.
// Result: two vig-removed probabilities that sum to exactly 1.00.
// Returns: { vigRemovedA, vigRemovedB, overround, vigPct }
// Throws if either prob is not between 0 and 1 exclusive.

function removeVig(probA, probB) {
  if (!Number.isFinite(probA) || probA <= 0 || probA >= 1) {
    throw new Error('removeVig: probA must be between 0 and 1 exclusive, got ' + probA);
  }
  if (!Number.isFinite(probB) || probB <= 0 || probB >= 1) {
    throw new Error('removeVig: probB must be between 0 and 1 exclusive, got ' + probB);
  }
  const overround = probA + probB;
  const vigRemovedA = probA / overround;
  const vigRemovedB = probB / overround;
  const vigPct = overround - 1;
  return { vigRemovedA, vigRemovedB, overround, vigPct };
}

// ── vigRemoveSide(oddsA, oddsB, side) ───────────────────────────────────────
// Full pipeline: American odds → decimal → raw prob → vig removal.
// Returns vig-removed implied probability for the specified side (A or B),
// plus the full result object so the caller never needs to run the pipeline twice.
//
// PRIMARY function called by Component 3 (Sharp Consensus Engine) and
// Component 4 (Edge Calculation Module).
//
// Returns: {
//   vigRemovedProb,  — vig-removed prob for the requested side
//   vigRemovedA,     — vig-removed prob for side A
//   vigRemovedB,     — vig-removed prob for side B
//   overround,       — sum of raw probs (reflects book margin)
//   vigPct,          — margin as decimal (e.g. 0.0476 = 4.76% vig)
//   side,            — which side was requested ('A' or 'B')
// }

function vigRemoveSide(oddsA, oddsB, side) {
  if (side !== 'A' && side !== 'B') {
    throw new Error("vigRemoveSide: side must be 'A' or 'B', got " + side);
  }
  const decimalA = americanToDecimal(oddsA);
  const decimalB = americanToDecimal(oddsB);
  const rawProbA = decimalToRawProb(decimalA);
  const rawProbB = decimalToRawProb(decimalB);
  const { vigRemovedA, vigRemovedB, overround, vigPct } = removeVig(rawProbA, rawProbB);
  const vigRemovedProb = side === 'A' ? vigRemovedA : vigRemovedB;
  return { vigRemovedProb, vigRemovedA, vigRemovedB, overround, vigPct, side };
}

  for (const [a, b] of markets) {
    const dA = americanToDecimal(a);
    const dB = americanToDecimal(b);
    const pA = decimalToRawProb(dA);
    const pB = decimalToRawProb(dB);
    const { vigRemovedA, vigRemovedB } = removeVig(pA, pB);
    const sum = vigRemovedA + vigRemovedB;
    ok(`removeVig(${a}/${b}) sums to 1.000000`, near(sum, 1.0));
  }

  // ── Required test cases from Phase 1 spec ─────────────────────────────────

  // Case 1: -110/-110 → both sides = 50.0000%
  const c1 = vigRemoveSide(-110, -110, 'A');
  ok('Case 1: -110/-110 sideA ≈ 0.500000', near(c1.vigRemovedA, 0.500000));
  ok('Case 1: -110/-110 sideB ≈ 0.500000', near(c1.vigRemovedB, 0.500000));
  ok('Case 1: sum = 1.000000', near(c1.vigRemovedA + c1.vigRemovedB, 1.0));

  // Case 2: -130/+110
  const c2A = vigRemoveSide(-130, +110, 'A'); // favorite side
  const c2B = vigRemoveSide(-130, +110, 'B'); // underdog side
  ok('Case 2: -130/+110 favorite > 0.50', c2A.vigRemovedA > 0.50);
  ok('Case 2: -130/+110 underdog < 0.50', c2A.vigRemovedB < 0.50);
  ok('Case 2: sum = 1.000000', near(c2A.vigRemovedA + c2A.vigRemovedB, 1.0));
  ok('Case 2: B side returns correct prob', near(c2B.vigRemovedProb, c2A.vigRemovedB));

  // Case 3: +160/-180 (underdog/favorite)
  const c3 = vigRemoveSide(+160, -180, 'A');
  ok('Case 3: +160/-180 sideA (underdog) < 0.50', c3.vigRemovedA < 0.50);
  ok('Case 3: +160/-180 sideB (favorite) > 0.50', c3.vigRemovedB > 0.50);
  ok('Case 3: sum = 1.000000', near(c3.vigRemovedA + c3.vigRemovedB, 1.0));

  // ── Error handling ─────────────────────────────────────────────────────────

  // vigRemoveSide throws on invalid side
  threw = false;
  try { vigRemoveSide(-110, -110, 'C'); } catch(e) { threw = true; }
  ok("vigRemoveSide side='C' throws", threw);

  // removeVig does NOT throw on equal probs (0.6/0.6 overround = 1.2, valid)
  threw = false;
  try { removeVig(0.6, 0.6); } catch(e) { threw = true; }
  ok('removeVig(0.6, 0.6) does not throw', !threw);

  // ── vigRemovedProb matches requested side ──────────────────────────────────
  const sideA = vigRemoveSide(-130, +110, 'A');
  const sideB = vigRemoveSide(-130, +110, 'B');
  ok('vigRemovedProb = vigRemovedA when side=A', near(sideA.vigRemovedProb, sideA.vigRemovedA));
  ok('vigRemovedProb = vigRemovedB when side=B', near(sideB.vigRemovedProb, sideB.vigRemovedB));
  ok('side field preserved (A)', sideA.side === 'A');
  ok('side field preserved (B)', sideB.side === 'B');

  // ── Report ─────────────────────────────────────────────────────────────────
  const passed = checks.filter(c => c.pass).length;
  const failed = checks.filter(c => !c.pass);

  console.log('\n=== SHARPLINE — Component 2 Verification ===');
  console.log(passed + ' / ' + checks.length + ' checks passed');

  if (failed.length > 0) {
    console.warn('\n FAILED:');
    failed.forEach(c => console.warn('  FAIL: ' + c.label));
  } else {
    console.log('\n All checks passed. Component 2 verified. Proceed to Component 3.');
  }
})();


// =============================================================================
// SHARPLINE ENGINE — COMPONENT 3: SHARP CONSENSUS ENGINE
// =============================================================================
// Receives raw book arrays from The Odds API for one game/market/side.
// Classifies books into tiers, applies vig removal via Component 2,
// computes a median consensus probability, and returns a full consensus result
// object that Components 4, 5, 6, and 8 all depend on.
//
// Dependencies: SHARPLINE_CONFIG (Component 1), vigRemoveSide (Component 2)
// Version 1.0 | Phase 1
// =============================================================================

// ── Internal median helper ───────────────────────────────────────────────────
// Median of an array of numbers. Returns 0 for empty array.
// Used internally by buildSharpConsensus — also exposed for testing.
// Note: the existing app code already defines a median() function.
// This version is named _slMedian to avoid collision during Phase 1.
function _slMedian(arr) {
  if (!arr.length) return 0;
  const sorted = [...arr].sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 !== 0
    ? sorted[mid]
    : (sorted[mid - 1] + sorted[mid]) / 2;
}

// ── buildSharpConsensus(books, betSide, market, sport) ───────────────────────
//
// Primary function called by Component 4 (Edge Calculation) and Component 8
// (Recommendation Card) for each game/market/side being evaluated.
//
// @param books    Array of book objects: [{ key: string, oddsA: number, oddsB: number }]
//                 oddsA = the side being evaluated (e.g. away spread, over total, away ML)
//                 oddsB = the other side
// @param betSide  'A' | 'B' — which side to extract the vig-removed prob for
// @param market   string — market key ('spreads' | 'totals' | 'h2h' | 'puck_line' | 'run_line')
// @param sport    string — Odds API sport key (e.g. 'basketball_nba')
//
// @returns consensus result object (see return statement for full schema)

function buildSharpConsensus(books, betSide, market, sport) {

  // ── GATE: minimum total book count ────────────────────────────────────────
  // Fewer than 3 total books in the market = insufficient data.
  // Return NO_DATA immediately. Do not attempt tier selection or vig removal.
  if (!books || books.length < SHARPLINE_CONFIG.MIN_BOOKS_REQUIRED) {
    return {
      consensusProb:       null,
      consensusTier:       'NO_DATA',
      consensusConfidence: 0.00,
      sharpBooksUsed:      [],
      sharpBookProbs:      [],
      bookCount:           books ? books.length : 0,
      sharpBookCount:      0,
      secondaryBookCount:  0,
      singleSideFlag:      false,
      betSide,
      market,
      sport,
      reason:              'Insufficient market data',
      evaluatedAt:         new Date().toISOString(),
    };
  }

  // ── STEP 1: Classify books into tiers ────────────────────────────────────
  // Strict classification — a book is PRIMARY, SECONDARY, or neither (retail).
  // Uses the live config keys, which reflect what is actually in the API feed.
  const primarySharp = books.filter(b =>
    SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY.includes(b.key)
  );
  const secondary = books.filter(b =>
    SHARPLINE_CONFIG.SHARP_BOOKS.SECONDARY.includes(b.key)
  );

  // ── STEP 2: Tier selection — strict priority chain ────────────────────────
  // Evaluated as if/else — first condition that fires wins. No fall-through.
  let tier, confidence, sourceBooks;

  if (primarySharp.length >= 2) {
    // 2+ primary sharp books → SHARP_CONSENSUS
    tier        = 'SHARP_CONSENSUS';
    confidence  = SHARPLINE_CONFIG.CONSENSUS_TIERS.SHARP_CONSENSUS.confidence; // 1.00
    sourceBooks = primarySharp;
  } else if (primarySharp.length === 1) {
    // Exactly 1 primary sharp book → SINGLE_SHARP
    tier        = 'SINGLE_SHARP';
    confidence  = SHARPLINE_CONFIG.CONSENSUS_TIERS.SINGLE_SHARP.confidence;    // 0.70
    sourceBooks = primarySharp;
  } else if (secondary.length >= 2) {
    // 0 primary sharp, 2+ secondary books → MARKET_MEDIAN
    // Uses only secondary books (DK/FD equivalents). Retail books excluded.
    tier        = 'MARKET_MEDIAN';
    confidence  = SHARPLINE_CONFIG.CONSENSUS_TIERS.MARKET_MEDIAN.confidence;   // 0.60
    sourceBooks = secondary;
  } else {
    // No sharp or secondary books, but >= 3 total books → FULL_MARKET_MEDIAN
    // All available books used. Lowest confidence tier.
    tier        = 'FULL_MARKET_MEDIAN';
    confidence  = SHARPLINE_CONFIG.CONSENSUS_TIERS.FULL_MARKET_MEDIAN.confidence; // 0.40
    sourceBooks = books;
  }

  // ── STEP 3: Vig removal per source book ───────────────────────────────────
  // Call vigRemoveSide() (Component 2) for each book in sourceBooks.
  // A book with null/invalid odds throws — catch it, skip that book, continue.
  // A single bad book must NOT crash the consensus or drop to a lower tier.
  const sharpBooksUsed = [];
  const sharpBookProbs = [];
  let   singleSideFlag = false;

  for (const book of sourceBooks) {
    try {
      const result = vigRemoveSide(book.oddsA, book.oddsB, betSide);
      sharpBooksUsed.push(book.key);
      sharpBookProbs.push(result.vigRemovedProb);
    } catch (err) {
      // Log the skip but do not re-throw. The remaining books still produce consensus.
      console.warn(`[buildSharpConsensus] Skipped book '${book.key}': ${err.message}`);
      singleSideFlag = true; // flag that at least one book had bad odds
    }
  }

  // ── GATE: all source books had invalid odds ────────────────────────────────
  // If every book in sourceBooks threw, we have no valid probabilities.
  // Return NO_DATA rather than a consensus based on zero data points.
  if (sharpBookProbs.length === 0) {
    return {
      consensusProb:       null,
      consensusTier:       'NO_DATA',
      consensusConfidence: 0.00,
      sharpBooksUsed:      [],
      sharpBookProbs:      [],
      bookCount:           books.length,
      sharpBookCount:      primarySharp.length,
      secondaryBookCount:  secondary.length,
      singleSideFlag:      true,
      betSide,
      market,
      sport,
      reason:              'No valid odds in source books — all skipped',
      evaluatedAt:         new Date().toISOString(),
    };
  }

  // ── STEP 3b: Stale/alt-line sanity check ─────────────────────────────────
  // If we have only ONE sharp book (SINGLE_SHARP), check that its price is
  // consistent with the rest of the market. Circa sometimes prices a different
  // market (alt-line, early line not updated) that diverges wildly from current
  // consensus. If the sharp book's vig-removed prob differs from the full-market
  // median by more than 0.25 (25 percentage points), it is a stale or alt line.
  // Downgrade to MARKET_MEDIAN using secondary books, or FULL_MARKET_MEDIAN.
  if (tier === 'SINGLE_SHARP' && sharpBookProbs.length === 1) {
    const allProbs = [];
    for (const book of books) {
      try {
        const r = vigRemoveSide(book.oddsA, book.oddsB, betSide);
        allProbs.push(r.vigRemovedProb);
      } catch(e) {}
    }
    if (allProbs.length >= 3) {
      const marketMedian = _slMedian(allProbs);
      const deviation = Math.abs(sharpBookProbs[0] - marketMedian);
      if (deviation > 0.25) {
        // Sharp book is stale or pricing a different market — fall back
        console.warn('[buildSharpConsensus] SINGLE_SHARP stale line detected:',
          'sharp=' + sharpBookProbs[0].toFixed(3),
          'market=' + marketMedian.toFixed(3),
          'dev=' + deviation.toFixed(3));
        // Re-tier: use secondary books if available, otherwise full market
        if (secondary.length >= 2) {
          tier        = 'MARKET_MEDIAN';
          confidence  = SHARPLINE_CONFIG.CONSENSUS_TIERS.MARKET_MEDIAN.confidence;
          // Rebuild probs from secondary books
          sharpBooksUsed.length = 0;
          sharpBookProbs.length = 0;
          for (const book of secondary) {
            try {
              const r = vigRemoveSide(book.oddsA, book.oddsB, betSide);
              sharpBooksUsed.push(book.key);
              sharpBookProbs.push(r.vigRemovedProb);
            } catch(e) {}
          }
        } else {
          tier        = 'FULL_MARKET_MEDIAN';
          confidence  = SHARPLINE_CONFIG.CONSENSUS_TIERS.FULL_MARKET_MEDIAN.confidence;
          sharpBooksUsed.length = 0;
          sharpBookProbs.length = 0;
          for (const book of books) {
            try {
              const r = vigRemoveSide(book.oddsA, book.oddsB, betSide);
              sharpBooksUsed.push(book.key);
              sharpBookProbs.push(r.vigRemovedProb);
            } catch(e) {}
          }
        }
      }
    }
  }

  // ── STEP 4: Consensus probability — median of vig-removed probs ───────────
  // Median, not mean. Prevents a single stale or anomalous book from dragging
  // the consensus. This is a permanent design decision (not a Phase 1 provisional).
  //
  // 3 books: median of three
  // 2 books: average of two (which is also the median of two)
  // 1 book:  that book's single vig-removed probability (SINGLE_SHARP tier)
  const consensusProb = _slMedian(sharpBookProbs);

  // ── STEP 5: Return full consensus result object ───────────────────────────
  // Component 4 uses: consensusProb, consensusTier, consensusConfidence, sharpBookProbs
  // Component 6 uses: consensusConfidence (for confidence score), sharpBookProbs (for divergence)
  // Component 8 uses: all fields for the recommendation card
  return {
    consensusProb,                          // vig-removed median probability for betSide
    consensusTier:       tier,              // 'SHARP_CONSENSUS' | 'SINGLE_SHARP' | 'MARKET_MEDIAN' | 'FULL_MARKET_MEDIAN'
    consensusConfidence: confidence,        // 0.40 | 0.60 | 0.70 | 1.00
    sharpBooksUsed,                         // keys of books that contributed to consensusProb
    sharpBookProbs,                         // individual vig-removed probs from each source book
    bookCount:           books.length,      // total books in the market (for display)
    sharpBookCount:      primarySharp.length,
    secondaryBookCount:  secondary.length,
    singleSideFlag,                         // true if any book had to be skipped
    betSide,
    market,
    sport,
    evaluatedAt:         new Date().toISOString(),
  };
}

// =============================================================================
// COMPONENT 3 VERIFICATION — 10 test cases from the spec
// Adapted for the live config (williamhill_us as PRIMARY, lowvig/betanysports/
// betonlineag/draftkings/fanduel as SECONDARY).
// All spec scenarios are preserved — book keys updated to match live config.
// =============================================================================

(function verifyComponent3() {
  const EPSILON = 0.000001;
  const near = (a, b) => Math.abs(a - b) < EPSILON;
  const checks = [];
  const ok = (label, pass) => checks.push({ label, pass: !!pass });

  // ── Test 1: Two primary sharp books → SHARP_CONSENSUS ────────────────────
  // (Spec called for 3 primaries; we only have 1 in live config.
  //  Test uses a simulated scenario with 2 primary books to verify the tier logic.
  //  In live operation, expect mostly SINGLE_SHARP with current API tier.)
  {
    const books = [
      { key: 'williamhill_us', oddsA: -108, oddsB: -112 }, // primary
      { key: 'lowvig',         oddsA: -110, oddsB: -110 }, // secondary (will be treated as secondary)
      { key: 'betanysports',   oddsA: -112, oddsB: -108 }, // secondary
      { key: 'draftkings',     oddsA: -115, oddsB: -105 }, // secondary
    ];
    const r = buildSharpConsensus(books, 'A', 'spreads', 'basketball_nba');
    // williamhill_us is PRIMARY, others are SECONDARY → SINGLE_SHARP
    ok('T1: single primary → SINGLE_SHARP tier', r.consensusTier === 'SINGLE_SHARP');
    ok('T1: confidence = 0.70',                  near(r.consensusConfidence, 0.70));
    ok('T1: only primary in sharpBooksUsed',      r.sharpBooksUsed.length === 1 && r.sharpBooksUsed[0] === 'williamhill_us');
    ok('T1: bookCount = 4',                       r.bookCount === 4);
    ok('T1: sharpBookProbs.length = 1',           r.sharpBookProbs.length === 1);
    ok('T1: consensusProb is valid probability',  r.consensusProb > 0 && r.consensusProb < 1);
  }

  // ── Test 2: SHARP_CONSENSUS tier simulation (2 primary books) ────────────
  // Temporarily test the 2-primary-book path by using two williamhill_us-like entries
  // with different keys that we inject directly — verifies tier logic works at >= 2.
  {
    // Inject test books using the actual config primary list check
    // We simulate by temporarily overriding to test the >=2 path

      { key: 'bookA', oddsA: -108, oddsB: -112 },
      { key: 'bookB', oddsA: -110, oddsB: -110 },

    const r = buildSharpConsensus(books, 'A', 'spreads', 'basketball_nba');
    SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY = savedPrimary; // restore
    ok('T2: 2 primary books → SHARP_CONSENSUS',   r.consensusTier === 'SHARP_CONSENSUS');
    ok('T2: confidence = 1.00',                   near(r.consensusConfidence, 1.00));
    ok('T2: sharpBooksUsed.length = 2',           r.sharpBooksUsed.length === 2);
    ok('T2: bookC excluded from consensus',        !r.sharpBooksUsed.includes('bookC'));
    ok('T2: consensusProb = median of 2 books',   r.sharpBookProbs.length === 2);
  }

  // ── Test 3: One primary book → SINGLE_SHARP ───────────────────────────────
  {
    const books = [
      { key: 'williamhill_us', oddsA: -108, oddsB: -112 }, // primary
      { key: 'draftkings',     oddsA: -115, oddsB: -105 }, // secondary
      { key: 'fanduel',        oddsA: -110, oddsB: -110 }, // secondary
    ];
    const r = buildSharpConsensus(books, 'B', 'spreads', 'icehockey_nhl');
    ok('T3: SINGLE_SHARP tier',              r.consensusTier === 'SINGLE_SHARP');
    ok('T3: confidence = 0.70',              near(r.consensusConfidence, 0.70));
    ok('T3: only williamhill_us used',       r.sharpBooksUsed[0] === 'williamhill_us');
    ok('T3: betSide B preserved',            r.betSide === 'B');
    ok('T3: secondary books excluded',       r.sharpBooksUsed.length === 1);
    // B-side of -108/-112 should be the higher-prob side (favorite)
    ok('T3: B-side prob > 0.5 for -108/-112', r.consensusProb > 0.50);
  }

  // ── Test 4: No primary, 2+ secondary → MARKET_MEDIAN ─────────────────────
  {
    const books = [
      { key: 'draftkings',   oddsA: -115, oddsB: -105 }, // secondary
      { key: 'fanduel',      oddsA: -112, oddsB: -108 }, // secondary
      { key: 'betmgm',       oddsA: -110, oddsB: -110 }, // retail — should be excluded
    ];
    const r = buildSharpConsensus(books, 'A', 'spreads', 'basketball_nba');
    ok('T4: MARKET_MEDIAN tier',             r.consensusTier === 'MARKET_MEDIAN');
    ok('T4: confidence = 0.60',              near(r.consensusConfidence, 0.60));
    ok('T4: sharpBookCount = 0',             r.sharpBookCount === 0);
    ok('T4: only DK and FD in used',         r.sharpBooksUsed.includes('draftkings') && r.sharpBooksUsed.includes('fanduel'));
    ok('T4: betmgm excluded',                !r.sharpBooksUsed.includes('betmgm'));
  }

  // ── Test 5: No sharp or secondary → FULL_MARKET_MEDIAN ───────────────────
  {
    const books = [
      { key: 'betmgm',   oddsA: -110, oddsB: -110 },
      { key: 'wynnbet',  oddsA: -112, oddsB: -108 },
      { key: 'caesars',  oddsA: -108, oddsB: -112 },
    ];
    const r = buildSharpConsensus(books, 'A', 'spreads', 'basketball_nba');
    ok('T5: FULL_MARKET_MEDIAN tier',       r.consensusTier === 'FULL_MARKET_MEDIAN');
    ok('T5: confidence = 0.40',             near(r.consensusConfidence, 0.40));
    ok('T5: all 3 books used',              r.sharpBooksUsed.length === 3);
    ok('T5: sharpBookCount = 0',            r.sharpBookCount === 0);
    ok('T5: secondaryBookCount = 0',        r.secondaryBookCount === 0);
  }

  // ── Test 6: Fewer than 3 books → NO_DATA gate ────────────────────────────
  {
    const books = [
      { key: 'williamhill_us', oddsA: -108, oddsB: -112 }, // primary — but only 2 total
      { key: 'draftkings',     oddsA: -110, oddsB: -110 },
    ];
    const r = buildSharpConsensus(books, 'A', 'spreads', 'basketball_nba');
    ok('T6: NO_DATA when < 3 books',        r.consensusTier === 'NO_DATA');
    ok('T6: consensusProb = null',          r.consensusProb === null);
    ok('T6: confidence = 0.00',             r.consensusConfidence === 0.00);
    ok('T6: bookCount = 2',                 r.bookCount === 2);
    ok('T6: gate fires before vig removal', r.sharpBooksUsed.length === 0);
  }

  // ── Test 7: Outlier book — median vs mean ────────────────────────────────
  // With 3 books where one is an outlier, median must be closer to the cluster
  // than the mean would be. Confirms median() is not accidentally mean().
  {
    const savedPrimary = SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY;
    SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY = ['bookA', 'bookB', 'bookC'];
    const books = [
      { key: 'bookA', oddsA: -108, oddsB: -112 }, // ~52.3% side A (vig-removed)
      { key: 'bookB', oddsA: -110, oddsB: -110 }, // ~50.0% side A
      { key: 'bookC', oddsA: -145, oddsB: +115 }, // outlier/stale — ~59% side A raw, will skew mean
    ];
    const r = buildSharpConsensus(books, 'A', 'spreads', 'basketball_nba');
    SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY = savedPrimary;

    // Median of [~0.523, ~0.500, ~0.558] = 0.523 (middle value)
    // Mean would be ~(0.523 + 0.500 + 0.558)/3 ≈ 0.527 — not dramatically different
    // but median is closer to 0.52 cluster, not pulled toward 0.59
    ok('T7: SHARP_CONSENSUS with 3 books',  r.consensusTier === 'SHARP_CONSENSUS');
    ok('T7: consensusProb closer to 0.52 than 0.59', Math.abs(r.consensusProb - 0.52) < Math.abs(r.consensusProb - 0.59));
    ok('T7: consensusProb is valid',         r.consensusProb > 0 && r.consensusProb < 1);
  }

  // ── Test 8: Side B evaluation ─────────────────────────────────────────────
  // betSide = 'B' must return the B-side vig-removed probability.
  // Use clearly asymmetric odds so B is the favorite across all 3 books —
  // median of the B-side probs will be unambiguously > 0.50.
  {
    const savedPrimary = SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY;
    SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY = ['bookA', 'bookB', 'bookC'];
    const books = [
      { key: 'bookA', oddsA: +115, oddsB: -135 }, // B is clear favorite (~57%)
      { key: 'bookB', oddsA: +110, oddsB: -130 }, // B is clear favorite (~56%)
      { key: 'bookC', oddsA: +112, oddsB: -132 }, // B is clear favorite (~57%)
    ];
    const rA = buildSharpConsensus(books, 'A', 'spreads', 'basketball_nba');
    const rB = buildSharpConsensus(books, 'B', 'spreads', 'basketball_nba');
    SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY = savedPrimary;

    ok('T8: betSide field = A on A result',        rA.betSide === 'A');
    ok('T8: betSide field = B on B result',        rB.betSide === 'B');
    ok('T8: A-side prob < 0.50 (underdog side)',   rA.consensusProb < 0.50);
    ok('T8: B-side prob > 0.50 (favorite side)',   rB.consensusProb > 0.50);
    ok('T8: A + B probs near 1.0 (same market)',   Math.abs(rA.consensusProb + rB.consensusProb - 1.0) < 0.01);
  }

  // ── Test 9: Invalid odds — book skipped gracefully ────────────────────────
  {
    const savedPrimary = SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY;
    SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY = ['bookA', 'bookB', 'bookC'];
    const books = [
      { key: 'bookA', oddsA: -108, oddsB: -112 },   // valid
      { key: 'bookB', oddsA: null,  oddsB: null  },  // invalid — should be skipped
      { key: 'bookC', oddsA: -110, oddsB: -110 },   // valid
      { key: 'extraBook', oddsA: -109, oddsB: -111 }, // retail, not in primary
    ];
    const r = buildSharpConsensus(books, 'A', 'spreads', 'basketball_nba');
    SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY = savedPrimary;

    ok('T9: function does not throw on null odds',   r !== null);
    ok('T9: only valid books in sharpBooksUsed',     r.sharpBooksUsed.length === 2);
    ok('T9: bookB not in sharpBooksUsed',            !r.sharpBooksUsed.includes('bookB'));
    ok('T9: still SHARP_CONSENSUS (2 valid remain)', r.consensusTier === 'SHARP_CONSENSUS');
    ok('T9: consensusProb is valid',                 r.consensusProb > 0 && r.consensusProb < 1);
    ok('T9: singleSideFlag = true (skipped book)',   r.singleSideFlag === true);
  }

  // ── Test 10: consensusProb sanity — always valid probability ─────────────
  {
    const testCases = [
      // [oddsA, oddsB] pairs covering normal and edge cases
      [-105, -115], [-130, +110], [-200, +170], [-300, +250],
      [+140, -160], [-350, +290], [+200, -240], [-145, +125],
    ];
    let allValid = true;
    for (const [a, b] of testCases) {
      const books = [
        { key: 'bookX', oddsA: a, oddsB: b },
        { key: 'bookY', oddsA: a - 2, oddsB: b + 2 },
        { key: 'bookZ', oddsA: a + 2, oddsB: b - 2 },
      ];
      const savedPrimary = SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY;
      SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY = ['bookX', 'bookY', 'bookZ'];
      const r = buildSharpConsensus(books, 'A', 'spreads', 'basketball_nba');
      SHARPLINE_CONFIG.SHARP_BOOKS.PRIMARY = savedPrimary;
      if (r.consensusProb === null) continue;
      if (r.consensusProb <= 0 || r.consensusProb >= 1 || isNaN(r.consensusProb) || !isFinite(r.consensusProb)) {
        allValid = false;
        console.warn('T10 FAIL: invalid consensusProb for', a, b, '→', r.consensusProb);
      }
    }
    ok('T10: all consensusProb values are valid (0 < p < 1, finite, not NaN)', allValid);
  }

  // ── Live config check ─────────────────────────────────────────────────────
  // Confirm what tier a typical live game will produce with current API books
  {
    const typicalLiveGame = [
      { key: 'williamhill_us', oddsA: -110, oddsB: -110 }, // PRIMARY
      { key: 'draftkings',     oddsA: -112, oddsB: -108 }, // SECONDARY
      { key: 'fanduel',        oddsA: -110, oddsB: -110 }, // SECONDARY
      { key: 'betmgm',         oddsA: -110, oddsB: -110 }, // retail
      { key: 'betrivers',      oddsA: -108, oddsB: -112 }, // retail
    ];
    const r = buildSharpConsensus(typicalLiveGame, 'A', 'spreads', 'basketball_nba');
    ok('Live config: typical game tiers as SINGLE_SHARP', r.consensusTier === 'SINGLE_SHARP');
    ok('Live config: confidence = 0.70',                  near(r.consensusConfidence, 0.70));
    ok('Live config: williamhill_us as the sharp anchor',  r.sharpBooksUsed[0] === 'williamhill_us');
    ok('Live config: consensusProb is valid',              r.consensusProb > 0 && r.consensusProb < 1);
    ok('Live config: bookCount = 5',                       r.bookCount === 5);
  }

  // ── Report ─────────────────────────────────────────────────────────────────
  const passed = checks.filter(c => c.pass).length;
  const failed = checks.filter(c => !c.pass);

  console.log('\n=== SHARPLINE — Component 3 Verification ===');
  console.log(passed + ' / ' + checks.length + ' checks passed');

  if (failed.length > 0) {
    console.warn('\n FAILED:');
    failed.forEach(c => console.warn('  FAIL: ' + c.label));
  } else {
    console.log('\n All checks passed. Component 3 verified. Proceed to Component 4.');
  }
})();


// =============================================================================
// SHARPLINE ENGINE — COMPONENT 4: EDGE CALCULATION MODULE
// =============================================================================
// Takes the sharp consensus output from Component 3 and the best available
// price from the user's books, and produces a single dampened edge figure.
// This is the core signal that drives every score and verdict downstream.
//
// Three early-return gates prevent false positives before any math runs.
// Dampening is applied BEFORE the threshold check — never after.
//
// Dependencies: SHARPLINE_CONFIG (C1), vigRemoveSide (C2), buildSharpConsensus (C3)
// Version 1.0 | Phase 1
// =============================================================================

// ── calculateEdge(params) ────────────────────────────────────────────────────
//
// @param availableBook     { key, oddsA, oddsB, totalNumber? }
//                          Best available book price for the evaluated side.
//                          oddsA = the side being bet (away spread, over, away ML)
//                          oddsB = the other side
//                          totalNumber = the total line number (totals only)
// @param betSide           'A' | 'B'
// @param marketType        'spreads' | 'totals' | 'h2h' | 'puck_line' | 'run_line'
// @param sport             Odds API sport_key e.g. 'basketball_nba'
// @param spreadNumber      The spread number at the available book (spreads only)
//                          e.g. -3.5 (away team covering). Used for key number check.
// @param consensusResult   Full output from buildSharpConsensus() (Component 3)
// @param consensusTotalNum Median total number across consensus books (totals only)
// @param consensusSpreadNum Consensus spread number used for key number half-point check

function calculateEdge(
  availableBook,
  betSide,
  marketType,
  sport,
  spreadNumber,
  consensusResult,
  consensusTotalNum,
  consensusSpreadNum
) {
  const { consensusProb, consensusTier } = consensusResult;
  const flags = [];

  // Helper: build a NO_PLAY return with consistent shape
  const noPlay = (reason, extra = {}) => ({
    verdict:           'NO_PLAY',
    reason,
    rawEdge:           null,
    dampenedEdge:      null,
    dampeningFactor:   null,
    passesThreshold:   false,
    minThreshold:      null,
    availableVigRemoved: null,
    numberDiscrepancy: false,
    keyNumberFlag:     false,
    keyNumberBonus:    0,
    flags,
    ...extra,
  });

  // ── GATE 1: No consensus data ─────────────────────────────────────────────
  // Fewer than 3 books in the market — consensus engine returned NO_DATA.
  // Cannot calculate edge against nothing.
  if (consensusTier === 'NO_DATA') {
    return noPlay('No consensus data available');
  }

  // ── GATE 2: NCAAB totals deferred ────────────────────────────────────────
  // NCAAB totals are excluded from Phase 1 evaluation entirely.
  // Silent skip — no NUMBER_DISCREPANCY flag, no display.
  if (sport === 'basketball_ncaab' && marketType === 'totals') {
    flags.push('NCAAB_TOTALS_DEFERRED');
    return noPlay('NCAAB totals deferred to Phase 2', { flags });
  }

  // ── GATE 3: Totals number discrepancy ─────────────────────────────────────
  // If the available book's total differs from the consensus total by >= 0.5,
  // any edge figure is an artifact of the number difference, not genuine juice edge.
  // Must execute BEFORE vig removal — no valid probability comparison exists.
  if (marketType === 'totals') {
    if (
      availableBook.totalNumber == null ||
      consensusTotalNum == null ||
      Math.abs(availableBook.totalNumber - consensusTotalNum) >= 0.5
    ) {
      flags.push('NUMBER_DISCREPANCY');
      return noPlay('Total number mismatch', { numberDiscrepancy: true, flags });
    }
  }

  // ── STEP 1: Vig removal on available book ─────────────────────────────────
  // Always vig-remove. Never compare raw odds or un-removed probabilities —
  // doing so includes the book's margin on both sides and produces false edges.
  let vigResult;
  try {
    vigResult = vigRemoveSide(availableBook.oddsA, availableBook.oddsB, betSide);
  } catch (err) {
    return noPlay('Invalid odds on available book: ' + err.message);
  }
  const availableVigRemoved = vigResult.vigRemovedProb;

  // ── GATE 4: Heavy run-line / puck-line exclusion ──────────────────────────
  // In MLB and NHL, the "spreads" market is the run line / puck line (-1.5/+1.5).
  // When one side has vigRemovedProb > 0.72, the heavy-favorite side is being
  // evaluated. The sharp consensus at that extreme probability is unreliable
  // (fewer sharp books offer it, fallback to market median produces noise).
  // These are structural mismatches, not bad numbers. Exclude them entirely.
  if (['spreads', 'run_line', 'puck_line'].includes(marketType)) {
    const isRunPuckSport = sport.includes('baseball') || sport.includes('hockey');
    if (isRunPuckSport && (availableVigRemoved > 0.72 || availableVigRemoved < 0.28)) {
      return noPlay('Heavy run/puck line — extreme implied prob, not a spread edge.', {
        availableVigRemoved,
        dampeningFactor: SHARPLINE_CONFIG.SPREAD_DAMPENERS[sport] || 0.60,
        minThreshold: SHARPLINE_CONFIG.MIN_EDGE_THRESHOLDS[sport]?.spreads?.sharp || 0.03,
      });
    }
  }

  // ── STEP 2: Raw edge ──────────────────────────────────────────────────────
  // available vig-removed probability minus the sharp consensus probability.
  // Positive = available book is offering more value than the sharp price.
  // Negative = available book is worse than sharp (no edge).
  const rawEdge = availableVigRemoved - consensusProb;

  // ── GATE 5: Implausible edge — market inconsistency ───────────────────────
  // If raw edge exceeds 20% (0.20), the available book and consensus are
  // almost certainly pricing different markets (stale line, alt-line, data
  // feed error, or the consensus downgraded after a stale sharp line was
  // detected). Real sharp vs retail disagreements are 2–8%. 20%+ is noise.
  // This gate fires AFTER dampening would reduce it, so we use raw edge.
  if (Math.abs(rawEdge) > 0.20) {
    return noPlay('Market inconsistency — available book and consensus diverge by ' +
      (rawEdge * 100).toFixed(1) + '%. Likely stale line or data mismatch.', {
      rawEdge,
      availableVigRemoved,
      dampeningFactor: 1.0,
      minThreshold: null,
    });
  }

  // ── STEP 3: Dampening ─────────────────────────────────────────────────────
  // Applied BEFORE the threshold check — never after.
  // Spread/puck/run line: sport-specific factor from SPREAD_DAMPENERS.
  // Moneylines (h2h): probability-band factor from ML_VARIANCE_DAMPENERS.
  // Totals: no dampening (factor = 1.00) — juice-only edge on same number.
  let dampeningFactor;

  if (marketType === 'h2h') {
    // ML variance dampener — band based on the AVAILABLE book's implied prob
    const band = SHARPLINE_CONFIG.ML_VARIANCE_DAMPENERS.find(
      b => availableVigRemoved >= b.minProb
    );
    dampeningFactor = band ? band.factor : 0.50; // fallback to lowest band
  } else if (['spreads', 'puck_line', 'run_line'].includes(marketType)) {
    // Spread dampener — sport-specific
    dampeningFactor = SHARPLINE_CONFIG.SPREAD_DAMPENERS[sport] || 1.00;
  } else {
    // Totals (same-number, post-Gate 3) — no dampening
    dampeningFactor = 1.00;
  }

  const dampenedEdge = rawEdge * dampeningFactor;

  // ── STEP 4: Minimum threshold check ──────────────────────────────────────
  // Sharp-tiered thresholds are lower than market-median thresholds.
  // A 2.63% edge that passes the sharp threshold correctly fails market_median.
  // For MLs: use ML_EDGE_THRESHOLDS (probability-band lookup).
  // For spreads/totals: use MIN_EDGE_THRESHOLDS (sport + market lookup).
  const isSharpTier = ['SHARP_CONSENSUS', 'SINGLE_SHARP'].includes(consensusTier);
  let minThreshold;

  if (marketType === 'h2h') {
    const mlBand = SHARPLINE_CONFIG.ML_EDGE_THRESHOLDS.find(
      b => availableVigRemoved >= b.minProb
    );
    minThreshold = mlBand
      ? (isSharpTier ? mlBand.sharp : mlBand.market_median)
      : 0.045; // fallback: highest ML threshold
  } else {
    const sportThresholds = SHARPLINE_CONFIG.MIN_EDGE_THRESHOLDS[sport];
    if (!sportThresholds) {
      return noPlay('Sport not configured: ' + sport);
    }
    const marketThresholds = sportThresholds[marketType];
    if (!marketThresholds) {
      return noPlay('Market not configured for sport: ' + marketType + '/' + sport);
    }
    minThreshold = isSharpTier
      ? marketThresholds.sharp
      : marketThresholds.market_median;
  }

  // Below threshold → NO PLAY. Return the edge figures for debugging
  // (so the UI can optionally show "close but not there" context).
  if (dampenedEdge < minThreshold) {
    return {
      verdict:           'NO_PLAY',
      reason:            'Edge below minimum threshold',
      rawEdge,
      dampenedEdge,
      dampeningFactor,
      passesThreshold:   false,
      minThreshold,
      availableVigRemoved,
      numberDiscrepancy: false,
      keyNumberFlag:     false,
      keyNumberBonus:    0,
      flags,
    };
  }

  // ── STEP 5: Key number flag ───────────────────────────────────────────────
  // Fires only when ALL THREE conditions are met:
  //   1. Market is spreads
  //   2. The spread number sits on a key number for this sport
  //   3. The available number is a half-point MORE favorable than the consensus number
  // Does not add to rawEdge — adds directly to score in Component 6.
  let keyNumberFlag  = false;
  let keyNumberBonus = 0;

  if (marketType === 'spreads' && spreadNumber != null && consensusSpreadNum != null) {
    const keyConfig = SHARPLINE_CONFIG.KEY_NUMBERS[sport];
    if (keyConfig !== null && keyConfig) {
      // Key number check: the CONSENSUS spread number must sit on a key number.
      // The value is in the fact that the available book is giving you a better number
      // than the consensus on a structurally important spread value.
      // e.g. consensus -3 (a key number), available -2.5 → you get the key number cushion.
      const absConsensusSpread = Math.abs(consensusSpreadNum);
      if (keyConfig.numbers.includes(absConsensusSpread)) {
        // Half-point advantage: available number must be MORE favorable than consensus.
        // For a negative spread (covering): available -2.5 vs consensus -3 → better (closer to 0)
        // For a positive spread (taking pts): available +3.5 vs consensus +3 → better (further from 0)
        // In both cases: spreadNumber > consensusSpreadNum (numerically greater)
        const halfPointBetter = spreadNumber > consensusSpreadNum;
        if (halfPointBetter) {
          keyNumberFlag  = true;
          keyNumberBonus = keyConfig.bonus;
          flags.push('KEY_NUMBER_VALUE');
        }
      }
    }
  }

  // ── STEP 6: Return EDGE_FOUND ─────────────────────────────────────────────
  return {
    verdict:           'EDGE_FOUND',
    reason:            null,
    rawEdge,
    dampenedEdge,
    dampeningFactor,
    passesThreshold:   true,
    minThreshold,
    availableVigRemoved,
    numberDiscrepancy: false,
    keyNumberFlag,
    keyNumberBonus,
    flags,
  };
}

// =============================================================================
// COMPONENT 4 VERIFICATION — 10 test cases from the spec

(function verifyComponent4() {
  const EPSILON = 0.0001;
  const near = (a, b, eps = EPSILON) => Math.abs(a - b) < eps;
  const checks = [];
  const ok = (label, pass) => checks.push({ label, pass: !!pass });

  // Helper: build a minimal consensus result object for tests
  const makeConsensus = (prob, tier = 'SHARP_CONSENSUS') => ({
    consensusProb:       prob,
    consensusTier:       tier,
    consensusConfidence: tier === 'SHARP_CONSENSUS' ? 1.00 : tier === 'SINGLE_SHARP' ? 0.70 : tier === 'MARKET_MEDIAN' ? 0.60 : 0.40,
    sharpBooksUsed:      ['williamhill_us'],
    sharpBookProbs:      [prob],
    bookCount:           5,
    sharpBookCount:      1,
  });

  // ── Test 1: Standard spread — EDGE_FOUND happy path ───────────────────────
  // NBA spread, sharp consensus, edge above threshold
  {
    // vigRemoveSide(-105, -115, 'A'):
    // -105 → decimal 1.9524 → raw 0.5122; -115 → decimal 1.8696 → raw 0.5349
    // overround = 1.0471; vigRemovedA = 0.5122/1.0471 ≈ 0.4892 — wait, let me use known values
    // Use -108/-112: vigRemovedA ≈ 0.5087
    // -130/+110: vigRemovedA ≈ 0.543, rawEdge ≈ 4.27%, dampened ≈ 3.42% > NBA 3% threshold
    const available = { key: 'draftkings', oddsA: -130, oddsB: +110 };
    const consensus = makeConsensus(0.500, 'SHARP_CONSENSUS'); // sharp says 50%
    const r = calculateEdge(available, 'A', 'spreads', 'basketball_nba', -3.5, consensus, null, -3.5);

    ok('T1: verdict = EDGE_FOUND',       r.verdict === 'EDGE_FOUND');
    ok('T1: passesThreshold = true',     r.passesThreshold === true);
    ok('T1: dampeningFactor = 0.80',     near(r.dampeningFactor, 0.80));
    ok('T1: rawEdge > 0',                r.rawEdge > 0);
    ok('T1: dampenedEdge = rawEdge*0.80', near(r.dampenedEdge, r.rawEdge * 0.80));
    ok('T1: minThreshold = 0.030',       near(r.minThreshold, 0.030));
    ok('T1: availableVigRemoved valid',   r.availableVigRemoved > 0 && r.availableVigRemoved < 1);
    ok('T1: keyNumberFlag = false',      r.keyNumberFlag === false);
    ok('T1: flags array exists',         Array.isArray(r.flags));
  }

  // ── Test 2: Gate 1 — NO_DATA consensus ────────────────────────────────────
  {
    const available = { key: 'draftkings', oddsA: -110, oddsB: -110 };
    const consensus = makeConsensus(null, 'NO_DATA');
    consensus.consensusProb = null;
    const r = calculateEdge(available, 'A', 'spreads', 'basketball_nba', -3, consensus, null, -3);

    ok('T2: Gate 1 fires for NO_DATA',   r.verdict === 'NO_PLAY');
    ok('T2: rawEdge = null',             r.rawEdge === null);
    ok('T2: dampenedEdge = null',        r.dampenedEdge === null);
    ok('T2: passesThreshold = false',    r.passesThreshold === false);
  }

  // ── Test 3: Gate 2 — NCAAB totals deferred ────────────────────────────────
  {
    const available = { key: 'draftkings', oddsA: -110, oddsB: -110, totalNumber: 150.5 };
    const consensus = makeConsensus(0.500, 'SINGLE_SHARP');
    const r = calculateEdge(available, 'A', 'totals', 'basketball_ncaab', null, consensus, 150.5, null);

    ok('T3: Gate 2 fires for NCAAB totals', r.verdict === 'NO_PLAY');
    ok('T3: NCAAB_TOTALS_DEFERRED flag',    r.flags.includes('NCAAB_TOTALS_DEFERRED'));
    ok('T3: rawEdge = null',                r.rawEdge === null);
  }

  // ── Test 4: Gate 3 — Totals number discrepancy ────────────────────────────
  {
    const available = { key: 'betmgm', oddsA: -110, oddsB: -110, totalNumber: 227.0 };
    const consensus = makeConsensus(0.500, 'SINGLE_SHARP');
    const r = calculateEdge(available, 'A', 'totals', 'basketball_nba', null, consensus, 227.5, null);

    ok('T4: Gate 3 fires for 0.5 discrepancy', r.verdict === 'NO_PLAY');
    ok('T4: numberDiscrepancy = true',         r.numberDiscrepancy === true);
    ok('T4: NUMBER_DISCREPANCY flag',          r.flags.includes('NUMBER_DISCREPANCY'));
    ok('T4: rawEdge = null',                   r.rawEdge === null);
    ok('T4: dampenedEdge = null',              r.dampenedEdge === null);
  }

  // ── Test 5: NHL puck line — 0.60x dampening ───────────────────────────────
  // Raw edge ~5% × 0.60 = ~3% dampened → just above the 3.0% NHL threshold
  {
    // vigRemoveSide(-105, -115, 'A') → availableVigRemoved ≈ 0.523
    // consensusProb = 0.500 → rawEdge ≈ 0.023 (2.3%)
    // With -105/-115: need bigger edge — use -100/+100 vs consensus 0.500
    // vigRemoveSide(+100, -105, 'A') → ≈ 0.512 available vs 0.470 consensus
    // Let's use clear numbers: available gives ~56% after vig, consensus 50%
    // Use -120/-100 available vs consensus 0.500: vigRemovedA of -120/+100 = ?
    // -120 → 1.8333 → 0.5455; +100 → 2.0 → 0.5000; overround = 1.0455
    // vigRemovedA = 0.5455/1.0455 ≈ 0.5218
    // rawEdge = 0.5218 - 0.500 = 0.0218 (2.18%) → × 0.60 = 1.31% → below 3%
    // Need bigger raw edge. Use -130/+110 vs consensus 0.500:
    // -130 → 1.7692 → 0.5652; +110 → 2.10 → 0.4762; overround = 1.0414
    // vigRemovedA = 0.5652/1.0414 ≈ 0.5427
    // rawEdge = 0.5427 - 0.500 = 0.0427 (4.27%) → × 0.60 = 2.56% → below 3%
    // For EDGE_FOUND on NHL: need dampenedEdge >= 0.030
    // Need rawEdge >= 0.050 to get dampened ≥ 0.030
    // Use -150/+120 vs consensus 0.460:
    // -150 → 1.6667 → 0.6000; +120 → 2.20 → 0.4545; overround = 1.0545
    // vigRemovedA = 0.6000/1.0545 ≈ 0.5690
    // rawEdge = 0.5690 - 0.460 = 0.1090 → × 0.60 = 0.0654 → above 3% ✓
    const available = { key: 'draftkings', oddsA: -150, oddsB: +120 };
    const consensus = makeConsensus(0.460, 'SINGLE_SHARP');
    const r = calculateEdge(available, 'A', 'spreads', 'icehockey_nhl', -1.5, consensus, null, -1.5);

    ok('T5: NHL uses 0.60 dampening',    near(r.dampeningFactor, 0.60));
    ok('T5: dampenedEdge = raw * 0.60',  near(r.dampenedEdge, r.rawEdge * 0.60));
    ok('T5: minThreshold = 0.030',       near(r.minThreshold, 0.030));
    ok('T5: EDGE_FOUND (above threshold)', r.verdict === 'EDGE_FOUND');
  }

  // ── Test 6: MLB run line — 0.60x dampening, NO PLAY (below threshold) ─────
  {
    // Small raw edge on MLB spread that dampens below threshold
    // -108/-112 vs consensus 0.500 → rawEdge ≈ 0.009 × 0.60 = 0.0054 < 0.030
    const available = { key: 'fanduel', oddsA: -108, oddsB: -112 };
    const consensus = makeConsensus(0.500, 'SINGLE_SHARP');
    const r = calculateEdge(available, 'A', 'spreads', 'baseball_mlb', -1.5, consensus, null, -1.5);

    ok('T6: MLB uses 0.60 dampening',      near(r.dampeningFactor, 0.60));
    ok('T6: verdict = NO_PLAY',            r.verdict === 'NO_PLAY');
    ok('T6: dampenedEdge returned',        r.dampenedEdge !== null);
    ok('T6: dampenedEdge < threshold',     r.dampenedEdge < r.minThreshold);
  }

  // ── Test 7: ML variance dampener — slight_underdog band ───────────────────
  // +165 available vs consensus 0.370 — per spec test case
  {
    // vigRemoveSide(+165, -185, 'A'):
    // +165 → 2.65 → 0.3774; -185 → 1.5405 → 0.6493; overround = 1.0267
    // vigRemovedA = 0.3774/1.0267 ≈ 0.3675
    // But consensus = 0.370, so rawEdge = 0.3675 - 0.370 = -0.0025 (negative!)
    // That means no edge for that test case. Use a case where there IS edge:
    // +165/-185 vs consensus 0.330: rawEdge ≈ 0.3675 - 0.330 = 0.0375
    // Available prob 0.3675 → slight_underdog band (0.35–0.45) → factor 0.65
    // dampenedEdge = 0.0375 * 0.65 = 0.0244 < 0.035 (ML slight_underdog sharp threshold)
    // Still NO PLAY per spec — confirms correct
    const available = { key: 'draftkings', oddsA: +165, oddsB: -185 };
    const consensus = makeConsensus(0.330, 'SHARP_CONSENSUS');
    const r = calculateEdge(available, 'A', 'h2h', 'basketball_nba', null, consensus, null, null);

    // availableVigRemoved ≈ 0.367 → slight_underdog band (0.35–0.45) → 0.65x
    ok('T7: ML variant dampener applied',      r.dampeningFactor != null);
    ok('T7: ML dampening in 0.50–0.85 range',  r.dampeningFactor >= 0.50 && r.dampeningFactor <= 0.85);
    ok('T7: availableVigRemoved in underdog range', r.availableVigRemoved > 0.35 && r.availableVigRemoved < 0.45);
    ok('T7: ML threshold is higher than spread', r.minThreshold >= 0.030);
  }

  // ── Test 8: Totals same number — juice edge passes ────────────────────────
  // Per spec Test 6: same total numbers, -108/-112 over vs consensus 0.500
  {
    const available = { key: 'draftkings', oddsA: -108, oddsB: -112, totalNumber: 227.5 };
    const consensus = makeConsensus(0.500, 'SHARP_CONSENSUS');
    const r = calculateEdge(available, 'A', 'totals', 'basketball_nba', null, consensus, 227.5, null);

    ok('T8: totals gate does not fire',     r.numberDiscrepancy === false);
    ok('T8: dampening = 1.00 on totals',    near(r.dampeningFactor, 1.00));
    ok('T8: rawEdge = dampenedEdge',        near(r.rawEdge, r.dampenedEdge));
    // -108 vs 0.500 consensus: vigRemovedA ≈ 0.509, edge ≈ 0.009, below 3% threshold
    ok('T8: NO_PLAY (below NBA 3% threshold)', r.verdict === 'NO_PLAY');
    ok('T8: dampenedEdge is returned',      r.dampenedEdge !== null);
  }

  // ── Test 9: MARKET_MEDIAN tier uses higher threshold ──────────────────────
  // NFL spread, MARKET_MEDIAN consensus (no sharp books).
  // 2.63% edge passes sharp threshold (2.5%) but fails market_median (4.0%)
  {
    // vigRemoveSide(-105, -115, 'A'):
    // -105 → 1.9524 → 0.5122; -115 → 1.8696 → 0.5348; overround = 1.0470
    // vigRemovedA = 0.5122/1.0470 ≈ 0.4893 — that's below 0.500, negative edge
    // Use -105/+110 vs consensus 0.500:
    // -105 → 0.5122; +110 → 0.4762; overround = 0.9884 — invalid (< 1)
    // Need proper two-sided market. Use -105 available vs -115 other side:
    // vigRemovedA of -105/-115 ≈ 0.489 < 0.500 → still negative
    // Use the inverse: if consensus is 0.500 and we want ~2.63% edge:
    // We need availableVigRemoved ≈ 0.526. What odds give 0.526?
    // Try -112/-108: -112 → 0.5283; -108 → 0.5090; overround = 1.0373
    // vigRemovedA = 0.5283/1.0373 ≈ 0.5093 → rawEdge = 0.0093 — too small
    // Use -120/-100: vigRemovedA ≈ 0.5218 → rawEdge = 0.0218 → × 1.00 (NFL) = 0.0218
    // Hmm, 2.18% not 2.63%. Use -125/-95:
    // -125 → 1.80 → 0.5556; -95 not standard... use -125/+105
    // +105 → 2.05 → 0.4878; overround = 1.0434; vigRemovedA = 0.5556/1.0434 ≈ 0.5326
    // rawEdge = 0.5326 - 0.500 = 0.0326 (3.26%) × 1.00 (NFL) = 0.0326
    // 3.26% > 2.5% (sharp) but < 4.0% (market_median) → NO_PLAY on MARKET_MEDIAN ✓
    const available = { key: 'betmgm', oddsA: -125, oddsB: +105 };
    const consensus = makeConsensus(0.500, 'MARKET_MEDIAN');
    const r = calculateEdge(available, 'A', 'spreads', 'americanfootball_nfl', -3, consensus, null, -3);

    ok('T9: MARKET_MEDIAN uses 4.0% threshold',  near(r.minThreshold, 0.040));
    ok('T9: verdict = NO_PLAY below 4.0%',       r.verdict === 'NO_PLAY');
    ok('T9: edge would pass 2.5% sharp bar',     r.dampenedEdge > 0.025);
    ok('T9: edge does not pass 4.0% market bar', r.dampenedEdge < 0.040);
  }

  // ── Test 10: Key number flag fires on NFL spread ───────────────────────────
  // Available: -2.5, consensus: -3. NFL key number (3). Half-point better.
  // Need enough edge to pass threshold AND trigger key number bonus.
  {
    // For key number: spreadNumber=-2.5, consensusSpreadNum=-3
    // -2.5 > -3 → bettor gets the spread at 2.5 instead of 3 → more favorable → flag fires
    // Need EDGE_FOUND first: use -108/-112 vs consensus 0.470
    // vigRemovedA of -108/-112 ≈ 0.5087; rawEdge = 0.5087 - 0.470 = 0.0387
    // NFL dampening = 1.00; dampenedEdge = 0.0387 > 0.025 threshold → EDGE_FOUND
    const available = { key: 'draftkings', oddsA: -108, oddsB: -112 };
    const consensus = makeConsensus(0.470, 'SINGLE_SHARP');
    const r = calculateEdge(available, 'A', 'spreads', 'americanfootball_nfl', -2.5, consensus, null, -3.0);

    ok('T10: verdict = EDGE_FOUND',         r.verdict === 'EDGE_FOUND');
    ok('T10: keyNumberFlag = true',         r.keyNumberFlag === true);
    ok('T10: keyNumberBonus = 10 (NFL)',    r.keyNumberBonus === 10);
    ok('T10: KEY_NUMBER_VALUE in flags',    r.flags.includes('KEY_NUMBER_VALUE'));
    ok('T10: NFL dampening = 1.00',         near(r.dampeningFactor, 1.00));
  }

  // ── Output shape validation ────────────────────────────────────────────────
  // All required fields must be present in both EDGE_FOUND and NO_PLAY results
  {
    const required = ['verdict','reason','rawEdge','dampenedEdge','dampeningFactor',
                      'passesThreshold','minThreshold','availableVigRemoved',
                      'numberDiscrepancy','keyNumberFlag','keyNumberBonus','flags'];

    const edgeCase = { key: 'dk', oddsA: -108, oddsB: -112 };
    const cons = makeConsensus(0.460, 'SINGLE_SHARP');
    const found = calculateEdge(edgeCase, 'A', 'spreads', 'americanfootball_nfl', -3, cons, null, -3);
    const noFound = calculateEdge({ key: 'dk', oddsA: -110, oddsB: -110 }, 'A', 'spreads', 'basketball_nba', -3, makeConsensus(null, 'NO_DATA'), null, -3);

    required.forEach(f => ok(`Shape: EDGE_FOUND has '${f}'`, f in found));
    required.forEach(f => ok(`Shape: NO_PLAY has '${f}'`, f in noFound));
  }

  // ── Report ─────────────────────────────────────────────────────────────────
  const passed = checks.filter(c => c.pass).length;
  const failed = checks.filter(c => !c.pass);

  console.log('\n=== SHARPLINE — Component 4 Verification ===');
  console.log(passed + ' / ' + checks.length + ' checks passed');

  if (failed.length > 0) {
    console.warn('\n FAILED:');
    failed.forEach(c => console.warn('  FAIL: ' + c.label));
  } else {
    console.log('\n All checks passed. Component 4 verified. Proceed to Component 5.');
  }
})();


// =============================================================================
// SHARPLINE ENGINE — COMPONENT 5: LINE MOVEMENT TRACKER
// =============================================================================
// Determines how the sharp consensus probability has moved since the opening
// line for a given game, market, and side. Produces a movement label and
// scoring multiplier used exclusively by the scoring engine as a confidence
// modifier — NEVER as additional edge basis points.
//
// Architecture note: This component has two layers:
//   1. Pure synchronous logic (assignMovementLabel, buildMovementNotes,
//      applyMovement) — fully testable without a database
//   2. Async Supabase wrapper (trackLineMovement) — reads/writes line_snapshots
//      table. Degrades gracefully to STABLE when the table is unavailable.
//      The line_snapshots table is created in Component 9.
//
// Dependencies: SHARPLINE_CONFIG (C1), Supabase client (sb), line_snapshots table
// Version 1.0 | Phase 1
// =============================================================================

// =============================================================================
// LAYER 1 — PURE SYNCHRONOUS FUNCTIONS (testable without database)
// =============================================================================

// ── assignMovementLabel(movementMagnitude, directionalDelta) ─────────────────
// Maps movement magnitude and direction to a label.
// Priority order: STABLE → STEAM → CONFIRMING → FADING → STABLE (fallback)
// REVERSE is reserved for Phase 2 — never returned in Phase 1.
//
// directionalDelta is positive when consensus moves TOWARD the bet (side A up),
// and negative when it moves AWAY from the bet.

function assignMovementLabel(movementMagnitude, directionalDelta) {
  const C = SHARPLINE_CONFIG;

  // Below minimum threshold → STABLE (no meaningful movement)
  if (movementMagnitude < C.MOVEMENT_THRESHOLD) {
    return 'STABLE';
  }

  // Large confirming move → STEAM (possible sharp action)
  if (directionalDelta >= C.STEAM_THRESHOLD) {
    return 'STEAM';
  }

  // Moderate confirming move → CONFIRMING
  if (directionalDelta >= C.MOVEMENT_THRESHOLD) {
    return 'CONFIRMING';
  }

  // Any move away from bet direction → FADING
  if (directionalDelta <= -C.MOVEMENT_THRESHOLD) {
    return 'FADING';
  }

  // Fallback — should not reach here given exhaustive conditions above
  return 'STABLE';
}

// ── buildMovementNotes(label, magnitude, directionalDelta) ───────────────────
// Builds a human-readable description of movement for the recommendation card.

function buildMovementNotes(label, magnitude, directionalDelta) {
  const pct = (magnitude * 100).toFixed(1);
  switch (label) {
    case 'STEAM':
      return `STEAM: sharp consensus moved ${pct}% toward this side since opening — possible sharp action.`;
    case 'CONFIRMING':
      return `CONFIRMING: consensus moved ${pct}% in this bet's direction since opening.`;
    case 'FADING':
      return `FADING: consensus moved ${pct}% AGAINST this side since opening — market correcting.`;
    case 'STABLE':
    default:
      return magnitude < SHARPLINE_CONFIG.MOVEMENT_THRESHOLD
        ? 'STABLE: consensus within 1% of opening — no significant movement.'
        : 'STABLE: movement present but direction unclear.';
  }
}

// ── applyMovement(openingConsensusProb, currentConsensusProb, betSide, ...) ───
// Pure calculation layer: given opening and current consensus, compute
// the movement result object. No database access. Used for unit testing.

function applyMovement(openingConsensusProb, currentConsensusProb, betSide, snapshotTier) {
  const movementDelta     = currentConsensusProb - openingConsensusProb;
  const movementMagnitude = Math.abs(movementDelta);

  // directionalDelta: positive = consensus moved TOWARD the bet
  // For side A: a positive movementDelta (consensus prob for A went up) is confirming
  // For side B: the same positive movementDelta means consensus moved AWAY from B
  const directionalDelta = betSide === 'A' ? movementDelta : -movementDelta;

  const movementLabel      = assignMovementLabel(movementMagnitude, directionalDelta);
  const movementMultiplier = SHARPLINE_CONFIG.MOVEMENT_MULTIPLIERS[movementLabel];
  const notes              = buildMovementNotes(movementLabel, movementMagnitude, directionalDelta);

  return {
    movementLabel,
    movementMultiplier,
    openingConsensus:   openingConsensusProb,
    currentConsensus:   currentConsensusProb,
    movementDelta,
    movementMagnitude,
    directionalDelta,
    isFirstPull:        false,
    snapshotConfidence: snapshotTier || 'UNKNOWN',
    notes,
  };
}

// =============================================================================
// LAYER 2 — ASYNC SUPABASE WRAPPER
// =============================================================================

// ── trackLineMovement(gameId, marketType, betSide, ...) ──────────────────────
//
// Primary function called by Component 8 (buildRecommendationCard) for each
// game/market/side being evaluated.
//
// Degradation strategy (Phase 1):
//   - If Supabase is unavailable, table doesn't exist, or any error occurs:
//     return STABLE with isFirstPull=true and a note explaining the fallback.
//   - Never throw. A database failure must not crash the engine pipeline.
//   - Component 9 must be deployed before snapshots persist across scans.

async function trackLineMovement(
  gameId,
  marketType,
  betSide,
  currentConsensusProb,
  consensusTier,
  sport,
  commenceTime
) {
  // Stable fallback — returned on any failure path
  const stableFallback = (reason) => ({
    movementLabel:      'STABLE',
    movementMultiplier: SHARPLINE_CONFIG.MOVEMENT_MULTIPLIERS.STABLE, // 1.00
    openingConsensus:   currentConsensusProb,
    currentConsensus:   currentConsensusProb,
    movementDelta:      0,
    movementMagnitude:  0,
    directionalDelta:   0,
    isFirstPull:        true,
    snapshotConfidence: consensusTier,
    notes:              reason || 'Opening snapshot established. Movement tracked from next scan.',
  });

  // Guard: if Supabase client isn't available, degrade immediately
  if (typeof sb === 'undefined' || !sb) {
    return stableFallback('No database connection — movement not tracked.');
  }

  try {
    // ── STEP 1: Look up existing snapshot ────────────────────────────────────
    const { data: existingRows, error: selectError } = await sb
      .from('line_snapshots')
      .select('*')
      .eq('game_id', gameId)
      .eq('market_type', marketType)
      .eq('side', betSide)
      .limit(1);

    if (selectError) {
      // Table may not exist yet (Component 9 not deployed) — degrade gracefully
      console.warn('[trackLineMovement] Snapshot lookup failed:', selectError.message);
      return stableFallback('Snapshot table unavailable — movement not tracked this scan.');
    }

    const snapshot = existingRows && existingRows.length > 0 ? existingRows[0] : null;

    // ── STEP 2: First pull — no prior snapshot ────────────────────────────────
    if (!snapshot) {
      // Write the opening snapshot to Supabase
      const { error: insertError } = await sb
        .from('line_snapshots')
        .insert({
          game_id:               gameId,
          sport,
          market_type:           marketType,
          side:                  betSide,
          opening_consensus_prob: currentConsensusProb,
          sharp_books_used:      [],
          consensus_tier:        consensusTier,
          game_commence_time:    commenceTime || null,
        });

      if (insertError) {
        console.warn('[trackLineMovement] Snapshot insert failed:', insertError.message);
        // Even if the write fails, return stable — don't crash the pipeline
      }

      return stableFallback('Opening snapshot established. Movement tracked from next scan.');
    }

    // ── STEP 3: Check snapshot expiry ─────────────────────────────────────────
    // If the game has already started, don't track movement — odds are live/volatile
    if (snapshot.game_commence_time && new Date() > new Date(snapshot.game_commence_time)) {
      return {
        movementLabel:      'STABLE',
        movementMultiplier: SHARPLINE_CONFIG.MOVEMENT_MULTIPLIERS.STABLE,
        openingConsensus:   snapshot.opening_consensus_prob,
        currentConsensus:   currentConsensusProb,
        movementDelta:      0,
        movementMagnitude:  0,
        directionalDelta:   0,
        isFirstPull:        false,
        snapshotConfidence: snapshot.consensus_tier,
        notes:              'Game in progress — movement not tracked.',
      };
    }

    // ── STEP 4–7: Compute and return movement ─────────────────────────────────
    return applyMovement(
      parseFloat(snapshot.opening_consensus_prob),
      currentConsensusProb,
      betSide,
      snapshot.consensus_tier
    );

  } catch (err) {
    console.warn('[trackLineMovement] Unexpected error:', err.message || err);
    return stableFallback('Movement tracking error — defaulting to STABLE.');
  }
}

// =============================================================================
// SHARPLINE ENGINE — COMPONENT 6: SCORING ENGINE
// =============================================================================
// Aggregation layer. Takes verified outputs from Components 3, 4, and 5
// and combines them into a single 0–100 score. That score drives the verdict
// and unit recommendation in Component 7.
//
// This component introduces no new data. Every value it uses has already been
// calculated and validated upstream. Its job is weighting, combining, clamping.
//
// Dependencies: SHARPLINE_CONFIG (C1), edgeResult (C4), consensusResult (C3),
//               movementResult (C5)
// Version 1.0 | Phase 1
// =============================================================================

// ── scoreEngine(edgeResult, consensusResult, movementResult, marketType, sport)
//
// @param edgeResult      Full output from calculateEdge() (Component 4).
//                        Must have verdict === 'EDGE_FOUND' to proceed.
// @param consensusResult Full output from buildSharpConsensus() (Component 3).
//                        Provides consensusConfidence and sharpBookProbs[].
// @param movementResult  Full output from trackLineMovement() (Component 5).
//                        Provides movementMultiplier.
// @param marketType      'spreads' | 'totals' | 'h2h' | 'puck_line' | 'run_line'
// @param sport           Odds API sport_key. Passed through for flag metadata.
//
// @returns score result object (see output contract below)

function scoreEngine(edgeResult, consensusResult, movementResult, marketType, sport) {

  // ── PRE-CONDITION: must have EDGE_FOUND from Component 4 ────────────────
  // If Component 4 returned NO_PLAY for any reason (gate fired, below threshold),
  // pass that through immediately. No scoring runs on a NO_PLAY edge result.
  if (!edgeResult || edgeResult.verdict !== 'EDGE_FOUND') {
    return {
      score:             0,
      verdict:           'NO_PLAY',
      reason:            edgeResult ? edgeResult.reason : 'No edge result provided',
      edgePoints:        0,
      confidencePoints:  0,
      movementPoints:    0,
      keyNumberBonus:    0,
      divergencePenalty: 0,
      mlVariancePenalty: 0,
      scoreTrace:        {},
      flags:             edgeResult ? [...(edgeResult.flags || [])] : [],
    };
  }

  // Inherit flags from Component 4 — KEY_NUMBER_VALUE may already be present
  const flags      = [...(edgeResult.flags || [])];
  const scoreTrace = {};

  // ── STEP 1: Edge magnitude (max 40 points) ────────────────────────────────
  // Linear scale from minThreshold (= 0 pts) to minThreshold + EDGE_CEILING (= 40 pts).
  // Formula: ((dampenedEdge - minThreshold) / EDGE_CEILING) * 40, capped at 40.
  // An edge exactly at threshold scores 0. An edge 7% above threshold scores 40.
  const edgePoints = Math.min(
    SHARPLINE_CONFIG.SCORING.EDGE_MAX_POINTS,
    ((edgeResult.dampenedEdge - edgeResult.minThreshold) / SHARPLINE_CONFIG.SCORING.EDGE_CEILING) * 40
  );
  scoreTrace.afterEdge = edgePoints;

  // ── STEP 2: Sharp book confidence (max 20 points) ────────────────────────
  // consensusConfidence × 20. The confidence weight from Component 3 reflects
  // how much we trust the sharp consensus that the edge is based on.
  // SHARP_CONSENSUS:    1.00 × 20 = 20 pts
  // SINGLE_SHARP:       0.70 × 20 = 14 pts
  // MARKET_MEDIAN:      0.60 × 20 = 12 pts
  // FULL_MARKET_MEDIAN: 0.40 × 20 =  8 pts
  const confidencePoints = consensusResult.consensusConfidence * SHARPLINE_CONFIG.SCORING.CONFIDENCE_MAX_POINTS;
  scoreTrace.afterConfidence = edgePoints + confidencePoints;

  // ── STEP 3: Line movement modifier (±15 points) ───────────────────────────
  // Applied to the BASE score (edge + confidence) as a multiplier.
  // The delta is clamped to ±15 before adding to the running score.
  // Key reason this must come BEFORE steps 4/5/6: the multiplier should scale
  // the core signal only — not bonuses or penalties unrelated to market direction.
  const baseScore      = edgePoints + confidencePoints;
  const adjustedScore  = baseScore * movementResult.movementMultiplier;
  const movementDelta  = adjustedScore - baseScore;
  const movementPoints = Math.min(
    SHARPLINE_CONFIG.SCORING.MOVEMENT_MAX_POINTS,
    Math.max(-SHARPLINE_CONFIG.SCORING.MOVEMENT_MAX_POINTS, movementDelta)
  );
  let score = baseScore + movementPoints;
  scoreTrace.afterMovement = score;

  // ── STEP 4: Key number bonus (+5 or +10 points) ───────────────────────────
  // Sourced from edgeResult.keyNumberBonus — set by Component 4. The scoring
  // engine does NOT look up key numbers itself.
  // Added AFTER movement: prevents STEAM multiplier inflating the structural bonus.
  const keyNumberBonus = edgeResult.keyNumberBonus || 0;
  if (edgeResult.keyNumberFlag) {
    score += keyNumberBonus;
    // KEY_NUMBER_VALUE flag was already added by Component 4 if it fired.
    // Only add again if it somehow isn't present (defensive).
    if (!flags.includes('KEY_NUMBER_VALUE')) {
      flags.push('KEY_NUMBER_VALUE');
    }
  }
  scoreTrace.afterKeyNumber = score;

  // ── STEP 5: Sharp divergence penalty (−10 points) ────────────────────────
  // Fires when 3+ primary sharp books are present AND they disagree by > 3%
  // on the vig-removed probability. Requires sharpBookProbs[] from Component 3.
  // Does NOT fire with fewer than 3 sharp books (we can't measure divergence
  // with a single book or two books of different tiers).
  let divergencePenalty = 0;
  if (consensusResult.sharpBookProbs && consensusResult.sharpBookProbs.length >= 3) {
    const maxProb = Math.max(...consensusResult.sharpBookProbs);
    const minProb = Math.min(...consensusResult.sharpBookProbs);
    const spread  = maxProb - minProb;
    if (spread > SHARPLINE_CONFIG.SHARP_DIVERGENCE_THRESHOLD) {
      divergencePenalty = SHARPLINE_CONFIG.SCORING.SHARP_DIVERGENCE_PENALTY; // −10
      score += divergencePenalty;
      flags.push('SHARP_DIVERGENCE');
    }
  }
  scoreTrace.afterDivergence = score;

  // ── STEP 6: ML variance penalty (−5 points) ──────────────────────────────
  // Fires when market is moneyline (h2h) AND the available side's implied
  // probability is below 0.35 (significant underdog, < 35% win chance).
  // These bets have high variance — the penalty reduces confidence in the edge.
  // Does NOT fire on spreads, totals, puck_line, or run_line.
  let mlVariancePenalty = 0;
  if (marketType === 'h2h' && edgeResult.availableVigRemoved < 0.35) {
    mlVariancePenalty = SHARPLINE_CONFIG.SCORING.ML_VARIANCE_PENALTY; // −5
    score += mlVariancePenalty;
    flags.push('HIGH_VARIANCE_ML');
  }
  scoreTrace.afterMLPenalty = score;

  // ── STEP 7: Clamp to 0–100 ───────────────────────────────────────────────
  // Always executes last. Clamping earlier would distort scores — a penalty
  // applied after a premature clamp could push a score negative.
  score = Math.max(
    SHARPLINE_CONFIG.SCORING.SCORE_MIN,
    Math.min(SHARPLINE_CONFIG.SCORING.SCORE_MAX, score)
  );
  // Store the final integer score in the trace
  scoreTrace.final = Math.round(score);

  return {
    score:             Math.round(score),
    edgePoints,
    confidencePoints,
    movementPoints,
    keyNumberBonus,
    divergencePenalty,
    mlVariancePenalty,
    scoreTrace,
    flags,
  };
}

// =============================================================================
// SHARPLINE ENGINE — COMPONENT 7: VERDICT & UNIT SIZING
// =============================================================================
// Final decision layer. Takes the 0–100 score from Component 6, applies a
// deterministic lookup to produce a verdict label and unit recommendation,
// then applies the ML band unit cap if applicable. Also builds the human-
// readable notes string that the recommendation card displays.
//
// This component does not compute or derive. It looks up. All complexity
// belongs in the upstream components that produced the score.
//
// Dependencies: SHARPLINE_CONFIG (C1), scoreResult (C6), edgeResult (C4),
//               consensusResult (C3), movementResult (C5)
// Version 1.0 | Phase 1
// =============================================================================

// ── buildCapReason(mlCap, originalUnits, finalUnits) ────────────────────────
// Builds a human-readable explanation when the ML band cap reduces units.
// Only called when unitsCapped = true (cap actually changed the unit count).

function buildCapReason(mlCap, originalUnits, finalUnits) {
  return (
    'ML ' + mlCap.label.replace(/_/g, ' ') + ' band: ' +
    originalUnits + 'u reduced to ' + finalUnits + 'u ' +
    '(max ' + mlCap.maxUnits + 'u for ' + Math.round(mlCap.minProb * 100) + '%+ implied probability).'
  );
}

// ── buildNotes(verdict, score, edgeResult, consensusResult, ...) ─────────────
// Assembles a plain-English summary of the engine's reasoning. Display only —
// never used for scoring logic. Shown in the expandable card section.

function buildNotes(verdict, score, edgeResult, consensusResult, movementResult, flags) {
  const parts = [];

  // Consensus tier and books used
  const tierLabel  = consensusResult.consensusTier
    ? consensusResult.consensusTier.replace(/_/g, ' ')
    : 'UNKNOWN';
  const booksLabel = consensusResult.sharpBooksUsed && consensusResult.sharpBooksUsed.length > 0
    ? consensusResult.sharpBooksUsed.join(', ')
    : 'market books';
  parts.push('Consensus: ' + tierLabel + ' (' + booksLabel + ')');

  // Edge
  if (edgeResult && edgeResult.dampenedEdge != null) {
    const edgePct      = (edgeResult.dampenedEdge * 100).toFixed(1);
    const thresholdPct = edgeResult.minThreshold != null
      ? (edgeResult.minThreshold * 100).toFixed(1)
      : '—';
    parts.push('Edge: ' + edgePct + '% dampened (threshold: ' + thresholdPct + '%)');
  }

  // Movement
  if (movementResult && movementResult.movementLabel) {
    const movNote = movementResult.isFirstPull
      ? movementResult.movementLabel + ' (baseline established this scan)'
      : movementResult.movementLabel;
    parts.push('Movement: ' + movNote);
  }

  // Flags
  if (flags.includes('KEY_NUMBER_VALUE'))   parts.push('Key number value identified.');
  if (flags.includes('SHARP_DIVERGENCE'))   parts.push('Sharp book divergence detected.');
  if (flags.includes('HIGH_VARIANCE_ML'))   parts.push('High-variance moneyline — variance penalty applied.');
  if (flags.includes('NUMBER_DISCREPANCY')) parts.push('Total number discrepancy — monitor only.');
  if (flags.includes('ML_UNIT_CAP'))        parts.push('ML unit cap applied.');

  // Score and verdict
  parts.push('Score: ' + score + '/100 → ' + verdict.replace(/_/g, ' '));

  return parts.join(' · ');
}

// ── assignVerdictAndUnits(scoreResult, edgeResult, consensusResult, movementResult)
//
// Primary function called by Component 8 (buildRecommendationCard).
//
// @param scoreResult    Full output from scoreEngine() (Component 6).
// @param edgeResult     Full output from calculateEdge() (Component 4).
// @param consensusResult Full output from buildSharpConsensus() (Component 3).
// @param movementResult Full output from trackLineMovement() (Component 5).
//
// @returns verdict result object (the final engine output for this market)

function assignVerdictAndUnits(scoreResult, edgeResult, consensusResult, movementResult) {

  // ── PRE-CONDITION: pass through NO_PLAY from Component 6 ─────────────────
  // If the scoring engine returned NO_PLAY (because Component 4 returned
  // NO_PLAY), propagate it immediately. No verdict lookup needed.
  if (!scoreResult || scoreResult.verdict === 'NO_PLAY') {
    return {
      verdict:       'NO_PLAY',
      verdictLabel:  'NO PLAY',
      units:         0,
      score:         0,
      unitsCapped:   false,
      unitCapReason: null,
      flags:         (scoreResult && scoreResult.flags) ? [...scoreResult.flags] : [],
      notes:         (scoreResult && scoreResult.reason) || 'No actionable edge found.',
      consensusTier: consensusResult ? consensusResult.consensusTier : 'NO_DATA',
      movementLabel: movementResult  ? movementResult.movementLabel  : 'STABLE',
    };
  }

  const score = scoreResult.score;
  const flags = [...(scoreResult.flags || [])];

  // ── STEP 1: Verdict lookup ────────────────────────────────────────────────
  // VERDICT_THRESHOLDS is ordered highest minScore first. find() returns the
  // first entry where score >= minScore — so the highest applicable threshold wins.
  const verdictEntry = SHARPLINE_CONFIG.VERDICT_THRESHOLDS.find(v => score >= v.minScore);

  // Fallback: should never be needed given the array covers 0+, but be safe
  const verdict      = verdictEntry ? verdictEntry.verdict : 'NO_PLAY';
  const verdictLabel = verdictEntry ? verdictEntry.label   : 'NO PLAY';

  // ── STEP 2: Default unit assignment ──────────────────────────────────────
  let units = SHARPLINE_CONFIG.DEFAULT_UNITS[verdict] || 0;

  // ── STEP 3: Phase 1 hard unit cap ────────────────────────────────────────
  // 3u is the absolute ceiling in Phase 1 regardless of score or verdict.
  // 4u and 5u unlock in Phase 2 after CLV validates the engine.
  units = Math.min(units, SHARPLINE_CONFIG.PHASE1_UNIT_CAP);

  // ── STEP 4: ML band unit cap ─────────────────────────────────────────────
  // For moneyline (h2h) bets, apply a per-band unit ceiling based on the
  // available side's implied probability. This is bankroll discipline, not
  // a penalty on edge quality. Plus-money bets have high variance regardless
  // of how well they score.
  let unitsCapped   = false;
  let unitCapReason = null;

  if (edgeResult && edgeResult.availableVigRemoved != null &&
      (edgeResult.marketType === 'h2h' ||
       (edgeResult.flags && edgeResult.flags.includes('ML_MARKET')))) {
    const mlCap = SHARPLINE_CONFIG.ML_UNIT_CAPS.find(
      b => edgeResult.availableVigRemoved >= b.minProb
    );
    if (mlCap) {
      // Always push the flag for internal tracking, even if cap doesn't change units
      if (!flags.includes('ML_UNIT_CAP')) {
        flags.push('ML_UNIT_CAP');
      }
      if (mlCap.maxUnits < units) {
        // Cap actually reduces unit count — surface to user
        const originalUnits = units;
        units         = mlCap.maxUnits;
        unitsCapped   = true;
        unitCapReason = buildCapReason(mlCap, originalUnits, units);
      }
    }
  }

  // ── STEP 5: Build notes ───────────────────────────────────────────────────
  const notes = buildNotes(
    verdict, score, edgeResult, consensusResult, movementResult, flags
  );

  // ── STEP 6: Return ────────────────────────────────────────────────────────
  return {
    verdict,
    verdictLabel,
    units,
    score,
    unitsCapped,
    unitCapReason,
    flags,
    notes,
    consensusTier: consensusResult ? consensusResult.consensusTier : 'UNKNOWN',
    movementLabel: movementResult  ? movementResult.movementLabel  : 'STABLE',
  };
}

  // ── Test 9: Score exactly at all threshold boundaries ─────────────────────
  {

      { score: 65, verdict: 'BET',        units: 2 },

    boundaries.forEach(({ score, verdict, units }) => {

  // ── Test 10: Score one below threshold boundaries ─────────────────────────
  {

    belowBoundaries.forEach(({ score, verdict, units }) => {
