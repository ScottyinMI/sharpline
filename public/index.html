// ─── MATH ───
const a2i = (a) => a < 0 ? Math.abs(a)/(Math.abs(a)+100) : 100/(a+100);

function calcEdge(yours, sharp) {
  const yi = a2i(yours), si = a2i(sharp);
  return Math.min(Math.max(0, (si - yi) * 100), 10);
}

function calcCLV(entryOdds, closingOdds) {
  if (!entryOdds || !closingOdds) return null;
  const ei = a2i(entryOdds), ci = a2i(closingOdds);
  return (ci - ei) * 100;
}

const suggestUnits = (e) => e>=8?5:e>=6?4:e>=4?3:e>=3?2:1;

function median(arr) {
  if (arr.length === 0) return 0;
  const sorted = [...arr].sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid-1] + sorted[mid]) / 2;
}

function getDayLabel(date) {
  const d = new Date(date), now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const gameDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = Math.round((gameDay - today) / (1000*60*60*24));
  if (diff === 0) return "Today";
  if (diff === 1) return "Tomorrow";
  if (diff < 0) return "Earlier";
  return d.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" });
}

function getDayKey(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

// ─── RECOMMENDATION ENGINE ───
function generateRecommendation(game, myBooks, lineHistory) {
  const recs = [];
  game.bookLines.filter(bl => myBooks.includes(bl.book)).forEach(bl => {
    const edge = game.edges.find(e => e.book === bl.book) || { spreadEdge:0, totalEdge:0 };

    // TOTAL
    if (bl.total && bl.totalOdds) {
      let score = 0, reasons = [], signals = [];
      if (edge.totalEdge >= 5) { score += 40; reasons.push(`${edge.totalEdge.toFixed(1)}% edge vs sharp consensus`); }
      else if (edge.totalEdge >= 3) { score += 20; reasons.push(`${edge.totalEdge.toFixed(1)}% edge vs consensus`); }
      if (bl.totalOdds > 0) { score += 25; signals.push(`plus money (${bl.totalOdds > 0?"+":""}${bl.totalOdds})`); }
      else if (bl.totalOdds >= -108) { score += 15; signals.push(`reduced juice (${bl.totalOdds})`); }
      else if (bl.totalOdds <= -130) { score -= 10; signals.push(`heavy juice (${bl.totalOdds})`); }
      const otherTotals = game.bookLines.filter(x => x.book !== bl.book && x.total).map(x => x.total);
      if (otherTotals.length > 0) {
        const mkt = median(otherTotals);
        if (bl.total - mkt <= -0.4) { score += 20; signals.push(`best total in market (${bl.total} vs mkt ${mkt})`); }
        else if (bl.total - mkt >= 0.4) score -= 10;
      }
      const hist = lineHistory[game.id];
      if (hist?.[bl.book]?.total && bl.total !== hist[bl.book].total) {
        const moved = bl.total - hist[bl.book].total;
        signals.push(`line moved ${moved > 0 ? "↑" : "↓"} ${hist[bl.book].total}→${bl.total}`);
        score += 10;
      }
      if (score >= 50) {
        const side = bl.totalOdds >= (bl.underOdds || -110) ? "Over" : "Under";
        const conf = score >= 70 ? "HIGH" : "MEDIUM";
        recs.push({ type:"Total", book:bl.book, line:bl.total, odds:bl.totalOdds, side, conf, score,
          call:`Take ${side} ${bl.total} at ${bl.book} (${bl.totalOdds > 0?"+":""}${bl.totalOdds})`,
          reasons:[...reasons, ...signals], units:suggestUnits(edge.totalEdge), edge:edge.totalEdge });
      }
    }

    // SPREAD
    if (bl.spread != null && bl.spreadOdds) {
      let score = 0, reasons = [], signals = [];
      if (edge.spreadEdge >= 5) { score += 40; reasons.push(`${edge.spreadEdge.toFixed(1)}% edge vs sharp consensus`); }
      else if (edge.spreadEdge >= 3) { score += 20; reasons.push(`${edge.spreadEdge.toFixed(1)}% edge vs consensus`); }
      if (bl.spreadOdds > 0) { score += 25; signals.push(`plus money (${bl.spreadOdds > 0?"+":""}${bl.spreadOdds})`); }
      else if (bl.spreadOdds >= -108) { score += 15; signals.push(`reduced juice (${bl.spreadOdds})`); }
      else if (bl.spreadOdds <= -130) { score -= 10; signals.push(`heavy juice (${bl.spreadOdds})`); }
      const otherSpreads = game.bookLines.filter(x => x.book !== bl.book && x.spread != null).map(x => x.spread);
      if (otherSpreads.length > 0) {
        const mkt = median(otherSpreads);
        if (bl.spread - mkt <= -0.4) { score += 20; signals.push(`better number (${bl.spread>0?"+":""}${bl.spread} vs mkt ${mkt>0?"+":""}${mkt})`); }
        else if (bl.spread - mkt >= 0.4) score -= 10;
      }
      const hist = lineHistory[game.id];
      if (hist?.[bl.book]?.spread != null && bl.spread !== hist[bl.book].spread) {
        signals.push(`spread moved ${hist[bl.book].spread>0?"+":""}${hist[bl.book].spread}→${bl.spread>0?"+":""}${bl.spread}`);
        score += 10;
      }
      if (score >= 50) {
        const conf = score >= 70 ? "HIGH" : "MEDIUM";
        recs.push({ type:"Spread", book:bl.book, line:bl.spread, odds:bl.spreadOdds,
          side: bl.spread < 0 ? game.home : game.away, conf, score,
          call:`Take ${bl.spread < 0 ? game.home : game.away} ${bl.spread>0?"+":""}${bl.spread} at ${bl.book} (${bl.spreadOdds>0?"+":""}${bl.spreadOdds})`,
          reasons:[...reasons, ...signals], units:suggestUnits(edge.spreadEdge), edge:edge.spreadEdge });
      }
    }
  });
  return recs.sort((a,b) => b.score - a.score);
}

// ─── API FETCH ───
async function fetchOdds(sportApiKey) {
  if (API_DISCONNECTED) { await new Promise(r=>setTimeout(r,600)); return { games:null, remaining:null, error:null, mock:true }; }
  const url = `${API_BASE}/odds?sport=${sportApiKey}&markets=spreads,totals`;
  try {
    const res = await fetch(url);
    if (!res.ok) { const rem=res.headers.get("x-requests-remaining"); return { games:[], remaining:rem?parseInt(rem):null, error:res.status===401?"Invalid API key":res.status===429?"Rate limited":`Error ${res.status}` }; }
    const data = await res.json();
    return { games:data, remaining:parseInt(res.headers.get("x-requests-remaining")||"0"), error:null };
  } catch(err) { return { games:[], remaining:null, error:"Network error" }; }
}

function parseApiGames(apiGames) {
  return apiGames.map(g => {
    const time = new Date(g.commence_time);
    const bookMap = {};
    (g.bookmakers||[]).forEach(bm => {
      const name = BOOK_MAP[bm.key]||bm.title;
      if (!bookMap[name]) bookMap[name] = { book:name, spread:null, spreadOdds:null, total:null, totalOdds:null, underOdds:null };
      (bm.markets||[]).forEach(m => {
        if (m.key==="spreads") { const h=m.outcomes.find(o=>o.name===g.home_team); const a=m.outcomes.find(o=>o.name===g.away_team); if(h){bookMap[name].spread=h.point;bookMap[name].spreadOdds=h.price;bookMap[name].awaySpread=a?a.point:-h.point;} }
        if (m.key==="totals") { const ov=m.outcomes.find(o=>o.name==="Over"); const un=m.outcomes.find(o=>o.name==="Under"); if(ov){bookMap[name].total=ov.point;bookMap[name].totalOdds=ov.price;} if(un)bookMap[name].underOdds=un.price; }
      });
    });
    const bookLines = Object.values(bookMap).filter(bl=>bl.spreadOdds!==null||bl.totalOdds!==null);
    const sharpLines = bookLines.filter(bl=>SHARP_BOOKS.includes(bl.book));
    const useSharp = sharpLines.length >= 2;
    const cl = useSharp ? sharpLines : bookLines;
    const sharpSpreadOdds = Math.round(median(cl.filter(bl=>bl.spreadOdds).map(bl=>bl.spreadOdds)))||-110;
    const sharpTotalOdds = Math.round(median(cl.filter(bl=>bl.totalOdds).map(bl=>bl.totalOdds)))||-110;
    const edges = bookLines.map(bl=>({ book:bl.book, spreadEdge:bl.spreadOdds?Math.max(0,calcEdge(bl.spreadOdds,sharpSpreadOdds)):0, totalEdge:bl.totalOdds?Math.max(0,calcEdge(bl.totalOdds,sharpTotalOdds)):0 }));
    return { id:g.id, away:g.away_team, home:g.home_team, time, dayKey:getDayKey(time), dayLabel:getDayLabel(time), bookLines, edges, maxSpreadEdge:Math.max(...edges.map(e=>e.spreadEdge),0), maxTotalEdge:Math.max(...edges.map(e=>e.totalEdge),0), sharpSpreadOdds, sharpTotalOdds, consensusSource:useSharp?"sharp":"market", live:time<=new Date() };
  });
}

function getBookEdges(game,bf) {
  if(bf==="ALL") return {spreadEdge:game.maxSpreadEdge,totalEdge:game.maxTotalEdge};
  return game.edges.find(x=>x.book===bf)||{spreadEdge:0,totalEdge:0};
}

function ExposureWarning({bets,bankroll,unitSize,T}){
  if(bankroll<=0) return null;
  const pending=bets.filter(b=>!b.result);
  if(pending.length===0) return null;
  const totalAction=pending.reduce((s,b)=>s+b.units*unitSize,0);
  const pct=totalAction/bankroll*100;
  const bySport={};
  pending.forEach(b=>{bySport[b.sport]=(bySport[b.sport]||0)+b.units*unitSize;});
  const worst=Object.entries(bySport).sort((a,b)=>b[1]-a[1])[0];
  const worstPct=worst?worst[1]/bankroll*100:0;
  const todayPct=pending.filter(b=>new Date(b.timestamp).toDateString()===new Date().toDateString()).reduce((s,b)=>s+b.units*unitSize,0)/bankroll*100;
  const warnings=[];
  if(pct>=25) warnings.push(`${pct.toFixed(0)}% of bankroll in action (${pending.length} pending · $${totalAction.toLocaleString()})`);
  if(worstPct>=15) warnings.push(`${worstPct.toFixed(0)}% exposed to ${worst[0]}`);
  if(todayPct>=15) warnings.push(`${todayPct.toFixed(0)}% of bankroll bet today`);
  if(warnings.length===0) return null;
  return <div style={{marginBottom:10,padding:"8px 12px",background:T.redBg,border:`1px solid ${T.red}22`,borderRadius:4}}><div style={{color:T.red,fontSize:10,fontWeight:700,fontFamily:F.mono,marginBottom:2}}>⚠ EXPOSURE WARNING</div>{warnings.map((w,i)=><div key={i} style={{color:T.red,fontSize:10,lineHeight:1.6}}>{w}</div>)}</div>;
}

function BetTracker({bets,setBets,bankroll,unitSize,T,dbSyncing}){
  const [showBreakdown,setShowBreakdown]=useState(false);
  const [clvTarget,setCLVTarget]=useState(null);
  const stats=useMemo(()=>{
    const s=bets.filter(b=>b.result),w=s.filter(b=>b.result==="W"),l=s.filter(b=>b.result==="L"),p=s.filter(b=>b.result==="P");
    const uw=w.reduce((s,b)=>s+b.units*(100/Math.abs(b.odds)),0),ul=l.reduce((s,b)=>s+b.units,0),net=uw-ul;
    const roi=s.length>0?(net/s.reduce((s,b)=>s+b.units,0))*100:0;
    const ae=bets.length>0?bets.reduce((s,b)=>s+b.edge,0)/bets.length:0;
    const wr=s.length>0?(w.length/Math.max(s.length-p.length,1))*100:0;
    return {wins:w.length,losses:l.length,pushes:p.length,netUnits:net,roi,avgEdge:ae,winRate:wr,pending:bets.length-s.length};
  },[bets]);
  const sportBreakdowns=useMemo(()=>{
    const map={};
    bets.forEach(b=>{if(!map[b.sport])map[b.sport]={bets:0,settled:0,wins:0,losses:0,pushes:0,unitsWon:0,unitsLost:0,totalUnits:0,edgeSum:0};const m=map[b.sport];m.bets++;m.edgeSum+=b.edge;if(b.result){m.settled++;if(b.result==="W"){m.wins++;m.unitsWon+=b.units*(100/Math.abs(b.odds));}if(b.result==="L"){m.losses++;m.unitsLost+=b.units;}if(b.result==="P")m.pushes++;m.totalUnits+=b.units;}});
    return Object.entries(map).map(([sport,d])=>({sport,...d,net:d.unitsWon-d.unitsLost,roi:d.settled>0?((d.unitsWon-d.unitsLost)/Math.max(d.totalUnits,1))*100:0,winRate:d.settled>0?(d.wins/Math.max(d.settled-d.pushes,1))*100:0,avgEdge:d.bets>0?d.edgeSum/d.bets:0})).sort((a,b)=>b.net-a.net);
  },[bets]);
  const nd=bankroll>0?stats.netUnits*unitSize:0;

  const handleResult = async (i, r) => {
    const updated = [...bets];
    updated[i] = { ...updated[i], result: r };
    setBets(updated);
    if (updated[i].id) await dbUpdate(updated[i].id, { result: r });
  };

  const handleDelete = async (i) => {
    const bet = bets[i];
    setBets(bets.filter((_,j)=>j!==i));
    if (bet.id) await dbDelete(bet.id);
  };

  const handleCLVSave = async (idx, closingOdds) => {
    const updated = [...bets];
    const bet = updated[idx];
    const clv = calcCLV(bet.entryOdds || bet.odds, closingOdds);
    updated[idx] = { ...bet, closingOdds, clv };
    setBets(updated);
    if (bet.id) await dbUpdate(bet.id, { closingOdds, clv });
  };

  return (
    <div>
      {clvTarget!==null&&<CLVEntry bet={bets[clvTarget]} onSave={(co)=>handleCLVSave(clvTarget,co)} onClose={()=>setCLVTarget(null)} T={T}/>}
      <ExposureWarning bets={bets} bankroll={bankroll} unitSize={unitSize} T={T}/>
      {dbSyncing&&<div style={{marginBottom:8,padding:"4px 10px",background:T.goldBg,borderRadius:3,border:`1px solid ${T.gold}30`}}><span style={{color:T.gold,fontSize:9,fontFamily:F.mono}}>⟳ Syncing with cloud...</span></div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:14}}>
        {[{l:"NET UNITS",v:(stats.netUnits>=0?"+":"")+stats.netUnits.toFixed(2),s:bankroll>0?`${nd>=0?"+":""}$${nd.toFixed(0)}`:null,c:stats.netUnits>=0?T.green:T.red},{l:"ROI",v:`${stats.roi>=0?"+":""}${stats.roi.toFixed(1)}%`,c:stats.roi>=0?T.green:T.red},{l:"WIN RATE",v:`${stats.winRate.toFixed(1)}%`,s:`${stats.wins}W-${stats.losses}L-${stats.pushes}P`,c:T.text},{l:"AVG EDGE",v:`${stats.avgEdge.toFixed(1)}%`,s:`${stats.pending} pending`,c:T.gold}].map(s=><div key={s.l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:"10px 12px"}}><div style={{color:T.muted,fontSize:8,fontFamily:F.mono,letterSpacing:1,marginBottom:4}}>{s.l}</div><div style={{color:s.c,fontSize:18,fontWeight:700,fontFamily:F.mono}}>{s.v}</div>{s.s&&<div style={{color:T.muted,fontSize:9,fontFamily:F.mono,marginTop:2}}>{s.s}</div>}</div>)}
      </div>
      {bets.length>0&&<><button onClick={()=>setShowBreakdown(!showBreakdown)} style={{width:"100%",padding:"8px",background:T.card,border:`1px solid ${T.border}`,borderRadius:4,color:showBreakdown?T.text:T.dim,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:F.mono,marginBottom:10,textAlign:"center"}}>{showBreakdown?"▾ HIDE":"▸ SHOW"} SPORT BREAKDOWN</button>
        {showBreakdown&&<div style={{marginBottom:14}}><div style={{display:"grid",gridTemplateColumns:"auto repeat(5,1fr)",gap:"4px 12px",fontSize:10,fontFamily:F.mono,padding:"6px 10px",background:T.card,borderRadius:4,border:`1px solid ${T.border}`}}>
          <div style={{color:T.muted,fontWeight:600}}>SPORT</div><div style={{color:T.muted,fontWeight:600,textAlign:"right"}}>RECORD</div><div style={{color:T.muted,fontWeight:600,textAlign:"right"}}>NET U</div><div style={{color:T.muted,fontWeight:600,textAlign:"right"}}>ROI</div><div style={{color:T.muted,fontWeight:600,textAlign:"right"}}>WIN%</div><div style={{color:T.muted,fontWeight:600,textAlign:"right"}}>AVG EDGE</div>
          {sportBreakdowns.map(s=><React.Fragment key={s.sport}><div style={{color:T.text,fontWeight:600}}>{s.sport}</div><div style={{textAlign:"right",color:T.dim}}>{s.wins}-{s.losses}-{s.pushes}</div><div style={{textAlign:"right",color:s.net>=0?T.green:T.red}}>{s.net>=0?"+":""}{s.net.toFixed(2)}</div><div style={{textAlign:"right",color:s.roi>=0?T.green:T.red}}>{s.roi>=0?"+":""}{s.roi.toFixed(1)}%</div><div style={{textAlign:"right",color:T.dim}}>{s.winRate.toFixed(1)}%</div><div style={{textAlign:"right",color:T.gold}}>{s.avgEdge.toFixed(1)}%</div></React.Fragment>)}
        </div></div>}</>}
      {bets.length===0?<div style={{textAlign:"center",padding:"40px 20px",color:T.muted}}><div style={{fontSize:24,marginBottom:8,opacity:0.4}}>📋</div><div style={{fontSize:13}}>No bets tracked yet</div></div>:
        bets.map((bet,i)=>(
          <div key={bet.id||i} style={{background:T.card,border:`1px solid ${bet.result==="W"?`${T.green}22`:bet.result==="L"?`${T.red}22`:T.border}`,borderRadius:6,padding:"10px 14px",marginBottom:3}}>

function CLVTab({bets,setBets,T}){
  const [clvTarget,setCLVTarget]=useState(null);
  const clvStats=useMemo(()=>{const wc=bets.filter(b=>b.clv!==null&&b.clv!==undefined);if(wc.length===0)return{avg:0,beatPct:0,total:0,positive:0};const pos=wc.filter(b=>b.clv>0);return{avg:wc.reduce((s,b)=>s+b.clv,0)/wc.length,beatPct:pos.length/wc.length*100,total:wc.length,positive:pos.length};},[bets]);
  const pendingCLV=bets.filter(b=>b.clv===null||b.clv===undefined);

  const handleCLVSave = async (idx, closingOdds) => {
    const updated=[...bets];
    const bet=updated[idx];
    const clv=calcCLV(bet.entryOdds||bet.odds,closingOdds);
    updated[idx]={...bet,closingOdds,clv};
    setBets(updated);
    if(bet.id) await dbUpdate(bet.id,{closingOdds,clv});
  };

  return (
    <div>
      {clvTarget!==null&&<CLVEntry bet={bets[clvTarget]} onSave={(co)=>handleCLVSave(clvTarget,co)} onClose={()=>setCLVTarget(null)} T={T}/>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:14}}>
        {[{l:"AVG CLV",v:clvStats.total>0?`${clvStats.avg>=0?"+":""}${clvStats.avg.toFixed(2)}%`:"—",c:clvStats.total>0?(clvStats.avg>=0?T.green:T.red):T.muted,s:`${clvStats.total} tracked`},{l:"BEAT THE CLOSE",v:clvStats.total>0?`${clvStats.beatPct.toFixed(1)}%`:"—",c:clvStats.total>0?(clvStats.beatPct>=55?T.green:T.gold):T.muted,s:clvStats.total>0?`${clvStats.positive}/${clvStats.total} bets`:""},{l:"AWAITING CLOSE",v:`${pendingCLV.length}`,c:pendingCLV.length>0?T.gold:T.muted,s:"click to enter"}].map(s=><div key={s.l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:"10px 12px"}}><div style={{color:T.muted,fontSize:8,fontFamily:F.mono,letterSpacing:1,marginBottom:4}}>{s.l}</div><div style={{color:s.c,fontSize:20,fontWeight:700,fontFamily:F.mono}}>{s.v}</div>{s.s&&<div style={{color:T.muted,fontSize:9,fontFamily:F.mono,marginTop:2}}>{s.s}</div>}</div>)}
      </div>
      <div style={{padding:"10px 12px",background:T.goldBg,borderRadius:4,borderLeft:`2px solid ${T.gold}`,marginBottom:14}}>
        <div style={{color:T.gold,fontSize:10,fontWeight:700,fontFamily:F.mono,marginBottom:3}}>WHY CLV IS THE METRIC THAT MATTERS</div>
        <div style={{color:T.dim,fontSize:10,lineHeight:1.7}}>Win rate lies. CLV doesn't. Consistently beating the closing line means you're finding value before the market does — the definition of sharp betting. After a game closes, enter the closing odds to track your edge over time. A 55%+ beat rate signals genuine skill.</div>
      </div>
      {pendingCLV.length>0&&<div style={{marginBottom:14}}>
        <div style={{color:T.muted,fontSize:9,fontWeight:700,fontFamily:F.mono,letterSpacing:1,marginBottom:8}}>AWAITING CLOSING LINE</div>
        {pendingCLV.map(bet=>{const idx=bets.indexOf(bet);return(<div key={idx} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:4,padding:"8px 12px",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{color:T.text,fontSize:11,fontWeight:600}}>{bet.game}</div><div style={{color:T.dim,fontSize:9,fontFamily:F.mono}}>{bet.type} {bet.line} · entry: {bet.entryOdds||bet.odds} · {bet.book}</div></div><button onClick={()=>setCLVTarget(idx)} style={{padding:"4px 12px",borderRadius:3,border:`1px solid ${T.gold}40`,background:T.goldBg,color:T.gold,fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:F.mono,whiteSpace:"nowrap"}}>Enter Close →</button></div>);})}
      </div>}
      {bets.filter(b=>b.clv!==null&&b.clv!==undefined).length>0&&<div>
        <div style={{color:T.muted,fontSize:9,fontWeight:700,fontFamily:F.mono,letterSpacing:1,marginBottom:8}}>CLV HISTORY</div>
        {bets.filter(b=>b.clv!==null&&b.clv!==undefined).map((b,i)=>(<div key={i} style={{background:T.card,border:`1px solid ${b.clv>=0?`${T.green}15`:`${T.red}15`}`,borderRadius:4,padding:"8px 12px",marginBottom:3,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{color:T.text,fontSize:11,fontWeight:600}}>{b.game}</div><div style={{color:T.dim,fontSize:9,fontFamily:F.mono}}>{b.type} {b.line} · {b.book} · Entry: {b.entryOdds||b.odds} → Close: {b.closingOdds}</div></div><div style={{textAlign:"right"}}><div style={{color:b.clv>=0?T.green:T.red,fontSize:14,fontWeight:800,fontFamily:F.mono}}>{b.clv>=0?"+":""}{b.clv.toFixed(2)}%</div><div style={{color:T.muted,fontSize:8,fontFamily:F.mono}}>{b.clv>=0?"BEAT CLOSE":"MISSED"}</div></div></div>))}
      </div>}

    </div>

  const [dark,setDark]=useState(true);
  const [myBooks,setMyBooks]=useState(DEFAULT_MY_BOOKS);
  const [showBookSettings,setShowBookSettings]=useState(false);
  const [loading,setLoading]=useState({});
  const [apiCredits,setApiCredits]=useState(null);
  const [errors,setErrors]=useState({});
  const [lastFetch,setLastFetch]=useState({});
  const [dbSyncing,setDbSyncing]=useState(false);
  const [dbError,setDbError]=useState(null);

  const T=dark?themes.dark:themes.light;
  const unitSize=Math.round(bankroll*0.01);

  // Load settings from localStorage, bets from Supabase
  useEffect(()=>{
    setBankroll(ld(SK.bankroll,0));
    setDark(ld(SK.theme,true));
    setMyBooks(ld(SK.myBooks,DEFAULT_MY_BOOKS));
    setDbSyncing(true);
    dbLoad().then(data=>{
      setBets(data);
      setDbSyncing(false);
      setLoaded(true);
    }).catch(e=>{
      setDbError("Could not connect to cloud. Bets may not sync.");
      setDbSyncing(false);
      setLoaded(true);
    });
    fetchSport("NBA");
  },[]);

  useEffect(()=>{if(loaded)sv(SK.bankroll,bankroll);},[bankroll,loaded]);
  useEffect(()=>{if(loaded)sv(SK.theme,dark);},[dark,loaded]);
  useEffect(()=>{if(loaded)sv(SK.myBooks,myBooks);},[myBooks,loaded]);

  const fetchSport=useCallback(async(sportKey)=>{
    const sport=SPORTS.find(s=>s.key===sportKey);
    if(!sport) return;
    setLoading(prev=>({...prev,[sportKey]:true}));
    setErrors(prev=>({...prev,[sportKey]:null}));
    const result=await fetchOdds(sport.api);
    if(result.remaining!==null) setApiCredits(result.remaining);
    if(result.error){setErrors(prev=>({...prev,[sportKey]:result.error}));setLoading(prev=>({...prev,[sportKey]:false}));return;}
    const parsed=result.mock?getMockGames(sportKey):parseApiGames(result.games);
    setGames(prev=>({...prev,[sportKey]:parsed}));
    setLineHistory(prev=>{
      const updated={...prev};
      parsed.forEach(g=>{if(!updated[g.id]){updated[g.id]={};g.bookLines.forEach(bl=>{updated[g.id][bl.book]={spread:bl.spread,total:bl.total};});}});
      return updated;
    });
    setLastFetch(prev=>({...prev,[sportKey]:new Date()}));
    setLoading(prev=>({...prev,[sportKey]:false}));
  },[]);

  const currentGames=useMemo(()=>(games[activeSport]||[]).sort((a,b)=>a.time-b.time),[games,activeSport]);

      <AlertBanner alerts={alerts} T={T}/>
      {isMock&&<div style={{padding:"6px 18px",background:`${T.gold}12`,borderBottom:`1px solid ${T.gold}25`,display:"flex",alignItems:"center",gap:8}}><span style={{color:T.gold,fontSize:9,fontWeight:800,fontFamily:F.mono,letterSpacing:1}}>⚙ DEV MODE</span><span style={{color:T.dim,fontSize:9,fontFamily:F.mono}}>API disconnected · mock data · set API_DISCONNECTED = false to go live</span></div>}

        <div style={{maxWidth:900,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{color:T.text,fontSize:12,fontWeight:700}}>My Sportsbooks ({myBooks.length})</div><div style={{display:"flex",gap:4}}><button onClick={()=>setMyBooks([...ALL_BOOKS])} style={{padding:"3px 8px",borderRadius:3,border:`1px solid ${T.border}`,background:"transparent",color:T.dim,fontSize:9,fontFamily:F.mono,cursor:"pointer"}}>All</button><button onClick={()=>setMyBooks(DEFAULT_MY_BOOKS)} style={{padding:"3px 8px",borderRadius:3,border:`1px solid ${T.border}`,background:"transparent",color:T.dim,fontSize:9,fontFamily:F.mono,cursor:"pointer"}}>Reset</button></div></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{ALL_BOOKS.map(b=>{const active=myBooks.includes(b);return <button key={b} onClick={()=>{if(active&&myBooks.length>1)setMyBooks(myBooks.filter(x=>x!==b));else if(!active)setMyBooks([...myBooks,b]);}} style={{padding:"5px 10px",borderRadius:4,border:`1px solid ${active?`${T.green}40`:T.border}`,background:active?T.greenBg:"transparent",color:active?T.green:T.muted,fontSize:10,fontWeight:600,cursor:"pointer"}}>{active&&"✓ "}{b}</button>;})}</div>
        </div>
      </div>}

      <div style={{maxWidth:900,margin:"0 auto",padding:"14px 14px"}}>
        <div style={{display:"flex",marginBottom:12,background:T.card,borderRadius:4,padding:2,border:`1px solid ${T.border}`}}>
          {[{k:"scanner",l:"Scanner"},{k:"tracker",l:`Tracker (${bets.length})`},{k:"clv",l:`CLV${pendingCLVCount>0?` (${pendingCLVCount})`:""}`},{k:"bankroll",l:"Bankroll"}].map(t=><button key={t.k} onClick={()=>setActiveTab(t.k)} style={{flex:1,padding:"8px 12px",borderRadius:3,border:"none",background:activeTab===t.k?`${T.text}10`:"transparent",color:activeTab===t.k?T.text:T.muted,fontSize:11,fontWeight:600,cursor:"pointer"}}>{t.l}</button>)}
        </div>

        {activeTab==="scanner"&&<>
          <div style={{display:"flex",gap:3,marginBottom:8,overflowX:"auto",paddingBottom:2}}>
            {SPORTS.map(s=><button key={s.key} onClick={()=>setActiveSport(s.key)} style={{padding:"5px 12px",borderRadius:3,border:`1px solid ${activeSport===s.key?T.borderHi:T.border}`,background:activeSport===s.key?`${T.text}08`:"transparent",color:activeSport===s.key?T.text:T.muted,fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",position:"relative"}}>
              {s.icon} {s.label}
              {loading[s.key]&&<span style={{position:"absolute",top:-2,right:-2,width:6,height:6,borderRadius:"50%",background:T.gold}}/>}
              {games[s.key]&&!loading[s.key]&&<span style={{position:"absolute",top:-2,right:-2,width:6,height:6,borderRadius:"50%",background:T.green}}/>}
            </button>)}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:4}}>
            <div style={{display:"flex",gap:3,alignItems:"center"}}>
              <select value={bookFilter} onChange={e=>setBookFilter(e.target.value)} style={{padding:"3px 20px 3px 7px",borderRadius:3,border:`1px solid ${bookFilter!=="ALL"?`${T.gold}40`:T.border}`,background:bookFilter!=="ALL"?T.goldBg:"transparent",color:bookFilter!=="ALL"?T.gold:T.muted,fontSize:10,fontWeight:600,fontFamily:F.mono,appearance:"none",cursor:"pointer"}}>
                <option value="ALL">All My Books ({myBooks.length})</option>{myBooks.map(b=><option key={b} value={b}>{b}</option>)}
              </select>
              <button onClick={()=>fetchSport(activeSport)} disabled={loading[activeSport]} style={{padding:"3px 10px",borderRadius:3,border:`1px solid ${T.border}`,background:"transparent",color:loading[activeSport]?T.muted:T.dim,fontSize:9,fontWeight:600,cursor:loading[activeSport]?"wait":"pointer",fontFamily:F.mono}}>{loading[activeSport]?"⏳ Loading...":"↻ Refresh"}</button>
            </div>
            <span style={{color:T.muted,fontSize:9,fontFamily:F.mono}}>{currentGames.length} games · {isMock?"MOCK DATA":"LIVE DATA"}{lastFetch[activeSport]&&<> · {new Date(lastFetch[activeSport]).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</>}</span>
          </div>
          {errors[activeSport]&&<div style={{marginBottom:8,padding:"8px 12px",background:T.redBg,border:`1px solid ${T.red}22`,borderRadius:4}}><span style={{color:T.red,fontSize:10,fontFamily:F.mono}}>⚠ {errors[activeSport]}</span></div>}
          {loading[activeSport]&&currentGames.length===0&&<div style={{textAlign:"center",padding:40,color:T.muted}}><div style={{fontSize:20,marginBottom:8}}>⏳</div><div style={{fontSize:12}}>Loading {SPORTS.find(s=>s.key===activeSport)?.label}...</div></div>}
          {dayGroups.map(([dayKey,group])=>(
            <div key={dayKey}>
              <div style={{padding:"6px 0",marginTop:8,marginBottom:4,borderBottom:`1px solid ${T.border}`}}><span style={{color:T.dim,fontSize:10,fontWeight:700,fontFamily:F.mono,letterSpacing:1}}>{group.label.toUpperCase()}</span><span style={{color:T.muted,fontSize:9,fontFamily:F.mono,marginLeft:8}}>{group.games.length} games</span></div>
              {group.games.map(g=><GameCard key={g.id} game={g} bookFilter={bookFilter} onAddBet={addBet} bankroll={bankroll} unitSize={unitSize} T={T} myBooks={myBooks} lineHistory={lineHistory}/>)}
            </div>
          ))}
          {!loading[activeSport]&&currentGames.length===0&&!errors[activeSport]&&<div style={{textAlign:"center",padding:36,color:T.muted}}><div style={{fontSize:20,marginBottom:6,opacity:0.4}}>🔍</div><div style={{fontSize:12,marginBottom:8}}>No games loaded for {SPORTS.find(s=>s.key===activeSport)?.label} yet.</div><button onClick={()=>fetchSport(activeSport)} style={{padding:"6px 14px",borderRadius:3,border:`1px solid ${T.border}`,background:"transparent",color:T.dim,fontSize:10,cursor:"pointer",fontFamily:F.mono}}>↻ Load {SPORTS.find(s=>s.key===activeSport)?.label}</button></div>}
        </>}

        {activeTab==="tracker"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontSize:13,fontWeight:700}}>Betting Ledger</span><button onClick={()=>setShowManualBet(!showManualBet)} style={{background:T.green,color:dark?T.bg:"#fff",border:"none",padding:"6px 12px",borderRadius:3,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:F.mono}}>+ LOG BET</button></div>
          {showManualBet&&<ManualBetForm onAddBet={addBet} onClose={()=>setShowManualBet(false)} T={T}/>}
          <BetTracker bets={bets} setBets={setBets} bankroll={bankroll} unitSize={unitSize} T={T} dbSyncing={dbSyncing}/>
        </>}

        {activeTab==="clv"&&<><div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Closing Line Value</div><CLVTab bets={bets} setBets={setBets} T={T}/></>}

        {activeTab==="bankroll"&&<>
          <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Bankroll Management</div>
          <BankrollPanel bankroll={bankroll} setBankroll={setBankroll} unitSize={unitSize} T={T}/>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:14}}>
            <div style={{color:T.gold,fontSize:11,fontWeight:700,marginBottom:8}}>Unit Sizing by Edge</div>
            <div style={{color:T.dim,fontSize:11,lineHeight:1.7,marginBottom:10}}>1 unit = 1% of bankroll. Size scales with edge. Max 5 units (5%) — never overbet a single game.</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6}}>
              {[{r:"3-4% edge",u:"2 units",a:bankroll>0?`$${(2*unitSize).toLocaleString()}`:"—"},{r:"4-6% edge",u:"3 units",a:bankroll>0?`$${(3*unitSize).toLocaleString()}`:"—"},{r:"6-8% edge",u:"4 units",a:bankroll>0?`$${(4*unitSize).toLocaleString()}`:"—"},{r:"8%+ edge",u:"5 units MAX",a:bankroll>0?`$${(5*unitSize).toLocaleString()}`:"—"}].map(r=><div key={r.r} style={{padding:"8px 10px",background:`${T.muted}08`,borderRadius:3,border:`1px solid ${T.border}`}}><div style={{color:T.green,fontSize:10,fontWeight:700,fontFamily:F.mono}}>{r.r}</div><div style={{color:T.text,fontSize:12,fontWeight:600,fontFamily:F.mono,marginTop:3}}>{r.u}</div><div style={{color:T.gold,fontSize:11,fontFamily:F.mono,marginTop:1}}>{r.a}</div></div>)}
            </div>
          </div>
        </>}

        <div style={{marginTop:24,paddingTop:12,borderTop:`1px solid ${T.border}`,textAlign:"center",color:T.muted,fontSize:9,fontFamily:F.mono,lineHeight:1.8}}>
          {isMock?"DEV MODE · MOCK DATA":"LIVE ODDS"} · {myBooks.length} SPORTSBOOKS · CLOUD SYNC · sharpline.com
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SharpLine />);
</script>
</body>
</html>
